<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
    <title>{% block title %}ForgeStore{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Where the Workshop Meets the World — Discover handcrafted treasures from master artisans.{% endblock %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Alex+Brush&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/output.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-stone-50 text-stone-900 font-sans antialiased selection:bg-amber-500/20 selection:text-stone-900">
    {% block body %}{% endblock %}

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3" style="z-index: var(--z-toast);"></div>
    <!-- Z-index system: defined in input.css :root { --z-header:50; --z-backdrop:60; --z-mobile-menu:70; --z-toast:100; --z-sidebar:40; ... } -->

    <script src="/static/js/main.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
