{% extends "admin/sidebar.html" %}
{% block title %}Support — Vendor Portal{% endblock %}
{% block content %}
<style>
  :root{--amber-50:#fffbeb;--amber-100:#fef3c7;--amber-200:#fde68a;--amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;--stone-800:#292524;--stone-900:#1c1917;--red-500:#ef4444;--emerald-500:#22c55e;--radius-md:10px;--radius-lg:14px}
  .vs-page{max-width:800px;margin:0 auto;padding:0}
  .vs-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem}
  .vs-title{font-size:1.5rem;font-weight:800;color:var(--stone-900)}
  .vs-subtitle{font-size:.8125rem;color:var(--stone-500);margin-top:.25rem}
  .vs-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .vs-empty{text-align:center;padding:3rem 1rem;color:var(--stone-400)}
  .vs-empty svg{width:48px;height:48px;margin:0 auto 1rem;opacity:.4}
  .vs-ticket{display:flex;align-items:flex-start;gap:1rem;padding:1rem;border:1px solid var(--stone-200);border-radius:var(--radius-md);margin-bottom:.75rem;transition:border-color .15s}
  .vs-ticket:hover{border-color:var(--amber-400)}
  .vs-ticket-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.75rem;font-weight:700}
  .vs-ticket-icon.open{background:#fef3c7;color:#92400e}
  .vs-ticket-icon.progress{background:#dbeafe;color:#2563eb}
  .vs-ticket-icon.resolved{background:#d1fae5;color:#059669}
  .vs-ticket-title{font-size:.875rem;font-weight:600;color:var(--stone-900)}
  .vs-ticket-meta{font-size:.75rem;color:var(--stone-500);margin-top:.25rem}
  .vs-ticket-status{font-size:.6875rem;font-weight:600;padding:2px 8px;border-radius:9999px;white-space:nowrap}
  .vs-ticket-status.open{background:#fef3c7;color:#92400e}
  .vs-ticket-status.progress{background:#dbeafe;color:#2563eb}
  .vs-ticket-status.resolved{background:#d1fae5;color:#059669}
  .vs-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;background:linear-gradient(135deg,#f59e0b,#d97706);color:#1c1917;border:none;border-radius:var(--radius-md);font-size:.8125rem;font-weight:600;cursor:pointer;min-height:44px;transition:all .15s}
  .vs-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(245,158,11,.3)}
  .vs-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center;padding:1rem}
  .vs-modal-overlay.show{display:flex}
  .vs-modal{background:#fff;border-radius:var(--radius-lg);width:min(100%,480px);max-height:90vh;overflow-y:auto;padding:1.5rem}
  .vs-modal h3{font-size:1rem;font-weight:700;margin-bottom:1rem}
  .vs-form-group{margin-bottom:1rem}
  .vs-form-group label{display:block;font-size:.75rem;font-weight:600;color:var(--stone-600);margin-bottom:.375rem}
  .vs-form-group input,.vs-form-group textarea,.vs-form-group select{width:100%;padding:.5rem .75rem;border:1px solid var(--stone-200);border-radius:8px;font-size:.8125rem;color:var(--stone-900);background:var(--stone-50);min-height:40px}
  .vs-form-group textarea{resize:vertical;min-height:80px}
  .vs-form-actions{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem}
</style>

<div class="vs-page">
  <div class="vs-header">
    <div>
      <div class="vs-title">Support Tickets</div>
      <div class="vs-subtitle">Get help with your store, products, or orders</div>
    </div>
    <button class="vs-btn" onclick="vsOpenModal()">
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      New Ticket
    </button>
  </div>

  <div id="vs-tickets"><div class="vs-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg><p>Loading tickets...</p></div></div>
</div>

<div id="vs-modal" class="vs-modal-overlay" onclick="if(event.target===this)vsCloseModal()">
  <div class="vs-modal">
    <h3>Submit a Support Ticket</h3>
    <div class="vs-form-group">
      <label>Subject</label>
      <input type="text" id="vs-subject" placeholder="Brief description of your issue">
    </div>
    <div class="vs-form-group">
      <label>Category</label>
      <select id="vs-category">
        <option value="GENERAL">General Inquiry</option>
        <option value="ORDER">Order Issue</option>
        <option value="PRODUCT">Product Issue</option>
        <option value="PAYMENT">Payment Issue</option>
        <option value="SHIPPING">Shipping Issue</option>
        <option value="ACCOUNT">Account Issue</option>
      </select>
    </div>
    <div class="vs-form-group">
      <label>Message</label>
      <textarea id="vs-message" placeholder="Describe your issue in detail..."></textarea>
    </div>
    <div class="vs-form-actions">
      <button class="vs-btn" style="background:var(--stone-100);color:var(--stone-600)" onclick="vsCloseModal()">Cancel</button>
      <button class="vs-btn" onclick="vsSubmitTicket()">Submit Ticket</button>
    </div>
  </div>
</div>

<script>
function vsOpenModal() { document.getElementById('vs-modal').classList.add('show'); }
function vsCloseModal() { document.getElementById('vs-modal').classList.remove('show'); }

async function vsLoadTickets() {
  try {
    const res = await fetch('/api/support/tickets');
    const data = await res.json();
    const tickets = data.tickets || data || [];
    const el = document.getElementById('vs-tickets');
    if (!tickets.length) {
      el.innerHTML = '<div class="vs-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg><p>No support tickets yet</p></div>';
      return;
    }
    el.innerHTML = tickets.map(t => {
      const statusClass = t.status === 'OPEN' ? 'open' : t.status === 'IN_PROGRESS' ? 'progress' : 'resolved';
      const statusLabel = t.status === 'IN_PROGRESS' ? 'In Progress' : t.status.charAt(0) + t.status.slice(1).toLowerCase();
      const date = t.created_at ? new Date(t.created_at).toLocaleDateString() : '';
      return '<div class="vs-ticket">' +
        '<div class="vs-ticket-icon ' + statusClass + '">' + (t.ticket_number || '#').slice(-4) + '</div>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="vs-ticket-title">' + (t.subject || 'Support Ticket') + '</div>' +
          '<div class="vs-ticket-meta">' + (t.category || 'General') + (date ? ' &middot; ' + date : '') + '</div>' +
        '</div>' +
        '<span class="vs-ticket-status ' + statusClass + '">' + statusLabel + '</span>' +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('vs-tickets').innerHTML = '<div class="vs-empty"><p>Failed to load tickets</p></div>';
  }
}

async function vsSubmitTicket() {
  const subject = document.getElementById('vs-subject').value.trim();
  const category = document.getElementById('vs-category').value;
  const message = document.getElementById('vs-message').value.trim();
  if (!subject || !message) { alert('Please fill in all fields'); return; }
  try {
    const res = await fetch('/api/support/tickets', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ subject, category, message })
    });
    if (res.ok) { vsCloseModal(); vsLoadTickets(); document.getElementById('vs-subject').value=''; document.getElementById('vs-message').value=''; }
  } catch(e) { alert('Failed to submit ticket'); }
}

vsLoadTickets();
</script>
{% endblock %}
