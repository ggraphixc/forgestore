{% extends "admin/sidebar.html" %}
{% block title %}Notifications — Vendor Portal{% endblock %}
{% block content %}
<style>
  :root{--amber-50:#fffbeb;--amber-100:#fef3c7;--amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;--stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;--stone-900:#1c1917;--emerald-500:#22c55e;--radius-md:10px;--radius-lg:14px}
  .vn-page{max-width:800px;margin:0 auto;padding:0}
  .vn-header{margin-bottom:1.5rem}
  .vn-title{font-size:1.5rem;font-weight:800;color:var(--stone-900)}
  .vn-subtitle{font-size:.8125rem;color:var(--stone-500);margin-top:.25rem}
  .vn-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .vn-item{display:flex;gap:.75rem;padding:1rem 1.25rem;border-bottom:1px solid var(--stone-100);transition:background .15s;cursor:default}
  .vn-item:last-child{border-bottom:none}
  .vn-item:hover{background:var(--stone-50)}
  .vn-item.unread{background:#fffbeb}
  .vn-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.875rem}
  .vn-icon.order{background:#dbeafe;color:#2563eb}
  .vn-icon.product{background:#d1fae5;color:#059669}
  .vn-icon.payment{background:#fef3c7;color:#92400e}
  .vn-icon.general{background:#f3e8ff;color:#9333ea}
  .vn-body{flex:1;min-width:0}
  .vn-text{font-size:.8125rem;color:var(--stone-700);line-height:1.5}
  .vn-text strong{color:var(--stone-900)}
  .vn-time{font-size:.6875rem;color:var(--stone-400);margin-top:.25rem}
  .vn-empty{text-align:center;padding:3rem 1rem;color:var(--stone-400)}
  .vn-empty svg{width:48px;height:48px;margin:0 auto 1rem;opacity:.4}
  .vn-mark-read{font-size:.6875rem;color:var(--amber-600);cursor:pointer;border:none;background:none;padding:0}
  .vn-mark-read:hover{text-decoration:underline}
</style>

<div class="vn-page">
  <div class="vn-header">
    <div class="vn-title">Notifications</div>
    <div class="vn-subtitle">Stay updated on your store activity</div>
  </div>
  <div class="vn-card" id="vn-list">
    <div class="vn-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg><p>Loading notifications...</p></div>
  </div>
</div>

<script>
async function vnLoad() {
  try {
    const res = await fetch('/api/notifications');
    const data = await res.json();
    const notifications = data.notifications || data || [];
    const el = document.getElementById('vn-list');
    if (!notifications.length) {
      el.innerHTML = '<div class="vn-empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg><p>No notifications yet</p></div>';
      return;
    }
    el.innerHTML = notifications.map(n => {
      const type = (n.type || 'general').toLowerCase();
      const iconClass = type.includes('order') ? 'order' : type.includes('product') ? 'product' : type.includes('payment') ? 'payment' : 'general';
      const icons = { order: '&#x1F4E6;', product: '&#x1F4E4;', payment: '&#x1F4B3;', general: '&#x1F514;' };
      const date = n.created_at ? new Date(n.created_at).toLocaleDateString() : '';
      return '<div class="vn-item ' + (n.read ? '' : 'unread') + '">' +
        '<div class="vn-icon ' + iconClass + '">' + (icons[iconClass] || '&#x1F514;') + '</div>' +
        '<div class="vn-body">' +
          '<div class="vn-text">' + (n.message || n.title || '') + '</div>' +
          '<div class="vn-time">' + date + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('vn-list').innerHTML = '<div class="vn-empty"><p>Failed to load notifications</p></div>';
  }
}
vnLoad();
</script>
{% endblock %}
