{% extends "admin/sidebar.html" %}
{% block title %}Notifications — Vendor Portal{% endblock %}
{% block content %}
<style>
  @import url('/static/css/vendor_portal.css');

  .vp-notif-list { padding: 0; }

  .vp-notif-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--vp-border-light);
    transition: all var(--vp-transition);
    cursor: default;
    position: relative;
    animation: vpSlideUp 0.4s ease-out both;
  }

  .vp-notif-item:last-child { border-bottom: none; }

  .vp-notif-item:hover { background: rgba(99, 102, 241, 0.03); }

  .vp-notif-item.unread {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.04) 0%, rgba(245, 158, 11, 0.02) 100%);
  }

  .vp-notif-item.unread::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--vp-gradient-primary);
    border-radius: 0 var(--vp-radius-xs) var(--vp-radius-xs) 0;
  }

  .vp-notif-item:nth-child(1) { animation-delay: 0ms; }
  .vp-notif-item:nth-child(2) { animation-delay: 40ms; }
  .vp-notif-item:nth-child(3) { animation-delay: 80ms; }
  .vp-notif-item:nth-child(4) { animation-delay: 120ms; }
  .vp-notif-item:nth-child(5) { animation-delay: 160ms; }

  .vp-notif-icon {
    width: 2.75rem;
    height: 2.75rem;
    border-radius: var(--vp-radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 1.125rem;
    transition: transform var(--vp-transition-bounce);
  }

  .vp-notif-item:hover .vp-notif-icon { transform: scale(1.08); }

  .vp-notif-icon.order { background: var(--vp-blue-soft); color: var(--vp-blue); }
  .vp-notif-icon.product { background: var(--vp-emerald-soft); color: var(--vp-emerald); }
  .vp-notif-icon.payment { background: var(--vp-amber-soft); color: var(--vp-amber); }
  .vp-notif-icon.general { background: var(--vp-purple-soft); color: var(--vp-purple); }

  .vp-notif-body { flex: 1; min-width: 0; }

  .vp-notif-text {
    font-size: 0.9375rem;
    color: var(--vp-text);
    line-height: 1.6;
  }

  .vp-notif-text strong { font-weight: 700; }

  .vp-notif-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.375rem;
  }

  .vp-notif-time {
    font-size: 0.75rem;
    color: var(--vp-text-muted);
  }

  .vp-notif-unread-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--vp-accent);
    flex-shrink: 0;
    animation: vpPulse 2s ease-in-out infinite;
  }

  .vp-notif-mark-read {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--vp-accent);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0.25rem 0.5rem;
    border-radius: var(--vp-radius-xs);
    transition: all var(--vp-transition);
    min-height: 44px;
    margin-left: auto;
    flex-shrink: 0;
    align-self: center;
  }

  .vp-notif-mark-read:hover {
    background: rgba(99, 102, 241, 0.08);
    color: var(--vp-accent-dark);
  }

  .vp-notif-mark-read svg { width: 1rem; height: 1rem; }

  /* Dark mode */
  .dark .vp-notif-item.unread {
    background: linear-gradient(135deg, rgba(99, 102, 241, 0.06) 0%, rgba(99, 102, 241, 0.02) 100%);
  }

  .dark .vp-notif-item:hover { background: rgba(99, 102, 241, 0.06); }

  @media (max-width: 640px) {
    .vp-notif-item { padding: 1rem; gap: 0.75rem; }
    .vp-notif-icon { width: 2.25rem; height: 2.25rem; font-size: 1rem; }
    .vp-notif-text { font-size: 0.875rem; }
    .vp-notif-mark-read { min-height: 44px; }
  }
</style>

<div class="vp-page">
  <div class="vp-header">
    <div class="vp-header-left">
      <h1>Notifications</h1>
      <div class="vp-subtitle">Stay updated on your store activity</div>
    </div>
    <div class="vp-header-actions" id="vp-notif-actions" style="display:none;">
      <button class="vp-btn vp-btn-outline vp-btn-sm" id="vp-mark-all" onclick="vnMarkAllRead()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Mark all read
      </button>
    </div>
  </div>

  <div class="vp-card">
    <div class="vp-card-body flush vp-notif-list" id="vn-list">
      <div class="vp-empty">
        <div class="vp-empty-icon">
          <svg width="2rem" height="2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        </div>
        <h3>Loading notifications</h3>
        <p>Fetching your latest updates...</p>
      </div>
    </div>
  </div>
</div>

<script>
async function vnLoad() {
  try {
    const res = await fetch('/api/notifications');
    const data = await res.json();
    const notifications = data.notifications || data || [];
    const el = document.getElementById('vn-list');
    const actions = document.getElementById('vp-notif-actions');
    if (!notifications.length) {
      el.innerHTML = '<div class="vp-empty"><div class="vp-empty-icon"><svg width="2rem" height="2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg></div><h3>No notifications yet</h3><p>You\'re all caught up! We\'ll let you know when something happens.</p></div>';
      actions.style.display = 'none';
      return;
    }
    const unreadCount = notifications.filter(n => !n.read).length;
    if (unreadCount > 0) {
      actions.style.display = 'flex';
    } else {
      actions.style.display = 'none';
    }
    el.innerHTML = notifications.map(n => {
      const type = (n.type || 'general').toLowerCase();
      const iconClass = type.includes('order') ? 'order' : type.includes('product') ? 'product' : type.includes('payment') ? 'payment' : 'general';
      const icons = { order: '&#x1F4E6;', product: '&#x1F4E4;', payment: '&#x1F4B3;', general: '&#x1F514;' };
      const date = n.created_at ? new Date(n.created_at).toLocaleDateString() : '';
      const isUnread = !n.read;
      return '<div class="vp-notif-item ' + (isUnread ? 'unread' : '') + '">' +
        '<div class="vp-notif-icon ' + iconClass + '">' + (icons[iconClass] || '&#x1F514;') + '</div>' +
        '<div class="vp-notif-body">' +
          '<div class="vp-notif-text">' + (n.message || n.title || '') + '</div>' +
          '<div class="vp-notif-meta">' +
            (isUnread ? '<span class="vp-notif-unread-dot" aria-label="Unread"></span>' : '') +
            '<span class="vp-notif-time">' + date + '</span>' +
          '</div>' +
        '</div>' +
        (isUnread ? '<button class="vp-notif-mark-read" onclick="vnMarkRead(this)" data-id="' + (n.id || '') + '" aria-label="Mark as read"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></button>' : '') +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('vn-list').innerHTML = '<div class="vp-empty"><div class="vp-empty-icon"><svg width="2rem" height="2rem" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><h3>Failed to load</h3><p>Something went wrong. Please try again.</p></div>';
  }
}

function vnMarkRead(btn) {
  const item = btn.closest('.vp-notif-item');
  if (item) {
    item.classList.remove('unread');
    const dot = item.querySelector('.vp-notif-unread-dot');
    if (dot) dot.remove();
    btn.remove();
  }
}

function vnMarkAllRead() {
  document.querySelectorAll('.vp-notif-item.unread').forEach(item => {
    item.classList.remove('unread');
    const dot = item.querySelector('.vp-notif-unread-dot');
    if (dot) dot.remove();
    const readBtn = item.querySelector('.vp-notif-mark-read');
    if (readBtn) readBtn.remove();
  });
  document.getElementById('vp-notif-actions').style.display = 'none';
}

vnLoad();
</script>
{% endblock %}
