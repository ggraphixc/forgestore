{% extends "admin/sidebar.html" %}
{% block title %}Messages — {{ settings.site_name|default('ForgeStore') }}{% endblock %}
{% block content %}
<style>
  :root {
    --primary: {{ settings.primary_color|default('#f59e0b') }};
    --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
    --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
  }
  .dark { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 0; }
  .vm-page { max-width: 60rem; margin: 0 auto; padding: 1.5rem; }
  .vm-page h1 { font-size: 1.75rem; font-weight: 800; margin-bottom: 0.25rem; }
  .vm-sub { font-size: 0.875rem; color: var(--muted); margin-bottom: 1.5rem; }
  .vm-layout { display: grid; grid-template-columns: 1fr 2fr; height: calc(100vh - 160px); min-height: 400px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--card); }
  .vm-threads { border-right: 1px solid var(--border); overflow-y: auto; }
  .vm-thread-header { padding: 0.875rem 1rem; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 0.8125rem; color: var(--muted); }
  .vm-thread { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; gap: 0.75rem; align-items: center; transition: background 0.1s; }
  .vm-thread:hover { background: var(--bg); }
  .vm-thread.active { background: var(--bg); border-left: 3px solid var(--primary); }
  .vm-thread img { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .vm-thread-info { flex: 1; min-width: 0; }
  .vm-thread-name { font-weight: 700; font-size: 0.8125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vm-thread-preview { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vm-thread-meta { font-size: 0.6875rem; color: var(--muted); text-align: right; flex-shrink: 0; }
  .vm-thread-badge { background: var(--red); color: #fff; font-size: 0.625rem; font-weight: 700; padding: 2px 6px; border-radius: 10px; margin-top: 0.25rem; display: inline-block; }
  .vm-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 0.875rem; }
  .vm-chat { display: flex; flex-direction: column; height: 100%; }
  .vm-chat-header { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; }
  .vm-chat-header img { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
  .vm-chat-header .name { font-weight: 700; font-size: 0.875rem; }
  .vm-chat-header .sub { font-size: 0.75rem; color: var(--muted); }
  .vm-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem; }
  .vm-msg { max-width: 75%; padding: 0.625rem 0.875rem; border-radius: 12px; font-size: 0.8125rem; line-height: 1.5; }
  .vm-msg.customer { background: var(--bg); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
  .vm-msg.vendor { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .vm-msg .author { font-weight: 700; font-size: 0.6875rem; margin-bottom: 0.125rem; }
  .vm-msg .time { font-size: 0.625rem; opacity: 0.7; margin-top: 0.25rem; }
  .vm-msg.flagged { opacity: 0.5; border-style: dashed; }
  .vm-input { padding: 0.75rem 1rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; align-items: flex-end; }
  .vm-input textarea { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 0.75rem; font-size: 0.8125rem; resize: none; min-height: 40px; max-height: 120px; font-family: inherit; background: var(--bg); color: var(--text); }
  .vm-input button { min-height: 40px; padding: 0 1rem; border-radius: 8px; font-weight: 600; font-size: 0.8125rem; cursor: pointer; border: none; background: var(--primary); color: #fff; }
  .vm-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  @media (max-width: 640px) {
    .vm-layout { grid-template-columns: 1fr; height: calc(100vh - 120px); }
    .vm-threads.hidden { display: none; }
    .vm-chat.hidden { display: none; }
  }
</style>

<div class="vm-page">
  <h1>Customer Messages</h1>
  <p class="vm-sub">Respond to customer questions about your products</p>

  <div class="vm-layout">
    <div class="vm-threads" id="vmThreads">
      <div class="vm-thread-header">Product Conversations</div>
      <div id="vmThreadList"></div>
    </div>
    <div class="vm-chat" id="vmChat">
      <div class="vm-empty" id="vmEmpty">Select a conversation to start</div>
    </div>
  </div>
</div>

<script>
let vmCurrent = null;

async function vmLoadThreads() {
  const r = await fetch('/api/vendor/messages/threads');
  const d = await r.json();
  const el = document.getElementById('vmThreadList');
  if (!d.threads.length) {
    el.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--muted);font-size:0.8125rem;">No customer messages yet</div>';
    return;
  }
  el.innerHTML = d.threads.map(t => `
    <div class="vm-thread ${vmCurrent === t.product_id ? 'active' : ''}" onclick="vmOpen('${t.product_id}')">
      ${t.product_image ? `<img src="${t.product_image}" alt="">` : '<div style="width:36px;height:36px;border-radius:8px;background:var(--border);flex-shrink:0;"></div>'}
      <div class="vm-thread-info">
        <div class="vm-thread-name">${t.product_name}</div>
        <div class="vm-thread-preview">${t.last_message}</div>
      </div>
      <div class="vm-thread-meta">
        ${t.last_at ? new Date(t.last_at).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : ''}
        ${t.unread_count > 0 ? `<div class="vm-thread-badge">${t.unread_count}</div>` : ''}
      </div>
    </div>
  `).join('');
}

async function vmOpen(productId) {
  vmCurrent = productId;
  document.querySelectorAll('.vm-thread').forEach(t => t.classList.remove('active'));
  event.currentTarget?.classList.add('active');

  const [r, catR, aiR] = await Promise.all([
    fetch(`/api/vendor/messages/${productId}`),
    fetch(`/api/vendor/messages/${productId}/categorize`),
    fetch(`/api/vendor/messages/${productId}/ai-suggest`),
  ]);
  const d = await r.json();
  const cat = await catR.json();
  const ai = await aiR.json();
  if (!d.success && !d.product) return;

  const chat = document.getElementById('vmChat');
  chat.innerHTML = `
    <div class="vm-chat-header">
      ${d.product.image ? `<img src="${d.product.image}" alt="">` : ''}
      <div><div class="name">${d.product.name}</div><div class="sub">Product Q&A</div></div>
      <div style="margin-left:auto;display:flex;gap:0.5rem;">
        <span id="vmCat" style="font-size:0.6875rem;padding:2px 8px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--muted);"></span>
        <button onclick="vmEscalate('${productId}')" style="min-height:28px;padding:0.25rem 0.5rem;border-radius:6px;font-size:0.6875rem;font-weight:600;cursor:pointer;border:1px solid var(--red);background:transparent;color:var(--red);">Escalate</button>
      </div>
    </div>
    <div class="vm-messages" id="vmMsgs">
      ${d.messages.map(m => `
        <div class="vm-msg ${m.is_admin ? 'vendor' : 'customer'} ${m.is_flagged ? 'flagged' : ''}">
          <div class="author">${m.author}</div>
          <div>${m.content}</div>
          <div class="time">${m.created_at ? new Date(m.created_at).toLocaleString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : ''}</div>
        </div>
      `).join('')}
    </div>
    <div id="vmSuggestions" style="padding:0.5rem 1rem;display:flex;gap:0.5rem;flex-wrap:wrap;"></div>
    <div class="vm-input">
      <textarea id="vmText" placeholder="Type your reply..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();vmSend();}"></textarea>
      <button onclick="vmSend()" id="vmSendBtn">Send</button>
    </div>
  `;
  const msgs = document.getElementById('vmMsgs');
  msgs.scrollTop = msgs.scrollHeight;

  // Render category badge
  const catEl = document.getElementById('vmCat');
  const catLabels = {return_request:'Return Request',shipping_inquiry:'Shipping',complaint:'Complaint',product_question:'Product Q',pricing_inquiry:'Pricing',general:'General'};
  const catColors = {return_request:'var(--red)',shipping_inquiry:'var(--blue)',complaint:'var(--yellow)',product_question:'var(--green)',pricing_inquiry:'var(--muted)',general:'var(--muted)'};
  catEl.textContent = catLabels[cat.category] || cat.category;
  catEl.style.color = catColors[cat.category] || 'var(--muted)';
  if (cat.priority === 'high') catEl.style.borderColor = 'var(--red)';

  // Render AI suggestions
  const sugEl = document.getElementById('vmSuggestions');
  if (ai.suggestions && ai.suggestions.length) {
    sugEl.innerHTML = ai.suggestions.map(s => `<button onclick="document.getElementById('vmText').value=this.dataset.s" data-s="${s.replace(/"/g,'&quot;')}" style="min-height:32px;padding:0.25rem 0.75rem;border-radius:16px;font-size:0.6875rem;cursor:pointer;border:1px solid var(--primary);background:transparent;color:var(--primary);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;">${s.length > 50 ? s.slice(0,50)+'...' : s}</button>`).join('');
  }
}

async function vmSend() {
  const text = document.getElementById('vmText');
  const btn = document.getElementById('vmSendBtn');
  if (!text.value.trim() || !vmCurrent) return;
  btn.disabled = true;
  await fetch(`/api/vendor/messages/${vmCurrent}/reply`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({content: text.value.trim()})
  });
  text.value = '';
  btn.disabled = false;
  vmOpen(vmCurrent);
}

async function vmEscalate(productId) {
  const reason = prompt('Reason for escalation:');
  if (!reason) return;
  await fetch(`/api/vendor/messages/${productId}/escalate`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({reason})
  });
  alert('Escalated to admin support');
}

vmLoadThreads();
</script>
{% endblock %}
