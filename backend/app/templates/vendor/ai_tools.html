<!-- Vendor AI Tools — floating panel + inline buttons for product form -->
<style>
  .vai-fab{position:fixed;bottom:90px;right:24px;z-index:999;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;border:none;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
  .vai-fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(99,102,241,0.5);}
  .vai-fab svg{width:24px;height:24px;}
  .vai-panel{position:fixed;bottom:156px;right:24px;z-index:998;width:360px;max-height:70vh;background:var(--stone-50);border:1px solid var(--stone-200);border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,0.15);display:none;flex-direction:column;overflow:hidden;}
  .dark .vai-panel{background:var(--stone-100);border-color:var(--stone-200);}
  .vai-panel.open{display:flex;}
  .vai-panel-header{padding:1rem 1.25rem;border-bottom:1px solid var(--stone-200);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .vai-panel-header h3{font-size:0.9375rem;font-weight:700;color:var(--stone-900);margin:0;display:flex;align-items:center;gap:8px;}
  .vai-panel-header h3 .vai-badge{font-size:0.625rem;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;padding:2px 6px;border-radius:6px;font-weight:600;}
  .vai-panel-close{background:none;border:none;cursor:pointer;color:var(--stone-400);padding:4px;}
  .vai-panel-close:hover{color:var(--stone-900);}
  .vai-panel-body{padding:1rem 1.25rem;overflow-y:auto;flex:1;}
  .vai-section{margin-bottom:1rem;}
  .vai-section-title{font-size:0.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--stone-400);margin-bottom:0.5rem;}
  .vai-tool-btn{width:100%;padding:0.625rem 0.75rem;border:1px solid var(--stone-200);border-radius:10px;background:var(--stone-50);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;transition:all 0.15s;min-height:44px;}
  .dark .vai-tool-btn{background:var(--stone-100);border-color:var(--stone-200);}
  .vai-tool-btn:hover{border-color:#8b5cf6;background:rgba(139,92,246,0.05);}
  .vai-tool-btn .vai-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;}
  .vai-tool-btn .vai-icon-desc{background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;}
  .vai-tool-btn .vai-icon-spec{background:linear-gradient(135deg,#06b6d4,#22d3ee);color:#fff;}
  .vai-tool-btn .vai-icon-tag{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#fff;}
  .vai-tool-btn .vai-icon-title{background:linear-gradient(135deg,#10b981,#34d399);color:#fff;}
  .vai-tool-btn .vai-icon-price{background:linear-gradient(135deg,#ef4444,#f87171);color:#fff;}
  .vai-tool-btn .vai-icon-batch{background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;}
  .vai-tool-btn .vai-tool-info{flex:1;min-width:0;}
  .vai-tool-btn .vai-tool-name{font-size:0.8125rem;font-weight:600;color:var(--stone-900);}
  .dark .vai-tool-btn .vai-tool-name{color:var(--stone-900);}
  .vai-tool-btn .vai-tool-desc{font-size:0.6875rem;color:var(--stone-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .vai-tool-btn .vai-arrow{color:var(--stone-400);flex-shrink:0;}
  .vai-tool-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .vai-tool-btn .vai-spinner{width:16px;height:16px;border:2px solid var(--stone-200);border-top-color:#8b5cf6;border-radius:50%;animation:vai-spin 0.6s linear infinite;display:none;}
  .vai-tool-btn.loading .vai-spinner{display:block;}
  .vai-tool-btn.loading .vai-arrow{display:none;}
  @keyframes vai-spin{to{transform:rotate(360deg);}}

  /* Inline AI buttons */
  .vai-inline-btn{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid #8b5cf6;border-radius:6px;background:rgba(139,92,246,0.08);color:#8b5cf6;font-size:0.6875rem;font-weight:600;cursor:pointer;transition:all 0.15s;white-space:nowrap;vertical-align:middle;}
  .vai-inline-btn:hover{background:#8b5cf6;color:#fff;}
  .vai-inline-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .vai-inline-btn .vai-spin-sm{width:12px;height:12px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:vai-spin 0.6s linear infinite;display:none;}
  .vai-inline-btn.loading .vai-spin-sm{display:block;}
  .vai-inline-btn.loading{pointer-events:none;}
  .vai-field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .vai-field-header .vp-form-label{margin-bottom:0;}

  /* AI result toast */
  .vai-toast{position:fixed;top:20px;right:20px;z-index:9999;padding:0.75rem 1.25rem;border-radius:10px;font-size:0.8125rem;font-weight:600;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.2);transform:translateX(120%);transition:transform 0.3s ease;max-width:360px;}
  .vai-toast.show{transform:translateX(0);}
  .vai-toast.success{background:#10b981;}
  .vai-toast.error{background:#ef4444;}
  .vai-toast.info{background:#6366f1;}

  /* Specs preview */
  .vai-specs-preview{margin-top:0.5rem;background:var(--stone-50);border:1px solid var(--stone-200);border-radius:8px;padding:0.75rem;display:none;max-height:200px;overflow-y:auto;}
  .dark .vai-specs-preview{background:var(--stone-100);}
  .vai-specs-preview table{width:100%;font-size:0.75rem;border-collapse:collapse;}
  .vai-specs-preview td{padding:3px 6px;border-bottom:1px solid var(--stone-200);color:var(--stone-600);}
  .vai-specs-preview td:first-child{font-weight:600;color:var(--stone-900);white-space:nowrap;width:40%;}
  .vai-specs-preview .vai-specs-actions{display:flex;gap:6px;margin-top:8px;}

  @media(max-width:480px){
    .vai-panel{right:8px;left:8px;width:auto;bottom:148px;max-height:60vh;}
    .vai-fab{bottom:82px;right:16px;}
  }
</style>

<div id="vai-toast" class="vai-toast"></div>

<button class="vai-fab" id="vai-fab" title="AI Tools" aria-label="Open AI Tools">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
</button>

<div class="vai-panel" id="vai-panel">
  <div class="vai-panel-header">
    <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> AI Tools <span class="vai-badge">SMART</span></h3>
    <button class="vai-panel-close" onclick="document.getElementById('vai-panel').classList.remove('open')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="vai-panel-body">
    <div class="vai-section">
      <div class="vai-section-title">Content Generation</div>
      <button class="vai-tool-btn" onclick="vaiGenerate('description')" id="vai-btn-desc">
        <div class="vai-icon vai-icon-desc">✍</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">Product Description</div>
          <div class="vai-tool-desc">Marketing-optimized product copy</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="vai-section">
      <div class="vai-section-title">Optimization</div>
      <button class="vai-tool-btn" onclick="vaiGenerate('title')" id="vai-btn-title" style="margin-bottom:0.5rem;">
        <div class="vai-icon vai-icon-title">🔍</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">Optimize Title</div>
          <div class="vai-tool-desc">SEO-friendly title for search visibility</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="vai-tool-btn" onclick="vaiGenerate('tags')" id="vai-btn-tags">
        <div class="vai-icon vai-icon-tag">🏷</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">SEO Tags</div>
          <div class="vai-tool-desc">Keywords for search ranking</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="vai-section">
      <div class="vai-section-title">Product Details</div>
      <button class="vai-tool-btn" onclick="vaiGenerate('specifications')" id="vai-btn-specs" style="margin-bottom:0.5rem;">
        <div class="vai-icon vai-icon-spec">📋</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">Specifications</div>
          <div class="vai-tool-desc">Key-value product specs</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <button class="vai-tool-btn" onclick="vaiGenerate('pricing')" id="vai-btn-price">
        <div class="vai-icon vai-icon-price">💰</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">Pricing Advisor</div>
          <div class="vai-tool-desc">Competitive pricing strategy</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>

    <div class="vai-section">
      <div class="vai-section-title">Batch</div>
      <button class="vai-tool-btn" onclick="vaiGenerate('batch')" id="vai-btn-batch">
        <div class="vai-icon vai-icon-batch">⚡</div>
        <div class="vai-tool-info">
          <div class="vai-tool-name">Generate All</div>
          <div class="vai-tool-desc">Description + Specs + Tags + Title at once</div>
        </div>
        <div class="vai-spinner"></div>
        <svg class="vai-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
function vaiToast(msg, type='info') {
  const t = document.getElementById('vai-toast');
  t.textContent = msg;
  t.className = 'vai-toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}

function vaiGetFormData() {
  const name = document.querySelector('input[name="name"]')?.value || '';
  const slug = document.querySelector('input[name="slug"]')?.value || '';
  const brand = document.querySelector('input[name="brand"]')?.value || '';
  const desc = document.querySelector('textarea[name="description"]')?.value || '';
  const price = document.querySelector('input[name="price"]')?.value || '';
  const catSel = document.querySelector('select[name="category_id"]');
  const category = catSel?.options[catSel.selectedIndex]?.text || '';
  let images = [];
  try { images = JSON.parse(document.getElementById('images-input')?.value || '[]'); } catch(e) {}
  return { name, slug, brand, description: desc, price, category, images, keywords: name + ' ' + brand + ' ' + category };
}

function vaiSetLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  if (loading) { btn.classList.add('loading'); btn.disabled = true; }
  else { btn.classList.remove('loading'); btn.disabled = false; }
}

async function vaiGenerate(type) {
  const data = vaiGetFormData();
  if (!data.name) { vaiToast('Enter a product name first', 'error'); return; }

  const btnMap = { description:'vai-btn-desc', title:'vai-btn-title', tags:'vai-btn-tags', specifications:'vai-btn-specs', pricing:'vai-btn-price', batch:'vai-btn-batch' };
  vaiSetLoading(btnMap[type], true);

  try {
    if (type === 'batch') {
      const res = await fetch('/api/vendor/ai/batch-generate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.results) {
        const r = d.results;
        if (r.description) { const ta = document.querySelector('textarea[name="description"]'); if(ta) ta.value = r.description; }
        if (r.title) { const inp = document.querySelector('input[name="name"]'); if(inp) inp.value = r.title; }
        if (r.tags) { vaiApplyTags(r.tags); }
        if (r.specifications) { vaiShowSpecsPreview(r.specifications); }
        vaiToast('All fields generated!', 'success');
      } else { vaiToast(d.message || 'Generation failed', 'error'); }
    } else if (type === 'description') {
      const res = await fetch('/api/vendor/ai/generate-description', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.description) {
        document.querySelector('textarea[name="description"]').value = d.description;
        vaiToast('Description generated!', 'success');
      } else { vaiToast(d.message || 'Failed', 'error'); }
    } else if (type === 'title') {
      const res = await fetch('/api/vendor/ai/optimize-title', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.title) {
        document.querySelector('input[name="name"]').value = d.title;
        vaiToast('Title optimized!', 'success');
      } else { vaiToast(d.message || 'Failed', 'error'); }
    } else if (type === 'tags') {
      const res = await fetch('/api/vendor/ai/generate-tags', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.tags) { vaiApplyTags(d.tags); vaiToast('Tags generated!', 'success'); }
      else { vaiToast(d.message || 'Failed', 'error'); }
    } else if (type === 'specifications') {
      const res = await fetch('/api/vendor/ai/generate-specifications', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.specifications) { vaiShowSpecsPreview(d.specifications); vaiToast('Specs generated!', 'success'); }
      else { vaiToast(d.message || 'Failed', 'error'); }
    } else if (type === 'pricing') {
      const res = await fetch('/api/vendor/ai/pricing-advisor', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      const d = await res.json();
      if (d.success && d.advice) { vaiShowPricingAdvice(d.advice); vaiToast('Pricing advice ready!', 'success'); }
      else { vaiToast(d.message || 'Failed', 'error'); }
    }
  } catch(e) { vaiToast('Network error. Try again.', 'error'); }
  vaiSetLoading(btnMap[type], false);
}

function vaiApplyTags(tags) {
  let existing = document.getElementById('vai-tags-preview');
  if (!existing) {
    existing = document.createElement('div');
    existing.id = 'vai-tags-preview';
    existing.style.cssText = 'margin-top:0.5rem;display:flex;flex-wrap:wrap;gap:4px;';
    const optsCard = document.querySelectorAll('.vp-card')[2];
    if (optsCard) optsCard.appendChild(existing);
  }
  existing.innerHTML = tags.map(t => '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:6px;font-size:0.6875rem;color:#b45309;font-weight:500;">'+t+'</span>').join('');
}

function vaiShowSpecsPreview(specs) {
  let preview = document.getElementById('vai-specs-preview');
  if (!preview) {
    preview = document.createElement('div');
    preview.id = 'vai-specs-preview';
    preview.className = 'vai-specs-preview';
    const optsCard = document.querySelectorAll('.vp-card')[2];
    if (optsCard) optsCard.appendChild(preview);
  }
  const rows = Object.entries(specs).map(([k,v]) => '<tr><td>'+k+'</td><td>'+v+'</td></tr>').join('');
  preview.innerHTML = '<table>'+rows+'</table><div class="vai-specs-actions"><button class="vai-inline-btn" onclick="vaiApplySpecs()">Apply Specs</button><button class="vai-inline-btn" onclick="document.getElementById(\'vai-specs-preview\').style.display=\'none\'" style="border-color:var(--stone-200);color:var(--stone-400);">Dismiss</button></div>';
  preview.style.display = 'block';
}

function vaiApplySpecs() {
  const preview = document.getElementById('vai-specs-preview');
  if (!preview) return;
  const rows = preview.querySelectorAll('tr');
  const specs = {};
  rows.forEach(r => { const cells = r.querySelectorAll('td'); if(cells.length>=2) specs[cells[0].textContent.trim()] = cells[1].textContent.trim(); });
  let specsInput = document.querySelector('input[name="specifications"]');
  if (!specsInput) {
    specsInput = document.createElement('input');
    specsInput.type = 'hidden';
    specsInput.name = 'specifications';
    document.getElementById('product-form').appendChild(specsInput);
  }
  specsInput.value = JSON.stringify(specs);
  vaiToast('Specs applied to form', 'success');
  preview.style.display = 'none';
}

function vaiShowPricingAdvice(advice) {
  let el = document.getElementById('vai-pricing-preview');
  if (!el) {
    el = document.createElement('div');
    el.id = 'vai-pricing-preview';
    el.style.cssText = 'margin-top:0.5rem;background:var(--stone-50);border:1px solid var(--stone-200);border-radius:8px;padding:0.75rem;display:none;';
    const priceCard = document.querySelectorAll('.vp-card')[1];
    if (priceCard) priceCard.appendChild(el);
  }
  el.innerHTML = '<div style="font-size:0.8125rem;font-weight:700;color:var(--stone-900);margin-bottom:6px;">💰 AI Pricing Advice</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">' +
    '<div style="text-align:center;padding:8px;background:rgba(16,185,129,0.08);border-radius:8px;"><div style="font-size:0.625rem;color:var(--stone-400);">MIN PRICE</div><div style="font-size:1rem;font-weight:700;color:#059669;">₦' + Number(advice.suggested_min || 0).toLocaleString() + '</div></div>' +
    '<div style="text-align:center;padding:8px;background:rgba(139,92,246,0.08);border-radius:8px;"><div style="font-size:0.625rem;color:var(--stone-400);">RECOMMENDED</div><div style="font-size:1rem;font-weight:700;color:#7c3aed;">₦' + Number(advice.recommended || 0).toLocaleString() + '</div></div>' +
    '</div>' +
    '<div style="font-size:0.75rem;color:var(--stone-600);margin-bottom:4px;"><strong>Strategy:</strong> ' + (advice.strategy || 'N/A') + '</div>' +
    '<div style="font-size:0.75rem;color:var(--stone-600);margin-bottom:8px;">' + (advice.reasoning || '') + '</div>' +
    '<div style="font-size:0.6875rem;color:var(--stone-400);font-style:italic;">💡 ' + (advice.discount_tip || '') + '</div>' +
    '<div style="margin-top:8px;"><button class="vai-inline-btn" onclick="vaiApplyPrice(' + (advice.recommended || 0) + ')">Apply Recommended Price</button></div>';
  el.style.display = 'block';
}

function vaiApplyPrice(price) {
  const priceInput = document.querySelector('input[name="price"]');
  if (priceInput) priceInput.value = price;
  vaiToast('Price applied!', 'success');
}

// FAB toggle
document.getElementById('vai-fab').addEventListener('click', () => {
  document.getElementById('vai-panel').classList.toggle('open');
});

// Close on outside click
document.addEventListener('click', (e) => {
  const panel = document.getElementById('vai-panel');
  const fab = document.getElementById('vai-fab');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !fab.contains(e.target)) {
    panel.classList.remove('open');
  }
});
</script>
