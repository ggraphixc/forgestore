{% extends "admin/sidebar.html" %}
{% block title %}Live Map — {{ settings.site_name|default('ForgeStore') }} Logistics{% endblock %}
{% block content %}
<link rel="stylesheet" href="/static/css/logistics.css">
<style>
    .lg-map-container {
        position: relative;
        width: 100%;
        height: 65vh;
        min-height: 400px;
        border-radius: var(--lg-radius);
        overflow: hidden;
        border: 1px solid var(--lg-border);
        box-shadow: var(--lg-shadow);
    }
    #logistics-map { width:100%; height:100%; }
    .lg-map-legend {
        position: absolute;
        bottom: 1rem;
        left: 1rem;
        background: var(--lg-surface);
        border: 1px solid var(--lg-border);
        border-radius: var(--lg-radius-sm);
        padding: .75rem 1rem;
        box-shadow: var(--lg-shadow-lg);
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: .5rem;
        font-size: .75rem;
    }
    .lg-map-legend-title { font-weight: 700; color: var(--lg-text); margin-bottom: .125rem; }
    .lg-map-legend-item { display:flex; align-items:center; gap:.5rem; color:var(--lg-text-secondary); }
    .lg-map-legend-dot { width:.625rem; height:.625rem; border-radius:50%; flex-shrink:0; }
    .lg-map-controls {
        position: absolute;
        top: 1rem;
        right: 1rem;
        z-index: 1000;
        display: flex;
        gap: .5rem;
    }
    .lg-map-btn {
        display: inline-flex;
        align-items: center;
        gap: .375rem;
        padding: .5rem .875rem;
        border: 1px solid var(--lg-border);
        border-radius: var(--lg-radius-sm);
        background: var(--lg-surface);
        color: var(--lg-text);
        font-size: .75rem;
        font-weight: 600;
        cursor: pointer;
        box-shadow: var(--lg-shadow);
        transition: all var(--lg-transition);
        min-height: 40px;
    }
    .lg-map-btn:hover { background:var(--lg-bg); border-color:var(--lg-primary); color:var(--lg-primary); }
    .lg-map-btn.active { background:var(--lg-primary); border-color:var(--lg-primary); color:#fff; }
    .lg-driver-panel {
        position: absolute;
        top: 1rem;
        left: 1rem;
        z-index: 1000;
        background: var(--lg-surface);
        border: 1px solid var(--lg-border);
        border-radius: var(--lg-radius);
        padding: 1rem;
        box-shadow: var(--lg-shadow-lg);
        max-height: 50vh;
        overflow-y: auto;
        width: 280px;
        display: none;
    }
    .lg-driver-panel.show { display:block; }
    .lg-driver-panel h3 { font-size:.8125rem; font-weight:700; color:var(--lg-text); margin:0 0 .75rem 0; }
    .lg-driver-item {
        display: flex;
        align-items: center;
        gap: .625rem;
        padding: .5rem 0;
        border-bottom: 1px solid var(--lg-border-light);
        cursor: pointer;
        transition: background var(--lg-transition);
    }
    .lg-driver-item:last-child { border-bottom:none; }
    .lg-driver-item:hover { background:var(--lg-bg); }
    .lg-driver-dot { width:.5rem; height:.5rem; border-radius:50%; flex-shrink:0; }
    .lg-driver-dot.available { background:var(--lg-green); box-shadow:0 0 6px rgba(16,185,129,.4); }
    .lg-driver-dot.busy { background:var(--lg-amber); box-shadow:0 0 6px rgba(245,158,11,.4); }
    .lg-driver-dot.offline { background:var(--lg-text-muted); }
    .lg-driver-info { flex:1; min-width:0; }
    .lg-driver-name { font-size:.8125rem; font-weight:600; color:var(--lg-text); }
    .lg-driver-meta { font-size:.6875rem; color:var(--lg-text-muted); }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<div class="lg-page">
    <div class="lg-header lg-animate">
        <div>
            <h1>Live Map</h1>
            <p class="lg-subtitle">Real-time driver GPS positions</p>
        </div>
        <div class="lg-header-actions">
            <button class="lg-map-btn" onclick="toggleDriverPanel()" id="driver-list-btn">☰ Drivers</button>
            <button class="lg-map-btn" onclick="refreshPositions()" id="refresh-btn">↻ Refresh</button>
        </div>
    </div>

    <div class="lg-map-container lg-animate lg-animate-delay-1">
        <div id="logistics-map"></div>

        <div class="lg-driver-panel" id="driver-panel">
            <h3>Delivery Drivers</h3>
            <div id="driver-list"></div>
        </div>

        <div class="lg-map-legend">
            <div class="lg-map-legend-title">Legend</div>
            <div class="lg-map-legend-item">
                <div class="lg-map-legend-dot" style="background:var(--lg-green);"></div>
                <span>Available</span>
            </div>
            <div class="lg-map-legend-item">
                <div class="lg-map-legend-dot" style="background:var(--lg-amber);"></div>
                <span>Busy / In Transit</span>
            </div>
            <div class="lg-map-legend-item">
                <div class="lg-map-legend-dot" style="background:var(--lg-text-muted);"></div>
                <span>Offline / No Signal</span>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    var map = L.map('logistics-map').setView([6.5244, 3.3792], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    var markers = {};
    var driverData = {{ drivers_json|safe }};
    var panelVisible = false;

    function statusColor(status) {
        if (status === 'AVAILABLE') return '#10b981';
        if (status === 'BUSY') return '#f59e0b';
        return '#94a3b8';
    }

    function createIcon(color) {
        return L.divIcon({
            className: '',
            html: '<div style="width:28px;height:28px;border-radius:50%;background:'+color+';border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
        });
    }

    function renderMarkers(data) {
        Object.values(markers).forEach(function(m){ map.removeLayer(m); });
        markers = {};
        var listHtml = '';
        data.forEach(function(d) {
            if (d.lat && d.lng) {
                var icon = createIcon(statusColor(d.status));
                var marker = L.marker([d.lat, d.lng], {icon: icon}).addTo(map);
                marker.bindPopup(
                    '<div style="font-family:system-ui;min-width:160px;">' +
                    '<div style="font-weight:700;font-size:14px;margin-bottom:4px;">'+d.name+'</div>' +
                    '<div style="font-size:12px;color:#666;margin-bottom:4px;">'+d.vehicle+'</div>' +
                    '<div style="font-size:12px;"><b>Status:</b> '+d.status+'</div>' +
                    '<div style="font-size:12px;"><b>Rating:</b> '+d.rating+' ⭐</div>' +
                    '<div style="font-size:11px;color:#999;margin-top:4px;">'+d.last_update+'</div>' +
                    '</div>'
                );
                markers[d.id] = marker;
            }
            listHtml += '<div class="lg-driver-item" onclick="focusDriver(\''+d.id+'\')">' +
                '<div class="lg-driver-dot '+d.status.toLowerCase()+'"></div>' +
                '<div class="lg-driver-info">' +
                '<div class="lg-driver-name">'+d.name+'</div>' +
                '<div class="lg-driver-meta">'+(d.vehicle||'---')+' &middot; '+d.status+'</div>' +
                '</div></div>';
        });
        document.getElementById('driver-list').innerHTML = listHtml || '<div style="padding:.75rem;color:var(--lg-text-muted);font-size:0.8125rem;">No drivers with GPS data</div>';
    }

    window.focusDriver = function(id) {
        if (markers[id]) {
            map.setView(markers[id].getLatLng(), 15);
            markers[id].openPopup();
        }
    };

    window.toggleDriverPanel = function() {
        panelVisible = !panelVisible;
        document.getElementById('driver-panel').classList.toggle('show', panelVisible);
        document.getElementById('driver-list-btn').classList.toggle('active', panelVisible);
    };

    window.refreshPositions = function() {
        var btn = document.getElementById('refresh-btn');
        btn.textContent = '↻ Loading...';
        fetch('/logistics/api/drivers/locations')
            .then(function(r){ return r.json(); })
            .then(function(data){
                driverData = data;
                renderMarkers(data);
                btn.textContent = '↻ Refresh';
            })
            .catch(function(){ btn.textContent = '↻ Refresh'; });
    };

    renderMarkers(driverData);

    setInterval(function(){
        fetch('/logistics/api/drivers/locations')
            .then(function(r){ return r.json(); })
            .then(function(data){
                driverData = data;
                renderMarkers(data);
            })
            .catch(function(){});
    }, 30000);
})();
</script>
{% endblock %}
