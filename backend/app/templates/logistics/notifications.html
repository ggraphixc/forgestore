{% extends "admin/sidebar.html" %}
{% block title %}Notifications — Logistics Portal{% endblock %}
{% block content %}
<link rel="stylesheet" href="/static/css/logistics.css">
<style>
    .ln-list-card { max-width: 50rem; }
    .ln-item {
        display: flex; gap: .75rem; padding: .875rem 1.25rem;
        border-bottom: 1px solid var(--lg-border-light);
        transition: background var(--lg-transition); cursor: default;
    }
    .ln-item:last-child { border-bottom: none; }
    .ln-item:hover { background: var(--lg-bg); }
    .ln-item.unread { background: var(--lg-amber-light); }
    .ln-icon {
        width: 2.25rem; height: 2.25rem; border-radius: var(--lg-radius-sm);
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0; font-size: .875rem;
    }
    .ln-icon.shipment { background: var(--lg-blue-light); color: var(--lg-blue); }
    .ln-icon.delivery { background: var(--lg-green-light); color: var(--lg-green); }
    .ln-icon.alert { background: var(--lg-red-light); color: var(--lg-red); }
    .ln-icon.general { background: var(--lg-purple-light); color: var(--lg-purple); }
    .ln-body { flex: 1; min-width: 0; }
    .ln-text { font-size: .8125rem; color: var(--lg-text); line-height: 1.5; }
    .ln-text strong { color: var(--lg-text); font-weight: 700; }
    .ln-time { font-size: .6875rem; color: var(--lg-text-muted); margin-top: .25rem; }
</style>

<div class="lg-page" style="max-width:50rem;margin:0 auto;">
    <div class="lg-header">
        <div>
            <h1>Notifications</h1>
            <p class="lg-subtitle">Stay updated on shipments and deliveries</p>
        </div>
    </div>
    <div class="lg-card ln-list-card lg-animate" id="ln-list">
        <div class="lg-empty">
            <div class="lg-empty-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            </div>
            <p>Loading notifications...</p>
        </div>
    </div>
</div>

<script>
async function lnLoad() {
  try {
    const res = await fetch('/api/notifications');
    const data = await res.json();
    const notifications = data.notifications || data || [];
    const el = document.getElementById('ln-list');
    if (!notifications.length) {
      el.innerHTML = '<div class="lg-empty"><div class="lg-empty-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg></div><p>No notifications yet</p></div>';
      return;
    }
    el.innerHTML = notifications.map(n => {
      const type = (n.type || 'general').toLowerCase();
      const iconClass = type.includes('shipment') || type.includes('delivery') ? 'shipment' : type.includes('alert') ? 'alert' : 'general';
      const icons = { shipment: '&#x1F4E6;', delivery: '&#x1F69A;', alert: '&#x26A0;', general: '&#x1F514;' };
      const date = n.created_at ? new Date(n.created_at).toLocaleDateString() : '';
      return '<div class="ln-item ' + (n.read ? '' : 'unread') + '">' +
        '<div class="ln-icon ' + iconClass + '">' + (icons[iconClass] || '&#x1F514;') + '</div>' +
        '<div class="ln-body">' +
          '<div class="ln-text">' + (n.message || n.title || '') + '</div>' +
          '<div class="ln-time">' + date + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  } catch(e) {
    document.getElementById('ln-list').innerHTML = '<div class="lg-empty"><p>Failed to load notifications</p></div>';
  }
}
lnLoad();
</script>
{% endblock %}
