<!-- ===== Cookie Consent Banner ===== -->
<div id="cookie-banner" class="fixed bottom-0 inset-x-0 p-3 sm:p-4 md:p-6 hidden" style="z-index: 9998;">
    <div class="max-w-4xl mx-auto bg-white dark:bg-stone-900 rounded-2xl shadow-2xl shadow-stone-900/20 border border-stone-200 dark:border-stone-700 p-5 sm:p-6 flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
        <!-- Icon -->
        <div class="w-10 h-10 bg-amber-100 dark:bg-amber-900/30 rounded-xl flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>

        <!-- Text -->
        <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold text-stone-900 dark:text-stone-100 mb-1">We value your privacy</p>
            <p class="text-xs text-stone-500 dark:text-stone-400 leading-relaxed">
                We use cookies to enhance your browsing experience, serve personalized content, and analyze our traffic. By clicking "Accept All", you consent to our use of cookies.
                <a href="#" class="text-amber-600 dark:text-amber-400 hover:underline font-medium">Learn more</a>
            </p>
        </div>

        <!-- Buttons -->
        <div class="flex items-center gap-2 w-full sm:w-auto flex-shrink-0">
            <button onclick="cookieConsent.reject()" class="flex-1 sm:flex-none px-4 py-2.5 text-xs font-semibold text-stone-600 dark:text-stone-400 bg-stone-100 dark:bg-stone-800 hover:bg-stone-200 dark:hover:bg-stone-700 rounded-xl transition-colors">
                Reject
            </button>
            <button onclick="cookieConsent.accept('necessary')" class="flex-1 sm:flex-none px-4 py-2.5 text-xs font-semibold text-stone-700 dark:text-stone-300 bg-stone-200 dark:bg-stone-700 hover:bg-stone-300 dark:hover:bg-stone-600 rounded-xl transition-colors">
                Necessary Only
            </button>
            <button onclick="cookieConsent.accept('all')" class="flex-1 sm:flex-none px-4 py-2.5 text-xs font-bold text-stone-950 bg-amber-500 hover:bg-amber-400 rounded-xl transition-colors shadow-sm">
                Accept All
            </button>
        </div>
    </div>
</div>

<script>
const cookieConsent = {
    KEY: 'forgestore_cookie_consent',

    init() {
        const stored = localStorage.getItem(this.KEY);
        if (!stored) {
            setTimeout(() => {
                document.getElementById('cookie-banner')?.classList.remove('hidden');
            }, 1500);
        }
    },

    accept(level) {
        localStorage.setItem(this.KEY, JSON.stringify({
            level: level,
            timestamp: Date.now(),
        }));
        this.hide();
        this.apply(level);
    },

    reject() {
        localStorage.setItem(this.KEY, JSON.stringify({
            level: 'necessary',
            timestamp: Date.now(),
        }));
        this.hide();
        this.apply('necessary');
    },

    hide() {
        const banner = document.getElementById('cookie-banner');
        if (banner) {
            banner.style.opacity = '0';
            banner.style.transform = 'translateY(100%)';
            banner.style.transition = 'all 0.3s ease-out';
            setTimeout(() => banner.classList.add('hidden'), 300);
        }
    },

    apply(level) {
        // Dispatch custom event for other scripts to listen to
        window.dispatchEvent(new CustomEvent('cookieConsent', { detail: { level } }));

        // Block/allow analytics based on consent
        if (level === 'all') {
            // Enable analytics, marketing cookies, etc.
            this.enableAnalytics();
        } else {
            // Necessary only — disable tracking
            this.disableAnalytics();
        }
    },

    enableAnalytics() {
        // Placeholder: inject GA4 or other analytics here
        // Example: gtag('consent', 'update', { analytics_storage: 'granted' });
    },

    disableAnalytics() {
        // Placeholder: revoke analytics consent
        // Example: gtag('consent', 'update', { analytics_storage: 'denied' });
    },

    getConsent() {
        try {
            return JSON.parse(localStorage.getItem(this.KEY));
        } catch {
            return null;
        }
    },

    hasConsent() {
        return !!this.getConsent();
    }
};

cookieConsent.init();
</script>
