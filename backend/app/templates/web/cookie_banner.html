<!-- ===== Cookie Consent Banner ===== -->
<style>
.cookie-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1rem;
    z-index: 9998;
    transition: opacity .3s ease-out, transform .3s ease-out;
}
.cookie-banner.hidden { display: none; }
.cookie-banner-wrap {
    max-width: 56rem;
    margin: 0 auto;
    background: #fff;
    border-radius: 1rem;
    box-shadow: 0 25px 50px -12px rgba(28, 25, 23, .2);
    border: 1px solid #e7e5e4;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1rem;
}
.cookie-banner-icon {
    width: 2.5rem;
    height: 2.5rem;
    background: #fef3c7;
    border-radius: .75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.cookie-banner-icon svg { width: 1.25rem; height: 1.25rem; color: #d97706; }
.cookie-banner-text { flex: 1; min-width: 0; }
.cookie-banner-text p { margin: 0; }
.cookie-banner-text-title { font-size: .875rem; font-weight: 600; color: #1c1917; margin-bottom: .25rem; }
.cookie-banner-text-desc { font-size: .75rem; color: #78716c; line-height: 1.6; }
.cookie-banner-text-desc a { color: #d97706; font-weight: 500; text-decoration: none; }
.cookie-banner-text-desc a:hover { text-decoration: underline; }
.cookie-banner-btns {
    display: flex;
    align-items: center;
    gap: .5rem;
    width: 100%;
    flex-shrink: 0;
}
.cookie-btn-reject,
.cookie-btn-necessary,
.cookie-btn-accept {
    flex: 1;
    padding: .625rem 1rem;
    border: none;
    border-radius: .75rem;
    font-size: .75rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s, color .2s;
}
.cookie-btn-reject {
    background: #f5f5f4;
    color: #57534e;
}
.cookie-btn-reject:hover { background: #e7e5e4; }
.cookie-btn-necessary {
    background: #e7e5e4;
    color: #44403c;
}
.cookie-btn-necessary:hover { background: #d6d3d1; }
.cookie-btn-accept {
    background: #f59e0b;
    color: #1c1917;
    font-weight: 700;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
.cookie-btn-accept:hover { background: #fbbf24; }

@media (min-width: 640px) {
    .cookie-banner { padding: 1.5rem; }
    .cookie-banner-wrap {
        flex-direction: row;
        align-items: center;
    }
    .cookie-banner-btns { width: auto; flex: none; }
}
</style>

<div id="cookie-banner" class="cookie-banner hidden" style="z-index: 9998;">
    <div class="cookie-banner-wrap">
        <!-- Icon -->
        <div class="cookie-banner-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
        </div>

        <!-- Text -->
        <div class="cookie-banner-text">
            <p class="cookie-banner-text-title">We value your privacy</p>
            <p class="cookie-banner-text-desc">
                We use cookies to enhance your browsing experience, serve personalized content, and analyze our traffic. By clicking "Accept All", you consent to our use of cookies.
                <a href="#">Learn more</a>
            </p>
        </div>

        <!-- Buttons -->
        <div class="cookie-banner-btns">
            <button onclick="cookieConsent.reject()" class="cookie-btn-reject">Reject</button>
            <button onclick="cookieConsent.accept('necessary')" class="cookie-btn-necessary">Necessary Only</button>
            <button onclick="cookieConsent.accept('all')" class="cookie-btn-accept">Accept All</button>
        </div>
    </div>
</div>

<script>
const cookieConsent = {
    KEY: 'forgestore_cookie_consent',

    init() {
        const stored = localStorage.getItem(this.KEY);
        if (!stored) {
            setTimeout(() => {
                document.getElementById('cookie-banner')?.classList.remove('hidden');
            }, 1500);
        }
    },

    accept(level) {
        localStorage.setItem(this.KEY, JSON.stringify({
            level: level,
            timestamp: Date.now(),
        }));
        this.hide();
        this.apply(level);
    },

    reject() {
        localStorage.setItem(this.KEY, JSON.stringify({
            level: 'necessary',
            timestamp: Date.now(),
        }));
        this.hide();
        this.apply('necessary');
    },

    hide() {
        const banner = document.getElementById('cookie-banner');
        if (banner) {
            banner.style.opacity = '0';
            banner.style.transform = 'translateY(100%)';
            banner.style.transition = 'all 0.3s ease-out';
            setTimeout(() => banner.classList.add('hidden'), 300);
        }
    },

    apply(level) {
        // Dispatch custom event for other scripts to listen to
        window.dispatchEvent(new CustomEvent('cookieConsent', { detail: { level } }));

        // Block/allow analytics based on consent
        if (level === 'all') {
            // Enable analytics, marketing cookies, etc.
            this.enableAnalytics();
        } else {
            // Necessary only — disable tracking
            this.disableAnalytics();
        }
    },

    enableAnalytics() {
        // Placeholder: inject GA4 or other analytics here
        // Example: gtag('consent', 'update', { analytics_storage: 'granted' });
    },

    disableAnalytics() {
        // Placeholder: revoke analytics consent
        // Example: gtag('consent', 'update', { analytics_storage: 'denied' });
    },

    getConsent() {
        try {
            return JSON.parse(localStorage.getItem(this.KEY));
        } catch {
            return null;
        }
    },

    hasConsent() {
        return !!this.getConsent();
    }
};

cookieConsent.init();
</script>
