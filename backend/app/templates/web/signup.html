{% extends "web/base.html" %}
{% block title %}Create Account — ForgeStore{% endblock %}
{% block content %}
<div class="relative min-h-[80vh] sm:min-h-[70vh] flex items-center justify-center px-4 py-12 sm:py-16 overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute inset-0 bg-gradient-to-br from-stone-50 via-white to-amber-50/30"></div>
    <div class="absolute top-10 right-1/4 w-[350px] h-[350px] bg-gradient-to-br from-amber-400/10 to-amber-500/5 rounded-full blur-[100px] blob-morph animate-drift"></div>
    <div class="absolute bottom-20 left-1/4 w-[250px] h-[250px] bg-gradient-to-br from-amber-300/8 to-orange-500/5 rounded-full blur-[80px] blob-morph-reverse animate-float-slow"></div>
    <div class="absolute inset-0 dots-pattern"></div>

    <div class="relative w-full max-w-md">
        <div class="text-center mb-8 reveal">
            <div class="w-16 h-16 bg-gradient-to-br from-stone-900 to-stone-700 dark:from-amber-600 dark:to-amber-700 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-warm ring-2 ring-amber-500/10">
                <span class="text-white text-2xl font-display font-black">FS</span>
            </div>
            <h1 class="text-2xl sm:text-3xl font-display font-black text-stone-900">Create your <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">account</span></h1>
            <p class="text-sm text-stone-500 mt-2">Join the ForgeStore community of artisans and collectors</p>
        </div>

        <div class="card-glass p-8 shadow-glass reveal" style="animation-delay: 100ms;">
            <form id="signup-form" class="space-y-5" onsubmit="event.preventDefault(); submitSignup()">
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5" for="name">Full Name</label>
                    <input id="name" name="name" required autocomplete="name"
                        class="input-forge"
                        placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5" for="email">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        class="input-forge"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5" for="password">Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password"
                            class="input-forge pr-11"
                            placeholder="At least 6 characters"
                            oninput="checkPasswordStrength(this.value)">
                        <button type="button" onclick="togglePasswordVisibility('password', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-stone-400 hover:text-stone-600 dark:hover:text-stone-300 transition-colors"
                            aria-label="Toggle password visibility" tabindex="-1">
                            <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="mt-2 space-y-1">
                        <div class="h-1 bg-stone-200 dark:bg-stone-700 rounded-full overflow-hidden">
                            <div id="pw-strength-bar" class="pw-strength-bar" style="width: 0;"></div>
                        </div>
                        <p id="pw-strength-text" class="text-[11px] text-stone-400 dark:text-stone-500">Type a password</p>
                    </div>
                </div>
                <button type="submit" id="signup-btn"
                    class="btn-forge min-h-[44px] w-full justify-center text-sm">
                    Create Account
                </button>
            </form>

            <div id="signup-error" class="mt-4 text-sm text-red-500 hidden p-3 bg-red-50 dark:bg-red-900/20 dark:text-red-400 rounded-xl"></div>

            <div class="mt-8 pt-6 border-t border-stone-200 dark:border-stone-700 text-center">
                <p class="text-sm text-stone-500 dark:text-stone-400">
                    Already have an account?
                    <a href="/shop/login{% if request.url.query %}?{{ request.url.query }}{% endif %}" class="font-semibold text-amber-600 dark:text-amber-400 hover:text-amber-700 dark:hover:text-amber-300 transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
// ===== Password Strength Checker =====
function checkPasswordStrength(password) {
    const bar = document.getElementById('pw-strength-bar');
    const text = document.getElementById('pw-strength-text');
    if (!bar || !text) return;
    
    if (!password) {
        bar.className = 'pw-strength-bar';
        bar.style.removeProperty('width');
        text.className = 'text-[11px] text-stone-400 dark:text-stone-500';
        text.textContent = 'Type a password';
        return;
    }
    
    let score = 0;
    if (password.length >= 6) score++;
    if (password.length >= 8) score++;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
    if (/\d/.test(password)) score++;
    if (/[^a-zA-Z0-9]/.test(password)) score++;
    
    // Remove any lingering inline width before applying class-based width
    bar.style.removeProperty('width');
    bar.className = 'pw-strength-bar';
    text.className = 'text-[11px]';
    
    if (score <= 1) {
        bar.classList.add('weak');
        text.classList.add('weak');
        text.textContent = 'Weak — try adding more characters';
    } else if (score <= 3) {
        bar.classList.add('medium');
        text.classList.add('medium');
        text.textContent = 'Medium — add a number or symbol to strengthen';
    } else {
        bar.classList.add('strong');
        text.classList.add('strong');
        text.textContent = 'Strong password!';
    }
}

async function submitSignup() {
    const btn = document.getElementById('signup-btn');
    const error = document.getElementById('signup-error');
    error.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span> Creating account...';

    const form = document.getElementById('signup-form');
    const formData = new FormData(form);

    try {
        const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.fromEntries(formData)),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Failed to create account');
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next') || '/shop';
        window.location.href = data.redirect || next;
    } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Create Account';
    }
}
</script>
{% endblock %}
