{% extends "web/base.html" %}
{% block title %}Page Not Found — ForgeStore{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4 py-24 relative overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-stone-50 via-white to-amber-50/20 dark:from-stone-950 dark:via-stone-900 dark:to-amber-950/20"></div>
  <div class="absolute top-1/2 left-1/4 w-[300px] h-[300px] bg-gradient-to-br from-amber-400/8 to-amber-500/3 rounded-full blur-[100px] blob-morph"></div>
  <div class="text-center max-w-lg mx-auto relative reveal">
    <div class="relative mb-8 inline-flex">
      <div class="w-28 h-28 bg-white dark:bg-stone-800 rounded-full flex items-center justify-center mx-auto border border-stone-200 dark:border-stone-700 shadow-card">
        <span class="text-5xl font-display font-black text-transparent bg-clip-text bg-gradient-to-br from-amber-500 to-amber-300">404</span>
      </div>
      <div class="absolute -top-2 -right-2 w-10 h-10 bg-amber-100 dark:bg-amber-900/40 rounded-full flex items-center justify-center shadow-glow-amber">
        <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
        </svg>
      </div>
    </div>
    <h1 class="text-3xl md:text-4xl font-display font-black text-stone-900 dark:text-stone-100 mb-3">Lost in the <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">Workshop</span></h1>
    <p class="text-stone-500 dark:text-stone-400 mb-8 leading-relaxed">The page you're looking for has wandered off like a stray chisel in the shop. Let's get you back to the forge.</p>
    <div class="flex items-center justify-center gap-4">
      <a href="/shop" class="btn-forge text-sm">
        Back to Home
      </a>
      <a href="/shop/marketplace" class="btn-outline text-sm">
        Browse Products
      </a>
    </div>
  </div>
</div>
{% endblock %}
