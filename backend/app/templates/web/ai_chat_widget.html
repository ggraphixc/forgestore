<!-- ===== AI Shopping Assistant Chat Widget ===== -->
<style>
@keyframes chatSlideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes chatSlideDown {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(16px) scale(0.97); }
}
@keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

.ai-chat-btn {
    position: fixed;
    bottom: 1.5rem;
    left: 1.5rem;
    width: 3.75rem;
    height: 3.75rem;
    border-radius: 9999px;
    border: none;
    cursor: grab;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #1c1917;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 25px 50px -12px rgba(245, 158, 11, .4);
    transition: box-shadow .3s ease;
    z-index: 9998;
    touch-action: none;
    user-select: none;
}
.ai-chat-btn.dragging { cursor: grabbing; transform: scale(1.1); box-shadow: 0 30px 60px -12px rgba(245, 158, 11, .55); transition: none; }
.ai-chat-btn:hover { box-shadow: 0 25px 50px -12px rgba(245, 158, 11, .55); }
.ai-chat-btn:active { transform: scale(.95); }
.ai-chat-btn svg { width: 1.5rem; height: 1.5rem; pointer-events: none; }

.ai-chat-panel {
    position: absolute;
    bottom: 5rem;
    left: 0;
    width: min(calc(100vw - 1.5rem), 380px);
    max-height: min(70vh, 520px);
    background: #fff;
    border-radius: 1.25rem;
    box-shadow: 0 25px 50px -12px rgba(28, 25, 23, .25);
    border: 1px solid #e7e5e4;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    animation: chatSlideUp .25s ease-out forwards;
}
@media (max-width: 480px) {
    .ai-chat-panel {
        width: calc(100vw - 1rem);
        max-height: 60vh;
        bottom: 5rem;
        left: 0;
        border-radius: 1rem;
    }
}
.ai-chat-panel.hidden { display: none; }

.ai-chat-header {
    background: linear-gradient(90deg, #1c1917, #292524);
    padding: .75rem 1rem;
    display: flex;
    align-items: center;
    gap: .625rem;
    flex-shrink: 0;
}
.ai-chat-header-icon {
    width: 2rem;
    height: 2rem;
    background: #f59e0b;
    border-radius: .5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.ai-chat-header-icon svg { width: 1rem; height: 1rem; color: #1c1917; }
.ai-chat-header-title { color: #fff; font-size: .8125rem; font-weight: 700; margin: 0; }
.ai-chat-header-sub { color: #a8a29e; font-size: .6875rem; margin: 1px 0 0; }
.ai-chat-header-close {
    padding: .375rem;
    color: #a8a29e;
    background: none;
    border: none;
    border-radius: .375rem;
    cursor: pointer;
    transition: color .2s, background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: auto;
}
.ai-chat-header-close:hover { color: #fff; background: rgba(255,255,255,.1); }

.ai-chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: .75rem;
    scroll-behavior: smooth;
}
.ai-chat-msg { display: flex; gap: .5rem; margin-bottom: .5rem; }
.ai-chat-avatar {
    width: 1.5rem;
    height: 1.5rem;
    border-radius: .375rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
}
.ai-chat-avatar svg { width: .75rem; height: .75rem; }
.ai-chat-avatar-user { background: #e7e5e4; color: #78716c; }
.ai-chat-avatar-bot { background: #fef3c7; color: #d97706; }
.ai-chat-bubble {
    border-radius: .75rem;
    padding: .5rem .75rem;
    max-width: 80%;
    font-size: .8125rem;
    line-height: 1.45;
    word-wrap: break-word;
}
.ai-chat-bubble-user {
    background: #f59e0b;
    color: #1c1917;
    border-top-right-radius: .25rem;
}
.ai-chat-bubble-bot {
    background: #f5f5f4;
    color: #44403c;
    border-top-left-radius: .25rem;
}

.ai-chat-input-area {
    border-top: 1px solid #e7e5e4;
    padding: .5rem .75rem;
    flex-shrink: 0;
}
.ai-chat-input-wrap { display: flex; align-items: center; gap: .375rem; }
.ai-chat-input {
    flex: 1;
    width: 100%;
    padding: .5rem .75rem;
    background: #f5f5f4;
    border: 1px solid #e7e5e4;
    border-radius: .625rem;
    font-size: .8125rem;
    color: #1c1917;
    resize: none;
    max-height: 4.5rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
}
.ai-chat-input::placeholder { color: #a8a29e; font-size: .75rem; }
.ai-chat-input:focus {
    border-color: #f59e0b;
    box-shadow: 0 0 0 2px rgba(245, 158, 11, .15);
}
.ai-chat-send {
    width: 2.25rem;
    height: 2.25rem;
    background: #f59e0b;
    color: #1c1917;
    border: none;
    border-radius: .625rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    cursor: pointer;
    transition: background .2s, transform .2s;
}
.ai-chat-send:hover { background: #fbbf24; transform: scale(1.05); }
.ai-chat-send:active { transform: scale(.95); }
.ai-chat-send:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.ai-chat-image-preview {
    display: none; gap: 6px; flex-wrap: wrap; padding-bottom: 6px;
}
.ai-chat-image-preview.has-image { display: flex; }
.ai-chat-attach {
    width: 30px; height: 30px; border-radius: 6px; border: none;
    background: #292524; color: #a8a29e; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
}
.ai-chat-attach:hover { background: #44403c; color: #fbbf24; }
.ai-chat-img-thumb {
    position: relative; display: inline-block; border-radius: 6px;
    overflow: hidden; border: 1px solid #e7e5e4;
}
.ai-chat-img-thumb img { display: block; max-height: 48px; max-width: 96px; }
.ai-chat-img-remove {
    position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
    border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10px; line-height: 1;
}
.ai-chat-file-tag {
    display: flex; align-items: center; gap: 4px; padding: 3px 6px;
    border-radius: 5px; border: 1px solid #e7e5e4; background: #f5f5f4;
}
.ai-chat-file-tag span { font-size: 10px; color: #57534e; }

.ai-chat-suggestions { padding: 0 .75rem .5rem; display: flex; gap: .375rem; flex-wrap: wrap; }
.ai-chat-suggestions.hidden { display: none; }
.ai-chat-sug-btn {
    font-size: .6875rem;
    padding: .25rem .625rem;
    background: #fffbeb;
    color: #b45309;
    border: 1px solid #fde68a;
    border-radius: 9999px;
    cursor: pointer;
    transition: background .2s;
    white-space: nowrap;
}
.ai-chat-sug-btn:hover { background: #fef3c7; }

.ai-chat-loading-dots { display: flex; align-items: center; gap: .375rem; padding: .5rem 0; }
.ai-chat-dot {
    width: .5rem;
    height: .5rem;
    background: #a8a29e;
    border-radius: 9999px;
    animation: dotBounce 1s infinite ease-in-out;
}
.ai-chat-dot:nth-child(2) { animation-delay: 150ms; }
.ai-chat-dot:nth-child(3) { animation-delay: 300ms; }

.ai-chat-label {
    position: absolute;
    bottom: 100%;
    left: 0;
    margin-bottom: .75rem;
    padding: .375rem .75rem;
    background: #1c1917;
    color: #fff;
    font-size: .75rem;
    font-weight: 500;
    border-radius: .5rem;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,0,0,.15);
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
}

@media (min-width: 640px) {
    .ai-chat-btn { bottom: 2rem; left: 2rem; width: 4rem; height: 4rem; }
    .ai-chat-btn svg { width: 1.75rem; height: 1.75rem; }
}
</style>

<div id="ai-chat-widget" class="fixed bottom-6 left-6 sm:bottom-8 sm:left-8" style="z-index: 9998;">
    <!-- Floating Button -->
    <button id="ai-chat-toggle" onclick="aiChat.toggle()" class="ai-chat-btn group" aria-label="Chat with AI Assistant">
        <svg id="ai-chat-icon-open" class="w-6 h-6 sm:w-7 sm:h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <svg id="ai-chat-icon-close" class="w-6 h-6 sm:w-7 sm:h-7 hidden group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
    </button>
    <!-- Label tooltip -->
    <div id="ai-chat-label" class="ai-chat-label">
        Ask AI Assistant
        <div class="absolute top-full left-6 w-0 h-0 border-l-[5px] border-r-[5px] border-t-[5px] border-l-transparent border-r-transparent border-t-stone-900 dark:border-t-stone-700"></div>
    </div>

    <!-- Chat Panel -->
    <div id="ai-chat-panel" class="ai-chat-panel hidden">
        <!-- Header -->
        <div class="ai-chat-header">
            <div class="ai-chat-header-icon">
                <svg class="w-5 h-5 text-stone-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="ai-chat-header-title">{{ settings.site_name|default('ForgeStore') }} AI Assistant</h3>
                <p class="ai-chat-header-sub">Ask me anything about our products</p>
            </div>
            <button onclick="aiChat.toggle()" class="ai-chat-header-close" aria-label="Close chat">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="ai-chat-messages" class="ai-chat-messages">
            <div class="ai-chat-msg">
                <div class="ai-chat-avatar ai-chat-avatar-bot">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                </div>
                <div class="ai-chat-bubble ai-chat-bubble-bot">
                    <p>Hi! I'm your AI shopping assistant. I can help you find products, compare options, or answer questions about our marketplace. What are you looking for?</p>
                </div>
            </div>
        </div>

        <!-- Suggestions -->
        <div id="ai-chat-suggestions" class="ai-chat-suggestions">
            <button onclick="aiChat.send('Show me popular products')" class="ai-chat-sug-btn">Popular items</button>
            <button onclick="aiChat.send('What do you recommend?')" class="ai-chat-sug-btn">Recommendations</button>
            <button onclick="aiChat.send('Help me find something specific')" class="ai-chat-sug-btn">Find something</button>
        </div>

        <!-- Input -->
        <div class="ai-chat-input-area">
            <form id="ai-chat-form" onsubmit="aiChat.submit(event)" class="ai-chat-input-wrap">
                <input type="file" id="ai-chat-file" accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx" style="display:none;" onchange="aiChat.onFileSelect(event)">
                <button type="button" id="ai-chat-attach" onclick="document.getElementById('ai-chat-file').click()" aria-label="Attach image or file" class="ai-chat-attach">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
                <div class="flex-1 relative" style="min-width:0;">
                    <div id="ai-chat-image-preview" class="ai-chat-image-preview"></div>
                    <textarea id="ai-chat-input" rows="1" placeholder="Ask about products, get recommendations..." class="ai-chat-input" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();aiChat.submit(event)}"></textarea>
                </div>
                <button type="submit" id="ai-chat-send" class="ai-chat-send" aria-label="Send message">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
(function() {
    const chat = {
        isOpen: false,
        sessionId: null,
        isLoading: false,
        loadingEl: null,
        pendingImage: null,

        init() {
            this.sessionId = 'ai_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        },

        onFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const preview = document.getElementById('ai-chat-image-preview');
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    this.pendingImage = { type: 'image', data: ev.target.result, name: file.name };
                    preview.innerHTML = '<div class="ai-chat-img-thumb"><img src="' + ev.target.result + '"><button onclick="aiChat.removeImage()" class="ai-chat-img-remove">&times;</button></div>';
                    preview.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            } else {
                this.pendingImage = { type: 'file', data: null, name: file.name, mime: file.type };
                preview.innerHTML = '<div class="ai-chat-file-tag"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>' + file.name + '</span><button onclick="aiChat.removeImage()" class="ai-chat-img-remove" style="position:static;width:16px;height:16px;font-size:10px;">&times;</button></div>';
                preview.classList.add('has-image');
            }
            e.target.value = '';
        },

        removeImage() {
            this.pendingImage = null;
            const preview = document.getElementById('ai-chat-image-preview');
            preview.innerHTML = '';
            preview.classList.remove('has-image');
        },

        toggle() {
            this.isOpen = !this.isOpen;
            const panel = document.getElementById('ai-chat-panel');
            const iconOpen = document.getElementById('ai-chat-icon-open');
            const iconClose = document.getElementById('ai-chat-icon-close');
            const label = document.getElementById('ai-chat-label');

            if (label) label.style.opacity = '0';

            if (this.isOpen) {
                panel.classList.remove('hidden');
                panel.style.animation = 'chatSlideUp 0.25s ease-out forwards';
                iconOpen.classList.add('hidden');
                iconClose.classList.remove('hidden');
                document.getElementById('ai-chat-input').focus();
            } else {
                panel.style.animation = 'chatSlideDown 0.2s ease-in forwards';
                iconOpen.classList.remove('hidden');
                iconClose.classList.add('hidden');
                setTimeout(() => {
                    panel.classList.add('hidden');
                    panel.style.animation = '';
                }, 200);
            }
        },

        async send(text) {
            if (this.isLoading) return;
            const input = document.getElementById('ai-chat-input');
            const message = text || input.value.trim();
            const image = this.pendingImage;
            if (!message && !image) return;

            input.value = '';
            this.autoResize(input);
            this.removeImage();
            this.addMessage(message || (image ? '📎 ' + image.name : ''), 'user');
            this.setLoading(true);
            this.hideSuggestions();

            const body = { session_id: this.sessionId, message: message || 'Analyze this file' };

            if (image) {
                if (image.type === 'image' && image.data) {
                    body.image_url = image.data;
                } else if (image.type === 'file') {
                    body.message = (message || 'Analyze this file') + ' [Attached: ' + image.name + ']';
                }
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 120000);
                const res = await fetch('/api/ai/assistant/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: controller.signal,
                });
                clearTimeout(timeoutId);

                if (!res.ok) {
                    throw new Error('Server returned ' + res.status);
                }

                const data = await res.json();
                this.addMessage(data.response || "I couldn't process that request. Please try again.", 'assistant');
                if (data.suggestions && data.suggestions.length > 0) {
                    this.showSuggestions(data.suggestions);
                }
            } catch (err) {
                console.error('AI chat error:', err);
                this.addMessage("Sorry, I'm having trouble connecting. Please try again later.", 'assistant');
            } finally {
                this.setLoading(false);
            }
        },

        submit(e) {
            e.preventDefault();
            this.send();
        },

        addMessage(text, role) {
            const container = document.getElementById('ai-chat-messages');
            const div = document.createElement('div');
            div.className = 'ai-chat-msg';

            const avatarClass = role === 'user' ? 'ai-chat-avatar ai-chat-avatar-user' : 'ai-chat-avatar ai-chat-avatar-bot';
            const avatarSvg = role === 'user'
                ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'
                : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>';

            const bubbleClass = role === 'user'
                ? 'ai-chat-bubble ai-chat-bubble-user'
                : 'ai-chat-bubble ai-chat-bubble-bot';
            const content = role === 'user'
                ? '<p class="whitespace-pre-wrap">' + this.escapeHtml(text) + '</p>'
                : '<p class="whitespace-pre-wrap">' + this.formatResponse(text) + '</p>';

            div.innerHTML = '<div class="' + avatarClass + '">' + avatarSvg + '</div><div class="' + bubbleClass + '">' + content + '</div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        addLoadingDots() {
            const container = document.getElementById('ai-chat-messages');
            const div = document.createElement('div');
            div.id = 'ai-chat-loading';
            div.className = 'ai-chat-msg';
            div.innerHTML = '<div class="ai-chat-avatar ai-chat-avatar-bot"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg></div><div class="ai-chat-bubble ai-chat-bubble-bot"><div class="ai-chat-loading-dots"><span class="ai-chat-dot"></span><span class="ai-chat-dot"></span><span class="ai-chat-dot"></span></div></div>';
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        removeLoadingDots() {
            const el = document.getElementById('ai-chat-loading');
            if (el) el.remove();
        },

        formatResponse(text) {
            let html = this.escapeHtml(text);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\n/g, '<br>');
            return html;
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        setLoading(loading) {
            this.isLoading = loading;
            const btn = document.getElementById('ai-chat-send');
            const input = document.getElementById('ai-chat-input');
            btn.disabled = loading;
            input.disabled = loading;

            if (loading) {
                this.addLoadingDots();
            } else {
                this.removeLoadingDots();
            }
        },

        showSuggestions(suggestions) {
            const container = document.getElementById('ai-chat-suggestions');
            container.innerHTML = '';
            suggestions.slice(0, 3).forEach(s => {
                const btn = document.createElement('button');
                btn.textContent = s;
                btn.className = 'ai-chat-sug-btn';
                btn.onclick = () => this.send(s);
                container.appendChild(btn);
            });
            container.classList.remove('hidden');
        },

        hideSuggestions() {
            document.getElementById('ai-chat-suggestions').classList.add('hidden');
        },

        autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 96) + 'px';
        }
    };

    chat.init();
    window.aiChat = chat;

    // Drag-to-move for chat button
    (function() {
        const btn = document.getElementById('ai-chat-toggle');
        const panel = document.getElementById('ai-chat-panel');
        if (!btn) return;

        const STORAGE_KEY = 'ai_chat_widget_pos';
        let isDragging = false;
        let hasMoved = false;
        let startX, startY, startLeft, startBottom;

        // Restore saved position
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (saved && typeof saved.left === 'number' && typeof saved.bottom === 'number') {
                btn.style.left = saved.left + 'px';
                btn.style.bottom = saved.bottom + 'px';
                btn.style.right = 'auto';
            }
        } catch {}

        function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

        function onStart(e) {
            isDragging = false;
            hasMoved = false;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            startLeft = btn.getBoundingClientRect().left;
            startBottom = window.innerHeight - btn.getBoundingClientRect().bottom;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        function onMove(e) {
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
            if (!isDragging) return;
            e.preventDefault();
            hasMoved = true;
            btn.classList.add('dragging');
            const newLeft = clamp(startLeft + dx, 8, window.innerWidth - 68);
            const newBottom = clamp(startBottom - dy, 8, window.innerHeight - 68);
            btn.style.left = newLeft + 'px';
            btn.style.bottom = newBottom + 'px';
            btn.style.right = 'auto';
        }

        function onEnd() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
            btn.classList.remove('dragging');
            if (hasMoved) {
                // Save position
                const rect = btn.getBoundingClientRect();
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    left: rect.left,
                    bottom: window.innerHeight - rect.bottom
                }));
                // Prevent toggle on drag end
                e && e.stopPropagation && e.stopPropagation();
            }
        }

        btn.addEventListener('mousedown', onStart);
        btn.addEventListener('touchstart', onStart, { passive: true });

        // Prevent toggle when dragging
        const origToggle = chat.toggle.bind(chat);
        chat.toggle = function() {
            if (hasMoved) { hasMoved = false; return; }
            origToggle();
        };
    })();

    const input = document.getElementById('ai-chat-input');
    if (input) {
        input.addEventListener('input', function() { chat.autoResize(this); });
    }

    // Show label on hover
    const toggleBtn = document.getElementById('ai-chat-toggle');
    const label = document.getElementById('ai-chat-label');
    if (toggleBtn && label) {
        toggleBtn.addEventListener('mouseenter', function() {
            if (!chat.isOpen) label.style.opacity = '1';
        });
        toggleBtn.addEventListener('mouseleave', function() {
            label.style.opacity = '0';
        });
    }
})();
</script>
