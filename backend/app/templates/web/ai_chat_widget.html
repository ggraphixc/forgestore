<!-- ===== AI Shopping Assistant Chat Widget ===== -->
<div id="ai-chat-widget" class="fixed bottom-4 left-4 sm:bottom-6 sm:left-6" style="z-index: 9999;">
    <!-- Floating Button -->
    <button id="ai-chat-toggle" onclick="aiChat.toggle()" class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-stone-950 rounded-2xl shadow-2xl shadow-amber-500/30 flex items-center justify-center transition-all duration-300 hover:scale-110 active:scale-95 group" aria-label="Chat with AI Assistant">
        <svg id="ai-chat-icon-open" class="w-6 h-6 sm:w-7 sm:h-7 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <svg id="ai-chat-icon-close" class="w-6 h-6 sm:w-7 sm:h-7 hidden group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
        <!-- Pulse indicator -->
        <span class="absolute -top-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-white animate-pulse"></span>
    </button>

    <!-- Chat Panel -->
    <div id="ai-chat-panel" class="hidden absolute bottom-20 left-0 w-[calc(100vw-2rem)] sm:w-[420px] max-h-[75vh] sm:max-h-[600px] bg-white dark:bg-stone-900 rounded-3xl shadow-2xl shadow-stone-900/20 border border-stone-200 dark:border-stone-700 overflow-hidden flex flex-col transition-all duration-300 origin-bottom-left scale-95 opacity-0">
        <!-- Header -->
        <div class="bg-gradient-to-r from-stone-900 to-stone-800 dark:from-stone-800 dark:to-stone-900 px-5 py-4 flex items-center gap-3 flex-shrink-0">
            <div class="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-stone-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                </svg>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="text-white text-sm font-bold">ForgeAI Assistant</h3>
                <p class="text-stone-400 text-xs">Ask me anything about our products</p>
            </div>
            <button onclick="aiChat.toggle()" class="p-2 text-stone-400 hover:text-white transition-colors rounded-lg hover:bg-white/10" aria-label="Close chat">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Messages -->
        <div id="ai-chat-messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 scroll-smooth">
            <!-- Welcome message -->
            <div class="flex gap-3">
                <div class="w-8 h-8 bg-amber-100 dark:bg-amber-900/30 rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                </div>
                <div class="bg-stone-100 dark:bg-stone-800 rounded-2xl rounded-tl-md px-4 py-3 max-w-[85%]">
                    <p class="text-sm text-stone-700 dark:text-stone-300">Hi! I'm your AI shopping assistant. I can help you find products, compare options, or answer questions about our marketplace. What are you looking for?</p>
                </div>
            </div>
        </div>

        <!-- Suggestions -->
        <div id="ai-chat-suggestions" class="px-4 pb-2 flex gap-2 flex-wrap flex-shrink-0">
            <button onclick="aiChat.send('Show me popular products')" class="text-xs px-3 py-1.5 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 rounded-full border border-amber-200 dark:border-amber-800 hover:bg-amber-100 dark:hover:bg-amber-900/30 transition-colors">Popular items</button>
            <button onclick="aiChat.send('What do you recommend?')" class="text-xs px-3 py-1.5 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 rounded-full border border-amber-200 dark:border-amber-800 hover:bg-amber-100 dark:hover:bg-amber-900/30 transition-colors">Recommendations</button>
            <button onclick="aiChat.send('Help me find something specific')" class="text-xs px-3 py-1.5 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 rounded-full border border-amber-200 dark:border-amber-800 hover:bg-amber-100 dark:hover:bg-amber-900/30 transition-colors">Find something</button>
        </div>

        <!-- Input -->
        <div class="border-t border-stone-200 dark:border-stone-700 px-4 py-3 flex-shrink-0">
            <form id="ai-chat-form" onsubmit="aiChat.submit(event)" class="flex items-end gap-2">
                <div class="flex-1 relative">
                    <textarea id="ai-chat-input" rows="1" placeholder="Ask about products, get recommendations..." class="w-full px-4 py-3 bg-stone-100 dark:bg-stone-800 border border-stone-200 dark:border-stone-700 rounded-xl text-sm text-stone-900 dark:text-stone-100 placeholder-stone-400 dark:placeholder-stone-500 focus:outline-none focus:ring-2 focus:ring-amber-500/30 focus:border-amber-500 transition-all resize-none max-h-24" onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();aiChat.submit(event)}"></textarea>
                </div>
                <button type="submit" id="ai-chat-send" class="w-11 h-11 bg-amber-500 hover:bg-amber-400 text-stone-950 rounded-xl flex items-center justify-center flex-shrink-0 transition-all hover:scale-105 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed" aria-label="Send message">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
(function() {
    const chat = {
        isOpen: false,
        sessionId: null,
        isLoading: false,

        init() {
            this.sessionId = 'ai_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        },

        toggle() {
            this.isOpen = !this.isOpen;
            const panel = document.getElementById('ai-chat-panel');
            const iconOpen = document.getElementById('ai-chat-icon-open');
            const iconClose = document.getElementById('ai-chat-icon-close');

            if (this.isOpen) {
                panel.classList.remove('hidden');
                requestAnimationFrame(() => {
                    panel.classList.remove('scale-95', 'opacity-0');
                    panel.classList.add('scale-100', 'opacity-100');
                });
                iconOpen.classList.add('hidden');
                iconClose.classList.remove('hidden');
                document.getElementById('ai-chat-input').focus();
            } else {
                panel.classList.remove('scale-100', 'opacity-100');
                panel.classList.add('scale-95', 'opacity-0');
                iconOpen.classList.remove('hidden');
                iconClose.classList.add('hidden');
                setTimeout(() => panel.classList.add('hidden'), 300);
            }
        },

        async send(text) {
            if (this.isLoading) return;
            const input = document.getElementById('ai-chat-input');
            const message = text || input.value.trim();
            if (!message) return;

            input.value = '';
            this.autoResize(input);
            this.addMessage(message, 'user');
            this.setLoading(true);
            this.hideSuggestions();

            try {
                const res = await fetch('/api/ai/assistant/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: this.sessionId,
                        message: message,
                    }),
                });
                const data = await res.json();
                this.addMessage(data.response || "I couldn't process that request. Please try again.", 'assistant');
                if (data.suggestions && data.suggestions.length > 0) {
                    this.showSuggestions(data.suggestions);
                }
            } catch (err) {
                this.addMessage("Sorry, I'm having trouble connecting. Please try again later.", 'assistant');
            } finally {
                this.setLoading(false);
            }
        },

        submit(e) {
            e.preventDefault();
            this.send();
        },

        addMessage(text, role) {
            const container = document.getElementById('ai-chat-messages');
            const div = document.createElement('div');
            div.className = 'flex gap-3 ' + (role === 'user' ? 'flex-row-reverse' : '');

            const avatar = role === 'user'
                ? '<div class="w-8 h-8 bg-stone-200 dark:bg-stone-700 rounded-lg flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg></div>'
                : '<div class="w-8 h-8 bg-amber-100 dark:bg-amber-900/30 rounded-lg flex items-center justify-center flex-shrink-0"><svg class="w-4 h-4 text-amber-600 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg></div>';

            const bubble = role === 'user'
                ? '<div class="bg-amber-500 text-stone-950 rounded-2xl rounded-tr-md px-4 py-3 max-w-[85%]"><p class="text-sm whitespace-pre-wrap">' + this.escapeHtml(text) + '</p></div>'
                : '<div class="bg-stone-100 dark:bg-stone-800 rounded-2xl rounded-tl-md px-4 py-3 max-w-[85%]"><p class="text-sm text-stone-700 dark:text-stone-300 whitespace-pre-wrap">' + this.formatResponse(text) + '</p></div>';

            div.innerHTML = avatar + bubble;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        formatResponse(text) {
            // Basic markdown-like formatting
            let html = this.escapeHtml(text);
            // Bold
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Line breaks
            html = html.replace(/\n/g, '<br>');
            return html;
        },

        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        },

        setLoading(loading) {
            this.isLoading = loading;
            const btn = document.getElementById('ai-chat-send');
            const input = document.getElementById('ai-chat-input');
            btn.disabled = loading;
            input.disabled = loading;

            if (loading) {
                this.addMessage('...', 'assistant-loading');
            } else {
                const loadingMsg = document.querySelector('.ai-loading');
                if (loadingMsg) loadingMsg.closest('.flex.gap-3')?.remove();
            }
        },

        showSuggestions(suggestions) {
            const container = document.getElementById('ai-chat-suggestions');
            container.innerHTML = '';
            suggestions.slice(0, 3).forEach(s => {
                const btn = document.createElement('button');
                btn.textContent = s;
                btn.className = 'text-xs px-3 py-1.5 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 rounded-full border border-amber-200 dark:border-amber-800 hover:bg-amber-100 dark:hover:bg-amber-900/30 transition-colors';
                btn.onclick = () => this.send(s);
                container.appendChild(btn);
            });
            container.classList.remove('hidden');
        },

        hideSuggestions() {
            document.getElementById('ai-chat-suggestions').classList.add('hidden');
        },

        autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 96) + 'px';
        }
    };

    // Init and expose globally
    chat.init();
    window.aiChat = chat;

    // Auto-resize input
    const input = document.getElementById('ai-chat-input');
    if (input) {
        input.addEventListener('input', function() { chat.autoResize(this); });
    }
})();
</script>

<style>
/* Loading animation */
.ai-loading-dots::after {
    content: '';
    animation: dots 1.4s steps(4, end) infinite;
}
@keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
}
</style>
