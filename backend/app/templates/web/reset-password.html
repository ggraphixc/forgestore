{% extends "web/base.html" %}
{% block title %}Set New Password — ForgeStore{% endblock %}
{% block content %}
<div class="relative min-h-[70vh] flex items-center justify-center px-4 py-16 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-stone-50 via-white to-amber-50/30"></div>
    <div class="absolute top-20 left-1/4 w-[400px] h-[400px] bg-gradient-to-br from-amber-400/10 to-amber-500/5 rounded-full blur-[100px] blob-morph animate-float-slow"></div>
    <div class="absolute bottom-20 right-1/4 w-[300px] h-[300px] bg-gradient-to-br from-amber-300/8 to-orange-500/5 rounded-full blur-[80px] blob-morph-reverse animate-drift"></div>
    <div class="absolute inset-0 dots-pattern"></div>

    <div class="relative w-full max-w-md">
        <div class="text-center mb-8 reveal">
            <div class="w-16 h-16 bg-gradient-to-br from-stone-900 to-stone-700 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-warm ring-2 ring-amber-500/10">
                <span class="text-white text-2xl font-display font-black">FS</span>
            </div>
            <h1 class="text-3xl font-display font-black text-stone-900">New <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">Password</span></h1>
            <p class="text-sm text-stone-500 mt-2">Choose a new password for your account</p>
        </div>

        <div class="card-glass p-8 shadow-glass reveal" style="animation-delay: 100ms;">
            <form id="reset-form" class="space-y-5" onsubmit="event.preventDefault(); submitResetPassword()">
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1.5" for="password">New Password</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" required minlength="6" autocomplete="new-password"
                            class="input-forge pr-11"
                            placeholder="At least 6 characters">
                        <button type="button" onclick="togglePasswordVisibility('password', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-stone-400 hover:text-stone-600 dark:hover:text-stone-300 transition-colors"
                            aria-label="Toggle password visibility" tabindex="-1">
                            <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700 mb-1.5" for="confirm">Confirm Password</label>
                    <div class="relative">
                        <input id="confirm" name="confirm" type="password" required minlength="6" autocomplete="new-password"
                            class="input-forge pr-11"
                            placeholder="Repeat password">
                        <button type="button" onclick="togglePasswordVisibility('confirm', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-stone-400 hover:text-stone-600 dark:hover:text-stone-300 transition-colors"
                            aria-label="Toggle password visibility" tabindex="-1">
                            <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="reset-btn"
                    class="btn-forge w-full justify-center text-sm">
                    Reset Password
                </button>
            </form>

            <div id="reset-success" class="mt-4 text-sm text-emerald-600 dark:text-emerald-400 hidden p-3 bg-emerald-50 dark:bg-emerald-900/20 rounded-xl"></div>
            <div id="reset-error" class="mt-4 text-sm text-red-500 dark:text-red-400 hidden p-3 bg-red-50 dark:bg-red-900/20 rounded-xl"></div>

            <div class="mt-8 pt-6 border-t border-stone-200 dark:border-stone-700 text-center">
                <p class="text-sm text-stone-500">
                    <a href="/shop/login" class="font-semibold text-amber-600 hover:text-amber-700 transition-colors">← Back to sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
async function submitResetPassword() {
    const btn = document.getElementById('reset-btn');
    const error = document.getElementById('reset-error');
    const success = document.getElementById('reset-success');
    error.classList.add('hidden');
    success.classList.add('hidden');

    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;

    if (password !== confirm) {
        error.textContent = 'Passwords do not match';
        error.classList.remove('hidden');
        return;
    }

    if (password.length < 6) {
        error.textContent = 'Password must be at least 6 characters';
        error.classList.remove('hidden');
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span> Resetting...';

    try {
        const token = '{{ token }}';
        const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Reset failed');

        success.textContent = '✓ Password reset successfully! Redirecting to sign in...';
        success.classList.remove('hidden');
        btn.textContent = 'Reset Password';
        btn.disabled = false;

        setTimeout(() => {
            window.location.href = '/shop/login';
        }, 2000);
    } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
        btn.textContent = 'Reset Password';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
