{% extends "web/base.html" %}
{% block title %}Sign In — ForgeStore{% endblock %}
{% block content %}
<div class="relative min-h-[70vh] flex items-center justify-center px-4 py-16 overflow-hidden">
    <!-- Decorative background blobs -->
    <div class="absolute inset-0 bg-gradient-to-br from-stone-50 via-white to-amber-50/30"></div>
    <div class="absolute top-20 left-1/4 w-[400px] h-[400px] bg-gradient-to-br from-amber-400/10 to-amber-500/5 rounded-full blur-[100px] blob-morph animate-float-slow"></div>
    <div class="absolute bottom-20 right-1/4 w-[300px] h-[300px] bg-gradient-to-br from-amber-300/8 to-orange-500/5 rounded-full blur-[80px] blob-morph-reverse animate-drift"></div>
    <div class="absolute inset-0 dots-pattern"></div>

    <div class="relative w-full max-w-md">
        <div class="text-center mb-8 reveal">
            <div class="w-16 h-16 bg-gradient-to-br from-stone-900 to-stone-700 dark:from-amber-600 dark:to-amber-700 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-warm ring-2 ring-amber-500/10">
                <span class="text-white text-2xl font-display font-black">FS</span>
            </div>
            <h1 class="text-3xl font-display font-black text-stone-900">Welcome <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">back</span></h1>
            <p class="text-sm text-stone-500 mt-2">Sign in to your ForgeStore account</p>
        </div>

        <div class="card-glass p-8 shadow-glass reveal" style="animation-delay: 100ms;">
            <form id="login-form" class="space-y-5" onsubmit="event.preventDefault(); submitLogin()">
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5" for="email">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        class="input-forge"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-stone-700 dark:text-stone-300 mb-1.5" for="password">Password</label>
                    <input id="password" name="password" type="password" required autocomplete="current-password"
                        class="input-forge"
                        placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-stone-300 text-amber-600 focus:ring-amber-500/20">
                        <span class="text-sm text-stone-500 dark:text-stone-400">Remember me</span>
                    </label>
                    <a href="/shop/forgot-password" class="text-sm text-amber-600 dark:text-amber-400 hover:text-amber-700 dark:hover:text-amber-300 transition-colors font-medium">Forgot password?</a>
                </div>
                <button type="submit" id="login-btn"
                    class="btn-forge w-full justify-center text-sm">
                    Sign In
                </button>
            </form>

            <div id="login-error" class="mt-4 text-sm text-red-500 hidden p-3 bg-red-50 dark:bg-red-900/20 dark:text-red-400 rounded-xl"></div>

            <div class="mt-8 pt-6 border-t border-stone-200 dark:border-stone-700 text-center">
                <p class="text-sm text-stone-500 dark:text-stone-400">
                    Don't have an account?
                    <a href="/shop/signup{% if request.url.query %}?{{ request.url.query }}{% endif %}" class="font-semibold text-amber-600 dark:text-amber-400 hover:text-amber-700 dark:hover:text-amber-300 transition-colors">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script>
async function submitLogin() {
    const btn = document.getElementById('login-btn');
    const error = document.getElementById('login-error');
    error.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span> Signing in...';

    const form = document.getElementById('login-form');
    const formData = new FormData(form);

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(Object.fromEntries(formData)),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Invalid credentials');
        const params = new URLSearchParams(window.location.search);
        const next = params.get('next') || '/shop';
        window.location.href = data.redirect || next;
    } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
    }
}
</script>
{% endblock %}
