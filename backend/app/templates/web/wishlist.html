{% extends "web/base.html" %}
{% block title %}My Wishlist — ForgeStore{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-10 reveal">
        <div>
            <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 dark:text-amber-400 mb-2 block">Saved Items</span>
            <h1 class="text-4xl md:text-5xl font-black text-stone-900 dark:text-stone-100 font-display">
                My <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">Wishlist</span>
            </h1>
            <p class="text-stone-500 dark:text-stone-400 mt-2" id="wishlist-count">Loading your saved pieces...</p>
        </div>
    </div>

    <!-- Wishlist Grid -->
    <div id="wishlist-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
        <div class="col-span-full text-center py-20">
            <div class="animate-spin w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-sm text-stone-400">Loading wishlist...</p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/wishlist');
        const data = await res.json();

        const countEl = document.getElementById('wishlist-count');
        const grid = document.getElementById('wishlist-grid');

        if (data.items && data.items.length > 0) {
            countEl.textContent = `${data.items.length} saved piece${data.items.length !== 1 ? 's' : ''}`;

            grid.innerHTML = data.items.map(p => `
                <div class="card-product group reveal-scale relative wishlist-item-${p.id}">
                    <a href="/shop/products/${p.slug}">
                        <div class="aspect-[3/4] overflow-hidden bg-stone-50 dark:bg-stone-700 relative">
                            ${p.image
                                ? `<img loading="lazy" src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 ease-out">`
                                : `<div class="w-full h-full flex items-center justify-center text-stone-300 dark:text-stone-500">
                                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                                   </div>`
                            }
                            <button onclick="event.preventDefault(); event.stopPropagation(); toggleWishlist('${p.id}', this)" class="absolute top-3 right-3 w-9 h-9 bg-white/90 dark:bg-stone-800/90 backdrop-blur-sm rounded-full shadow-lg flex items-center justify-center hover:scale-110 transition-transform duration-200 z-10" aria-label="Remove from wishlist">
                                <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="p-3 sm:p-4">
                            <h3 class="text-xs sm:text-sm font-semibold text-stone-900 dark:text-stone-100 group-hover:text-amber-700 dark:group-hover:text-amber-400 transition-colors line-clamp-1">${p.name}</h3>
                            <div class="flex items-center justify-between mt-2">
                                <span class="text-sm font-bold text-stone-900 dark:text-stone-100 font-mono">${formatCurrency(p.discount_price || p.price)}</span>
                                ${p.discount_price && p.discount_price < p.price
                                    ? `<span class="text-xs text-stone-400 line-through ml-1.5 font-mono">${formatCurrency(p.price)}</span>`
                                    : ''
                                }
                                ${p.rating && p.rating > 0
                                    ? `<span class="text-xs text-stone-400 flex items-center gap-1">
                                        <svg class="w-3 h-3 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                        ${parseFloat(p.rating).toFixed(1)}
                                       </span>`
                                    : ''
                                }
                            </div>
                        </div>
                    </a>
                    <button onclick="quickAddToCart('${p.id}', this)" class="absolute bottom-4 right-3 w-9 h-9 bg-white dark:bg-stone-800 rounded-full shadow-lg border border-stone-200 dark:border-stone-600 flex items-center justify-center text-amber-600 dark:text-amber-400 hover:bg-amber-500 hover:text-white hover:border-amber-500 transition-all duration-200 opacity-0 group-hover:opacity-100 translate-y-2 group-hover:translate-y-0" aria-label="Quick add to cart" title="Add to Cart">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            `).join('');
        } else {
            countEl.textContent = 'Your wishlist is empty';
            grid.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <div class="w-24 h-24 bg-gradient-to-br from-rose-50 to-amber-50 dark:from-stone-800 dark:to-stone-800 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-12 h-12 text-rose-300 dark:text-rose-400/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                    </div>
                    <h2 class="text-xl font-display font-bold text-stone-900 dark:text-stone-100 mb-2">Your wishlist is empty</h2>
                    <p class="text-sm text-stone-400 dark:text-stone-500 mb-8 max-w-sm mx-auto">Save products you love by tapping the heart icon. Start exploring our marketplace!</p>
                    <a href="/shop/marketplace" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-medium text-white bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 rounded-xl transition-all duration-200 shadow-lg shadow-amber-500/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Browse Products
                    </a>
                </div>
            `;
        }
    } catch (err) {
        document.getElementById('wishlist-grid').innerHTML = `
            <div class="col-span-full text-center py-20">
                <p class="text-red-500">Failed to load wishlist. Please try again.</p>
            </div>
        `;
    }
});
</script>
{% endblock %}
