{% extends "web/base.html" %}
{% block title %}My Wishlist — ForgeStore{% endblock %}
{% block content %}
<style>
  :root {
    --ws-amber-50: #fffbeb; --ws-amber-100: #fef3c7; --ws-amber-200: #fde68a;
    --ws-amber-400: #fbbf24; --ws-amber-500: #f59e0b; --ws-amber-600: #d97706;
    --ws-amber-700: #b45309; --ws-stone-50: #fafaf9; --ws-stone-100: #f5f5f4;
    --ws-stone-200: #e7e5e3; --ws-stone-300: #d6d3d1; --ws-stone-400: #a8a29e;
    --ws-stone-500: #78716c; --ws-stone-600: #57534e; --ws-stone-700: #44403c;
    --ws-stone-800: #292524; --ws-stone-900: #1c1917;
    --ws-radius: 16px; --ws-radius-sm: 12px;
    --ws-shadow-lg: 0 10px 25px -3px rgba(0,0,0,.08), 0 4px 6px rgba(0,0,0,.04);
    --ws-transition: .25s cubic-bezier(.4,0,.2,1);
  }
  .ws-page { max-width: 80rem; margin: 0 auto; padding: 2rem 1rem; }
  @media (min-width: 640px) { .ws-page { padding: 3rem 1.5rem; } }
  .ws-page-header { margin-bottom: 2.5rem; }
  .ws-page-label { display: block; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .2em; color: var(--ws-amber-600); margin-bottom: .5rem; }
  .ws-page-title { font-size: 1.75rem; font-weight: 900; color: var(--ws-stone-900); line-height: 1.1; }
  .ws-page-title em { font-style: normal; background: linear-gradient(135deg, var(--ws-amber-600), var(--ws-amber-500)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .ws-page-sub { color: var(--ws-stone-500); margin-top: .5rem; font-size: .9375rem; }
  @media (min-width: 640px) { .ws-page-title { font-size: 2rem; } }
  @media (min-width: 768px) { .ws-page-title { font-size: 2.5rem; } }
  @media (min-width: 1280px) { .ws-page-title { font-size: 3rem; } }
  .ws-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .75rem; }
  @media (min-width: 640px) { .ws-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } }
  @media (min-width: 768px) { .ws-grid { grid-template-columns: repeat(3, 1fr); gap: 1.5rem; } }
  @media (min-width: 1024px) { .ws-grid { grid-template-columns: repeat(4, 1fr); } }
  .ws-product { position: relative; background: #fff; border: 1px solid var(--ws-stone-200); border-radius: var(--ws-radius); overflow: hidden; transition: border-color var(--ws-transition), box-shadow var(--ws-transition); }
  .ws-product:hover { border-color: var(--ws-amber-300); box-shadow: var(--ws-shadow-lg); }
  .ws-product a { text-decoration: none; color: inherit; display: block; }
  .ws-product-img { aspect-ratio: 3/4; overflow: hidden; background: var(--ws-stone-50); position: relative; }
  .ws-product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .7s cubic-bezier(.4,0,.2,1); }
  .ws-product:hover .ws-product-img img { transform: scale(1.1); }
  .ws-product-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--ws-stone-300); }
  .ws-product-placeholder svg { width: 48px; height: 48px; }
  .ws-wishlist-btn { position: absolute; top: .75rem; right: .75rem; z-index: 10; width: 36px; height: 36px; background: rgba(255,255,255,.9); backdrop-filter: blur(4px); border-radius: 50%; box-shadow: var(--ws-shadow-lg); display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: transform var(--ws-transition); }
  .ws-wishlist-btn:hover { transform: scale(1.1); }
  .ws-wishlist-btn svg { width: 20px; height: 20px; color: #ef4444; fill: #ef4444; }
  .ws-product-info { padding: .75rem; }
  @media (min-width: 640px) { .ws-product-info { padding: 1rem; } }
  .ws-product-name { font-size: .75rem; font-weight: 600; color: var(--ws-stone-900); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color var(--ws-transition); }
  @media (min-width: 640px) { .ws-product-name { font-size: .875rem; } }
  .ws-product:hover .ws-product-name { color: var(--ws-amber-700); }
  .ws-product-price-row { display: flex; align-items: center; justify-content: space-between; margin-top: .5rem; }
  .ws-product-price { font-size: .875rem; font-weight: 700; color: var(--ws-stone-900); font-family: monospace; }
  .ws-product-price-old { font-size: .75rem; color: var(--ws-stone-400); text-decoration: line-through; font-family: monospace; margin-left: .375rem; }
  .ws-product-rating { font-size: .75rem; color: var(--ws-stone-400); display: flex; align-items: center; gap: .25rem; }
  .ws-product-rating svg { width: 12px; height: 12px; fill: var(--ws-amber-500); }
  .ws-add-btn { position: absolute; bottom: 1rem; right: .75rem; width: 36px; height: 36px; background: #fff; border: 1px solid var(--ws-stone-200); border-radius: 50%; box-shadow: var(--ws-shadow-lg); display: flex; align-items: center; justify-content: center; color: var(--ws-amber-600); border: none; cursor: pointer; transition: all var(--ws-transition); opacity: 0; transform: translateY(8px); }
  .ws-product:hover .ws-add-btn { opacity: 1; transform: translateY(0); }
  .ws-add-btn:hover { background: var(--ws-amber-500); color: #fff; border-color: var(--ws-amber-500); }
  .ws-add-btn svg { width: 16px; height: 16px; }
  .ws-empty { grid-column: 1 / -1; text-align: center; padding: 5rem 1rem; }
  .ws-empty-icon { width: 96px; height: 96px; background: linear-gradient(135deg, #fff1f2, var(--ws-amber-50)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
  .ws-empty-icon svg { width: 48px; height: 48px; color: #fca5a5; }
  .ws-empty h2 { font-size: 1.25rem; font-weight: 700; color: var(--ws-stone-900); margin-bottom: .5rem; }
  .ws-empty p { font-size: .875rem; color: var(--ws-stone-400); margin-bottom: 2rem; max-width: 24rem; margin-left: auto; margin-right: auto; }
  .ws-btn { display: inline-flex; align-items: center; justify-content: center; gap: .5rem; min-height: 44px; padding: 0 1.5rem; font-size: .875rem; font-weight: 600; border-radius: var(--ws-radius-sm); border: none; cursor: pointer; transition: all var(--ws-transition); text-decoration: none; }
  .ws-btn-primary { background: linear-gradient(135deg, var(--ws-amber-500), #f97316); color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,.25); }
  .ws-btn-primary:hover { background: linear-gradient(135deg, var(--ws-amber-600), #ea580c); box-shadow: 0 4px 12px rgba(245,158,11,.35); transform: translateY(-1px); }
  .ws-spinner { width: 32px; height: 32px; border: 2px solid var(--ws-amber-500); border-top-color: transparent; border-radius: 50%; animation: ws-spin .6s linear infinite; margin: 0 auto 1rem; }
  @keyframes ws-spin { to { transform: rotate(360deg); } }
  .ws-loading-text { font-size: .875rem; color: var(--ws-stone-400); }
  @media (prefers-color-scheme: dark) {
    .ws-page-title { color: var(--ws-stone-100); }
    .ws-page-sub { color: var(--ws-stone-400); }
    .ws-page-label { color: var(--ws-amber-400); }
    .ws-product { background: var(--ws-stone-800); border-color: var(--ws-stone-700); }
    .ws-product:hover { border-color: var(--ws-amber-600); }
    .ws-product-img { background: var(--ws-stone-700); }
    .ws-product-placeholder { color: var(--ws-stone-500); }
    .ws-product-name { color: var(--ws-stone-100); }
    .ws-product:hover .ws-product-name { color: var(--ws-amber-400); }
    .ws-product-price { color: var(--ws-stone-100); }
    .ws-wishlist-btn { background: rgba(41,37,36,.9); }
    .ws-add-btn { background: var(--ws-stone-800); border-color: var(--ws-stone-600); color: var(--ws-amber-400); }
    .ws-empty h2 { color: var(--ws-stone-100); }
    .ws-empty p { color: var(--ws-stone-400); }
    .ws-empty-icon { background: linear-gradient(135deg, rgba(239,68,68,.1), var(--ws-stone-800)); }
    .ws-empty-icon svg { color: rgba(252,165,165,.5); }
  }
</style>

<div class="ws-page">
  <div class="ws-page-header">
    <span class="ws-page-label">Saved Items</span>
    <h1 class="ws-page-title">My <em>Wishlist</em></h1>
    <p class="ws-page-sub" id="wishlist-count">Loading your saved pieces...</p>
  </div>

  <div id="wishlist-grid" class="ws-grid">
    <div class="ws-empty">
      <div class="ws-spinner"></div>
      <p class="ws-loading-text">Loading wishlist...</p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/wishlist');
        const data = await res.json();

        const countEl = document.getElementById('wishlist-count');
        const grid = document.getElementById('wishlist-grid');

        if (data.items && data.items.length > 0) {
            countEl.textContent = `${data.items.length} saved piece${data.items.length !== 1 ? 's' : ''}`;

            grid.innerHTML = data.items.map(p => `
                <div class="ws-product wishlist-item-${p.id}">
                    <a href="/shop/products/${p.slug}">
                        <div class="ws-product-img">
                            ${p.images && p.images.length > 0
                                ? `<img loading="lazy" src="${p.images[0]}" alt="${p.name}">`
                                : `<div class="ws-product-placeholder">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                                   </div>`
                            }
                        </div>
                        <div class="ws-product-info">
                            <h3 class="ws-product-name">${p.name}</h3>
                            <div class="ws-product-price-row">
                                <span class="ws-product-price">${formatCurrency(p.discount_price || p.price)}</span>
                                ${p.discount_price && p.discount_price < p.price
                                    ? `<span class="ws-product-price-old">${formatCurrency(p.price)}</span>`
                                    : ''
                                }
                                ${p.rating && p.rating > 0
                                    ? `<span class="ws-product-rating">
                                        <svg viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                                        ${parseFloat(p.rating).toFixed(1)}
                                       </span>`
                                    : ''
                                }
                            </div>
                        </div>
                    </a>
                    <button onclick="event.preventDefault(); event.stopPropagation(); toggleWishlist('${p.id}', this)" class="ws-wishlist-btn" aria-label="Remove from wishlist">
                        <svg viewBox="0 0 24 24">
                            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                    </button>
                    <button onclick="quickAddToCart('${p.id}', this)" class="ws-add-btn" aria-label="Quick add to cart" title="Add to Cart">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    </button>
                </div>
            `).join('');
        } else {
            countEl.textContent = 'Your wishlist is empty';
            grid.innerHTML = `
                <div class="ws-empty">
                    <div class="ws-empty-icon">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                        </svg>
                    </div>
                    <h2>Your wishlist is empty</h2>
                    <p>Save products you love by tapping the heart icon. Start exploring our marketplace!</p>
                    <a href="/shop/marketplace" class="ws-btn ws-btn-primary">
                        <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        Browse Products
                    </a>
                </div>
            `;
        }
    } catch (err) {
        document.getElementById('wishlist-grid').innerHTML = `
            <div class="ws-empty">
                <p style="color:#ef4444">Failed to load wishlist. Please try again.</p>
            </div>
        `;
    }
});
</script>
{% endblock %}
