{% extends "web/base.html" %}
{% block title %}Shopping Cart \u2014 ForgeStore{% endblock %}
{% block content %}
<style>
  :root {
    --c-bg: #faf9f7;
    --c-bg-card: #ffffff;
    --c-bg-card-alt: #f5f5f4;
    --c-text: #1c1917;
    --c-text-secondary: #78716c;
    --c-text-muted: #a8a29e;
    --c-border: #e7e5e4;
    --c-border-light: #f5f5f4;
    --c-accent: #d97706;
    --c-accent-hover: #b45309;
    --c-accent-light: #fbbf24;
    --c-accent-bg: #fef3c7;
    --c-danger: #dc2626;
    --c-danger-hover: #b91c1c;
    --c-shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
    --c-shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --c-shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
    --c-radius-sm: 8px;
    --c-radius-md: 14px;
    --c-radius-lg: 20px;
    --c-radius-xl: 28px;
    --c-font-display: 'Inter', system-ui, sans-serif;
    --c-font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --c-transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .dark {
    :root {
      --c-bg: #0c0a09;
      --c-bg-card: #1c1917;
      --c-bg-card-alt: #292524;
      --c-text: #fafaf9;
      --c-text-secondary: #a8a29e;
      --c-text-muted: #78716c;
      --c-border: #292524;
      --c-border-light: #1c1917;
      --c-accent: #f59e0b;
      --c-accent-hover: #fbbf24;
      --c-accent-light: #fbbf24;
      --c-accent-bg: #422006;
      --c-danger: #fca5a5;
      --c-danger-hover: #f87171;
      --c-shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --c-shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --c-shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }
  }

  .cart-page {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 16px 64px;
    background: var(--c-bg);
    min-height: 60vh;
  }
  @media (min-width: 640px) { .cart-page { padding: 48px 24px 80px; } }
  @media (min-width: 1024px) { .cart-page { padding: 56px 32px 96px; } }

  .cart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
  }
  .cart-header-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--c-accent);
    margin-bottom: 8px;
    display: block;
  }
  .cart-header-title {
    font-family: var(--c-font-display);
    font-size: clamp(24px, 4vw, 36px);
    font-weight: 900;
    color: var(--c-text);
    margin: 0;
  }
  .cart-header-title span {
    background: linear-gradient(135deg, var(--c-accent), var(--c-accent-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .cart-content {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  @media (min-width: 1024px) {
    .cart-content { flex-direction: row; gap: 32px; }
  }

  .cart-loading {
    text-align: center;
    padding: 80px 0;
  }
  .cart-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--c-border);
    border-top-color: var(--c-accent);
    border-radius: 50%;
    animation: c-spin 0.6s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes c-spin { to { transform: rotate(360deg); } }
  .cart-loading-text {
    font-size: 14px;
    color: var(--c-text-muted);
  }

  .cart-empty {
    text-align: center;
    padding: 80px 0;
  }
  .cart-empty-icon {
    width: 96px;
    height: 96px;
    background: linear-gradient(135deg, var(--c-accent-bg), var(--c-bg-card-alt));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .cart-empty-icon svg {
    width: 48px;
    height: 48px;
    color: var(--c-text-muted);
  }
  .cart-empty h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--c-text);
    margin: 0 0 8px;
  }
  .cart-empty p {
    font-size: 14px;
    color: var(--c-text-secondary);
    margin: 0 auto 28px;
    max-width: 360px;
    line-height: 1.6;
  }
  .cart-empty-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 28px;
    background: var(--c-accent);
    color: #fff;
    border: none;
    border-radius: var(--c-radius-md);
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    transition: background var(--c-transition), transform var(--c-transition);
    box-shadow: 0 4px 14px rgba(217, 119, 6, 0.3);
    min-height: 44px;
  }
  .cart-empty-btn:hover {
    background: var(--c-accent-hover);
    transform: translateY(-1px);
  }

  .cart-items {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cart-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--c-bg-card);
    border-radius: var(--c-radius-lg);
    border: 1px solid var(--c-border);
    transition: box-shadow var(--c-transition), transform var(--c-transition);
  }
  .cart-item:hover {
    box-shadow: var(--c-shadow-sm);
  }

  .cart-item-img {
    width: 80px;
    height: 80px;
    border-radius: var(--c-radius-md);
    overflow: hidden;
    flex-shrink: 0;
    display: block;
    background: var(--c-bg-card-alt);
  }
  @media (min-width: 640px) {
    .cart-item-img { width: 96px; height: 96px; }
  }
  .cart-item-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--c-text);
    text-decoration: none;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color var(--c-transition);
  }
  .cart-item-name:hover { color: var(--c-accent); }
  .cart-item-unit {
    font-size: 12px;
    color: var(--c-text-muted);
    margin-top: 2px;
  }

  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }

  .cart-item-qty {
    display: flex;
    align-items: center;
    border: 1px solid var(--c-border);
    border-radius: var(--c-radius-sm);
    overflow: hidden;
  }
  .cart-qty-btn {
    width: 40px;
    height: 40px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--c-text-secondary);
    cursor: pointer;
    transition: background var(--c-transition), color var(--c-transition);
  }
  .cart-qty-btn:hover {
    background: var(--c-bg-card-alt);
    color: var(--c-text);
  }
  .cart-qty-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .cart-qty-btn svg { width: 14px; height: 14px; }
  .cart-qty-value {
    width: 40px;
    height: 40px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--c-text);
    border-left: 1px solid var(--c-border);
    border-right: 1px solid var(--c-border);
    font-family: var(--c-font-mono);
  }

  .cart-item-price {
    font-family: var(--c-font-mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--c-text);
    flex-shrink: 0;
  }

  .cart-item-remove {
    margin-left: auto;
    width: 40px;
    height: 40px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    color: var(--c-text-muted);
    cursor: pointer;
    border-radius: var(--c-radius-sm);
    transition: color var(--c-transition), background var(--c-transition);
    flex-shrink: 0;
  }
  .cart-item-remove:hover {
    color: var(--c-danger);
    background: rgba(220, 38, 38, 0.08);
  }
  .cart-item-remove svg { width: 16px; height: 16px; }

  .cart-summary {
    width: 100%;
    flex-shrink: 0;
  }
  @media (min-width: 1024px) {
    .cart-summary { width: 320px; }
  }

  .cart-summary-inner {
    position: sticky;
    top: 96px;
    padding: 24px;
    background: var(--c-bg-card);
    border-radius: var(--c-radius-lg);
    border: 1px solid var(--c-border);
  }

  .cart-summary-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--c-text);
    margin: 0 0 20px;
  }

  .cart-summary-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cart-summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }
  .cart-summary-label {
    color: var(--c-text-secondary);
  }
  .cart-summary-value {
    font-weight: 500;
    color: var(--c-text);
    font-family: var(--c-font-mono);
  }
  .cart-summary-free {
    color: #16a34a;
    font-weight: 600;
  }
  .cart-summary-note {
    font-size: 11px;
    color: var(--c-text-muted);
    margin-top: 4px;
  }

  .cart-summary-divider {
    height: 1px;
    background: var(--c-border);
    margin: 16px 0;
  }

  .cart-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    font-weight: 700;
    color: var(--c-text);
    padding-top: 4px;
  }
  .cart-total-value {
    font-family: var(--c-font-mono);
    font-size: 20px;
    font-weight: 800;
    color: var(--c-accent);
  }

  .cart-checkout-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    height: 48px;
    min-height: 44px;
    margin-top: 20px;
    background: var(--c-accent);
    color: #fff;
    border: none;
    border-radius: var(--c-radius-md);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background var(--c-transition), transform var(--c-transition), box-shadow var(--c-transition);
    box-shadow: 0 4px 14px rgba(217, 119, 6, 0.3);
  }
  .cart-checkout-btn:hover {
    background: var(--c-accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(217, 119, 6, 0.4);
  }
  .cart-checkout-btn:active { transform: translateY(0); }
  .cart-checkout-btn svg { width: 16px; height: 16px; }

  .cart-continue {
    display: block;
    text-align: center;
    font-size: 12px;
    color: var(--c-text-muted);
    text-decoration: none;
    margin-top: 16px;
    transition: color var(--c-transition);
    min-height: 44px;
    line-height: 44px;
  }
  .cart-continue:hover { color: var(--c-accent); }

  .cart-error {
    text-align: center;
    padding: 80px 0;
    color: var(--c-danger);
    font-size: 14px;
  }
</style>

<div class="cart-page">
  <div class="cart-header">
    <div>
      <span class="cart-header-label">Your Cart</span>
      <h1 class="cart-header-title">Shopping <span>Cart</span></h1>
    </div>
  </div>

  <div id="cart-content" style="min-height:40vh;">
    <div class="cart-loading">
      <div class="cart-spinner"></div>
      <p class="cart-loading-text">Loading cart...</p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadCart();
});

async function loadCart() {
  const container = document.getElementById('cart-content');
  try {
    const res = await fetch('/api/cart');
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      container.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <h2>Your cart is empty</h2>
          <p>Discover unique handcrafted pieces from our master artisans.</p>
          <a href="/shop/marketplace" class="cart-empty-btn">Browse Marketplace</a>
        </div>
      `;
      return;
    }

    let html = '<div class="cart-content">';
    html += '<div class="cart-items">';
    let subtotal = 0;
    data.items.forEach((item, idx) => {
      const price = item.discount_price || item.price;
      const itemTotal = price * item.quantity;
      subtotal += itemTotal;
      const img = item.image || '/static/img/placeholder.svg';
      html += `
        <div class="cart-item" style="animation-delay: ${idx * 60}ms;">
          <a href="/shop/products/${item.slug}" class="cart-item-img">
            <img src="${img}" alt="${item.name}" loading="lazy">
          </a>
          <div class="cart-item-info">
            <a href="/shop/products/${item.slug}" class="cart-item-name">${item.name}</a>
            <p class="cart-item-unit">${formatCurrency(price)} each</p>
            <div class="cart-item-controls">
              <div class="cart-item-qty">
                <button onclick="updateCartItem('${item.id}', ${item.quantity - 1})" class="cart-qty-btn" ${item.quantity <= 1 ? 'disabled' : ''} aria-label="Decrease quantity">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                </button>
                <span class="cart-qty-value">${item.quantity}</span>
                <button onclick="updateCartItem('${item.id}', ${item.quantity + 1})" class="cart-qty-btn" aria-label="Increase quantity">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
              </div>
              <span class="cart-item-price">${formatCurrency(itemTotal)}</span>
              <button onclick="removeCartItem('${item.id}')" class="cart-item-remove" aria-label="Remove item">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        </div>
      `;
    });
    html += '</div>';

    const shipping = subtotal >= 50000 ? 0 : 2500;
    const total = subtotal + shipping;
    html += `
      <div class="cart-summary">
        <div class="cart-summary-inner">
          <h3 class="cart-summary-title">Order Summary</h3>
          <div class="cart-summary-rows">
            <div class="cart-summary-row">
              <span class="cart-summary-label">Subtotal</span>
              <span class="cart-summary-value">${formatCurrency(subtotal)}</span>
            </div>
            <div class="cart-summary-row">
              <span class="cart-summary-label">Shipping</span>
              <span class="cart-summary-value ${shipping === 0 ? 'cart-summary-free' : ''}">${shipping === 0 ? 'Free' : formatCurrency(shipping)}</span>
            </div>
            ${shipping > 0 ? '<p class="cart-summary-note">Free shipping on orders over \u20a650,000</p>' : ''}
          </div>
          <div class="cart-summary-divider"></div>
          <div class="cart-total">
            <span>Total</span>
            <span class="cart-total-value">${formatCurrency(total)}</span>
          </div>
          <button onclick="proceedToCheckout()" class="cart-checkout-btn">
            Proceed to Checkout
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
          </button>
          <a href="/shop/marketplace" class="cart-continue">Continue Shopping</a>
        </div>
      </div>
    `;
    html += '</div>';
    container.innerHTML = html;
  } catch {
    container.innerHTML = '<div class="cart-error">Failed to load cart. Please refresh.</div>';
  }
}

async function updateCartItem(itemId, qty) {
  if (qty < 1) return removeCartItem(itemId);
  try {
    await fetch('/api/cart/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId, quantity: qty }),
    });
    await loadCart();
    updateCartBadge();
    broadcastCartUpdate();
  } catch { showToast('Failed to update cart', 'error'); }
}

async function removeCartItem(itemId) {
  try {
    await fetch('/api/cart/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId }),
    });
    await loadCart();
    updateCartBadge();
    broadcastCartUpdate();
    showToast('Item removed', 'info');
  } catch { showToast('Failed to remove item', 'error'); }
}

async function proceedToCheckout() {
  try {
    const res = await fetch('/api/cart/checkout', { method: 'POST' });
    const data = await res.json();
    if (data.redirect) {
      window.location.href = data.redirect;
    } else if (data.order_id) {
      window.location.href = '/shop/checkout?order_id=' + data.order_id;
    } else {
      showToast('Checkout failed', 'error');
    }
  } catch { showToast('Checkout failed', 'error'); }
}
</script>
{% endblock %}
