{% extends "web/base.html" %}
{% block title %}Shopping Cart — ForgeStore{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="reveal">
        <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 dark:text-amber-400 mb-2 block">Review</span>
        <h1 class="text-3xl md:text-4xl font-display font-black text-stone-900 dark:text-stone-100">Shopping <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">Cart</span></h1>
    </div>

    <div id="cart-content" class="mt-8">
        <div class="text-center py-16 reveal">
            <div class="animate-spin w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-sm text-stone-400 dark:text-stone-500">Loading cart...</p>
        </div>
    </div>
</div>

<script>
async function loadCart() {
    try {
        const res = await fetch('/api/cart');
        const data = await res.json();

        if (data.items && data.items.length > 0) {
            renderCart(data);
        } else {
            renderEmptyCart();
        }
    } catch (err) {
        document.getElementById('cart-content').innerHTML = `
            <div class="text-center py-16">
                <p class="text-red-500">Failed to load cart. Please try again.</p>
            </div>
        `;
    }
}

function renderCart(data) {
    let itemsHtml = '';
    data.items.forEach(item => {
        itemsHtml += `
            <div class="py-5 border-b border-stone-100 cart-item-${item.product_id} group/item">
                <div class="flex items-center gap-3 sm:gap-4">
                    <div class="w-16 sm:w-20 h-16 sm:h-20 rounded-xl overflow-hidden bg-stone-50 border border-stone-200 flex-shrink-0">
                        ${item.image ? `<img src="${item.image}" alt="" class="w-full h-full object-cover">` : `
                        <div class="w-full h-full flex items-center justify-center text-stone-200">
                            <svg class="w-5 sm:w-6 h-5 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                        </div>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-display font-semibold text-stone-900 truncate">${item.name}</p>
                        <p class="text-xs sm:text-sm text-stone-500 mt-0.5">${formatCurrency(item.price)}</p>
                        <div class="flex sm:hidden items-center justify-between mt-3">
                            <div class="flex items-center border border-stone-300 rounded-lg overflow-hidden bg-white">
                                <button onclick="updateCartItem('${item.product_id}', ${item.quantity - 1})" class="px-2.5 py-1 text-stone-500 hover:text-stone-900 hover:bg-stone-50 transition-all duration-150 text-xs" aria-label="Decrease">−</button>
                                <span class="px-2.5 py-1 text-xs font-semibold text-stone-900 min-w-[1.5rem] text-center">${item.quantity}</span>
                                <button onclick="updateCartItem('${item.product_id}', ${item.quantity + 1})" class="px-2.5 py-1 text-stone-500 hover:text-stone-900 hover:bg-stone-50 transition-all duration-150 text-xs" aria-label="Increase">+</button>
                            </div>
                            <div class="flex items-center gap-2">
                                <p class="text-sm font-bold text-stone-900">${formatCurrency(item.price * item.quantity)}</p>
                                <button onclick="removeCartItem('${item.product_id}')" class="p-1.5 text-stone-300 hover:text-red-500 transition-all duration-200 hover:bg-red-50 rounded-lg" aria-label="Remove item">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Desktop-only controls -->
                    <div class="hidden sm:flex items-center border border-stone-300 rounded-xl overflow-hidden bg-white">
                        <button onclick="updateCartItem('${item.product_id}', ${item.quantity - 1})" class="px-3 py-1.5 text-stone-500 hover:text-stone-900 hover:bg-stone-50 transition-all duration-150 text-sm" aria-label="Decrease">−</button>
                        <span class="px-3 py-1.5 text-sm font-semibold text-stone-900 min-w-[2rem] text-center">${item.quantity}</span>
                        <button onclick="updateCartItem('${item.product_id}', ${item.quantity + 1})" class="px-3 py-1.5 text-stone-500 hover:text-stone-900 hover:bg-stone-50 transition-all duration-150 text-sm" aria-label="Increase">+</button>
                    </div>
                    <p class="hidden sm:block text-sm font-bold text-stone-900 w-20 text-right">${formatCurrency(item.price * item.quantity)}</p>
                    <button onclick="removeCartItem('${item.product_id}')" class="hidden sm:block p-2 text-stone-300 hover:text-red-500 transition-all duration-200 hover:bg-red-50 rounded-lg opacity-0 group-hover/item:opacity-100" aria-label="Remove item">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>
            </div>
        `;
    });

    document.getElementById('cart-content').innerHTML = `
        <div class="bg-white rounded-2xl border border-stone-200 p-6 mb-6 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <p class="text-sm font-bold text-stone-900 uppercase tracking-wider">${data.items.length} ${data.items.length === 1 ? 'item' : 'items'}</p>
                <button onclick="clearCart()" class="text-xs text-stone-400 hover:text-red-500 transition-colors duration-200">Clear all</button>
            </div>
            ${itemsHtml}
        </div>
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-gradient-to-br from-stone-50 to-amber-50/30 rounded-2xl border border-stone-200 p-6 shadow-sm">
            <div class="text-center sm:text-left">
                <p class="text-xs text-stone-400 uppercase tracking-wider font-medium">Total</p>
                <p class="text-3xl font-bold text-stone-900 mt-1">${formatCurrency(data.total)}</p>
                <p class="text-xs text-stone-400 mt-1">Free shipping on orders over ₦50,000</p>
            </div>
            <a href="/shop/checkout" class="w-full sm:w-auto px-6 py-3.5 text-sm font-bold text-white bg-stone-900 hover:bg-stone-800 rounded-xl transition-all duration-200 active:scale-[0.98] shadow-lg shadow-stone-900/10 text-center">
                Proceed to Checkout
                <svg class="w-4 h-4 inline ml-1.5 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
        </div>
    `;
}

function renderEmptyCart() {
    document.getElementById('cart-content').innerHTML = `
        <div class="text-center py-20 bg-white rounded-2xl border border-stone-200">
            <div class="w-24 h-24 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            </div>
            <h2 class="text-xl font-display font-bold text-stone-900 mb-2">Your cart is empty</h2>
            <p class="text-sm text-stone-400 mb-8 max-w-sm mx-auto">Looks like you haven't added any artisan-crafted pieces yet. Explore our marketplace to find something special.</p>
            <a href="/shop/marketplace" class="inline-flex items-center gap-2 px-6 py-3 text-sm font-medium text-white bg-stone-900 hover:bg-stone-800 rounded-xl transition-all duration-200 active:scale-[0.98] shadow-lg shadow-stone-900/10">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Browse Products
            </a>
        </div>
    `;
}

async function updateCartItem(productId, quantity) {
    if (quantity < 1) return removeCartItem(productId);
    const itemEl = document.querySelector(`.cart-item-${productId}`);
    itemEl.style.opacity = '0.5';
    try {
        const res = await fetch('/api/cart/update', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id: productId, quantity }),
        });
        if (!res.ok) throw new Error('Failed to update');
        loadCart();
        if (window.broadcastCartUpdate) window.broadcastCartUpdate();
    } catch (err) {
        itemEl.style.opacity = '1';
        alert('Failed to update cart');
    }
}

async function removeCartItem(productId) {
    const itemEl = document.querySelector(`.cart-item-${productId}`);
    itemEl.style.transition = 'all 0.3s ease';
    itemEl.style.opacity = '0';
    itemEl.style.transform = 'translateX(20px)';
    try {
        const res = await fetch(`/api/cart/remove/${productId}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Failed to remove');
        setTimeout(() => {
            loadCart();
            if (window.broadcastCartUpdate) window.broadcastCartUpdate();
        }, 300);
    } catch (err) {
        itemEl.style.opacity = '1';
        itemEl.style.transform = 'none';
        alert('Failed to remove item');
    }
}

async function clearCart() {
    if (!confirm('Clear your entire cart?')) return;
    const items = document.querySelectorAll('[class*="cart-item-"]');
    items.forEach(el => {
        el.style.transition = 'all 0.3s ease';
        el.style.opacity = '0';
        el.style.transform = 'translateX(20px)';
    });
    try {
        await fetch('/api/cart/clear', { method: 'DELETE' });
        setTimeout(() => {
            renderEmptyCart();
            if (window.broadcastCartUpdate) window.broadcastCartUpdate();
        }, 300);
    } catch (err) {
        alert('Failed to clear cart');
    }
}

loadCart();

// Auto-refresh when items are added from other tabs/pages
const cartChannel = new BroadcastChannel('forge-cart');
cartChannel.addEventListener('message', (event) => {
    if (event.data.type === 'cart-updated') {
        loadCart();
    }
});
</script>
{% endblock %}
