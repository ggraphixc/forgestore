{% extends "web/base.html" %}
{% block title %}Shopping Cart — ForgeStore{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
  <!-- Header -->
  <div class="flex items-center justify-between mb-10 reveal">
    <div>
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 dark:text-amber-400 mb-2 block">Your Cart</span>
      <h1 class="text-3xl sm:text-4xl font-black text-stone-900 dark:text-stone-100 font-display">
        Shopping <span class="text-transparent bg-clip-text bg-gradient-to-r from-amber-600 to-amber-500">Cart</span>
      </h1>
    </div>
  </div>

  <div id="cart-content" class="min-h-[40vh]">
    <!-- Loading state -->
    <div class="text-center py-20">
      <div class="animate-spin w-8 h-8 border-2 border-amber-500 border-t-transparent rounded-full mx-auto mb-4"></div>
      <p class="text-sm text-stone-400">Loading cart...</p>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  await loadCart();
});

async function loadCart() {
  const container = document.getElementById('cart-content');
  try {
    const res = await fetch('/api/cart');
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      container.innerHTML = `
        <div class="text-center py-20 reveal">
          <div class="w-24 h-24 bg-gradient-to-br from-amber-50 to-stone-50 dark:from-stone-800 dark:to-stone-800 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-12 h-12 text-stone-300 dark:text-stone-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
          </div>
          <h2 class="text-xl font-bold text-stone-900 dark:text-stone-100 mb-2">Your cart is empty</h2>
          <p class="text-sm text-stone-500 dark:text-stone-400 mb-8 max-w-sm mx-auto">Discover unique handcrafted pieces from our master artisans.</p>
          <a href="/shop/marketplace" class="btn-forge text-sm">Browse Marketplace</a>
        </div>
      `;
      return;
    }

    let html = '<div class="flex flex-col lg:flex-row gap-8">';
    // Cart Items
    html += '<div class="flex-1 space-y-4">';
    let subtotal = 0;
    data.items.forEach((item, idx) => {
      const price = item.discount_price || item.price;
      const itemTotal = price * item.quantity;
      subtotal += itemTotal;
      const img = item.images && item.images.length > 0 ? item.images[0] : '/static/img/placeholder.svg';
      html += `
        <div class="flex items-center gap-4 p-4 bg-white dark:bg-stone-800/60 rounded-2xl border border-stone-200 dark:border-stone-700/50 reveal" style="animation-delay: ${idx * 80}ms;">
          <a href="/shop/products/${item.slug}" class="w-20 h-20 sm:w-24 sm:h-24 rounded-xl overflow-hidden bg-stone-100 dark:bg-stone-700 flex-shrink-0">
            <img src="${img}" alt="${item.name}" class="w-full h-full object-cover">
          </a>
          <div class="flex-1 min-w-0">
            <a href="/shop/products/${item.slug}" class="text-sm font-semibold text-stone-900 dark:text-stone-100 hover:text-amber-700 dark:hover:text-amber-400 transition-colors line-clamp-1">${item.name}</a>
            <p class="text-xs text-stone-500 dark:text-stone-400 mt-0.5">${formatCurrency(price)} each</p>
            <div class="flex items-center gap-4 mt-3">
              <div class="flex items-center border border-stone-200 dark:border-stone-700 rounded-lg overflow-hidden">
                <button onclick="updateCartItem('${item.id}', ${item.quantity - 1})" class="w-8 h-8 flex items-center justify-center text-stone-500 hover:bg-stone-100 dark:hover:bg-stone-700 transition-colors cursor-pointer" ${item.quantity <= 1 ? 'disabled' : ''}>
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"/></svg>
                </button>
                <span class="w-8 h-8 flex items-center justify-center text-xs font-semibold text-stone-900 dark:text-stone-100">${item.quantity}</span>
                <button onclick="updateCartItem('${item.id}', ${item.quantity + 1})" class="w-8 h-8 flex items-center justify-center text-stone-500 hover:bg-stone-100 dark:hover:bg-stone-700 transition-colors cursor-pointer">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
              </div>
              <span class="text-sm font-bold text-stone-900 dark:text-stone-100 font-mono">${formatCurrency(itemTotal)}</span>
              <button onclick="removeCartItem('${item.id}')" class="ml-auto p-2 text-stone-400 hover:text-red-500 transition-colors cursor-pointer" aria-label="Remove item">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        </div>
      `;
    });
    html += '</div>';

    // Order Summary
    const shipping = subtotal >= 50000 ? 0 : 2500;
    const total = subtotal + shipping;
    html += `
      <div class="lg:w-80">
        <div class="sticky top-24 p-6 bg-white dark:bg-stone-800/60 rounded-2xl border border-stone-200 dark:border-stone-700/50 reveal">
          <h3 class="text-sm font-bold text-stone-900 dark:text-stone-100 mb-5">Order Summary</h3>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between">
              <span class="text-stone-500 dark:text-stone-400">Subtotal</span>
              <span class="font-medium text-stone-900 dark:text-stone-100 font-mono">${formatCurrency(subtotal)}</span>
            </div>
            <div class="flex justify-between">
              <span class="text-stone-500 dark:text-stone-400">Shipping</span>
              <span class="font-medium text-stone-900 dark:text-stone-100">${shipping === 0 ? 'Free' : formatCurrency(shipping)}</span>
            </div>
            ${shipping > 0 ? '<p class="text-[10px] text-stone-400">Free shipping on orders over ₦50,000</p>' : ''}
            <div class="pt-3 border-t border-stone-200 dark:border-stone-700 flex justify-between">
              <span class="font-bold text-stone-900 dark:text-stone-100">Total</span>
              <span class="font-bold text-amber-600 dark:text-amber-400 font-mono text-lg">${formatCurrency(total)}</span>
            </div>
          </div>
          <button onclick="proceedToCheckout()" class="btn-forge w-full justify-center mt-6 text-sm">
            Proceed to Checkout
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
          </button>
          <a href="/shop/marketplace" class="block text-center text-xs text-stone-500 dark:text-stone-400 hover:text-amber-600 dark:hover:text-amber-400 transition-colors mt-4">Continue Shopping</a>
        </div>
      </div>
    `;
    html += '</div>';
    container.innerHTML = html;
  } catch {
    container.innerHTML = '<div class="text-center py-20"><p class="text-red-500">Failed to load cart. Please refresh.</p></div>';
  }
}

async function updateCartItem(itemId, qty) {
  if (qty < 1) return removeCartItem(itemId);
  try {
    await fetch('/api/cart/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId, quantity: qty }),
    });
    await loadCart();
    updateCartBadge();
    broadcastCartUpdate();
  } catch { showToast('Failed to update cart', 'error'); }
}

async function removeCartItem(itemId) {
  try {
    await fetch('/api/cart/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item_id: itemId }),
    });
    await loadCart();
    updateCartBadge();
    broadcastCartUpdate();
    showToast('Item removed', 'info');
  } catch { showToast('Failed to remove item', 'error'); }
}

async function proceedToCheckout() {
  try {
    const res = await fetch('/api/cart/checkout', { method: 'POST' });
    const data = await res.json();
    if (data.redirect) {
      window.location.href = data.redirect;
    } else if (data.order_id) {
      window.location.href = '/shop/checkout?order_id=' + data.order_id;
    } else {
      showToast('Checkout failed', 'error');
    }
  } catch { showToast('Checkout failed', 'error'); }
}
</script>
{% endblock %}
