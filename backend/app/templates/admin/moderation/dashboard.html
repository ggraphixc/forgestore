{% extends "admin/base.html" %}
{% block title %}Product Moderation — {{ settings.site_name|default('ForgeStore') }}{% endblock %}
{% block content %}
<style>
  @import url('/static/css/admin_portal.css');

  .mod-stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
  .mod-accuracy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-bottom: 2rem; }
  .mod-accuracy-card { background: var(--ap-bg-elevated); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-xl); padding: 1.25rem; }
  .mod-accuracy-card h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ap-text-muted); margin-bottom: 0.75rem; }
  .mod-accuracy-bar { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .mod-accuracy-bar .bar-label { font-size: 0.75rem; font-weight: 600; color: var(--ap-text); width: 100px; }
  .mod-accuracy-bar .bar-track { flex: 1; height: 8px; border-radius: 4px; background: var(--ap-border-light); overflow: hidden; }
  .mod-accuracy-bar .bar-fill { height: 100%; border-radius: 4px; }
  .mod-accuracy-bar .bar-fill.green { background: var(--ap-emerald); }
  .mod-accuracy-bar .bar-fill.red { background: var(--ap-red); }
  .mod-accuracy-bar .bar-fill.yellow { background: var(--ap-amber); }
  .mod-accuracy-bar .bar-fill.blue { background: var(--ap-blue); }
  .mod-accuracy-bar .bar-val { font-size: 0.75rem; font-weight: 700; color: var(--ap-text); min-width: 36px; }
  .mod-threshold-row { display: flex; gap: 1rem; margin-top: 0.5rem; padding-top: 0.75rem; border-top: 1px solid var(--ap-border); }
  .mod-threshold { font-size: 0.75rem; color: var(--ap-text-muted); }
  .mod-threshold strong { color: var(--ap-text); }
  .mod-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  .mod-table th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ap-text-muted); border-bottom: 2px solid var(--ap-border); background: var(--ap-bg); }
  .mod-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--ap-border-light); color: var(--ap-text); vertical-align: middle; }
  .mod-table tbody tr:hover { background: rgba(99, 102, 241, 0.03); }
  .mod-thumb { width: 48px; height: 48px; border-radius: var(--ap-radius-sm); object-fit: cover; background: var(--ap-border-light); }
  .mod-badge { display: inline-block; font-size: 0.6875rem; font-weight: 700; padding: 0.2rem 0.625rem; border-radius: 9999px; }
  .mod-badge.pending { background: var(--ap-amber-soft); color: #92400e; }
  .mod-badge.approved { background: var(--ap-emerald-soft); color: #065f46; }
  .mod-badge.rejected { background: var(--ap-red-soft); color: #991b1b; }
  .mod-badge.suspended { background: var(--ap-border-light); color: var(--ap-text-secondary); }
  .mod-badge.flagged { background: var(--ap-blue-soft); color: #1e40af; }
  .mod-confidence { display: flex; align-items: center; gap: 0.5rem; }
  .mod-conf-bar { flex: 1; height: 6px; border-radius: 3px; background: var(--ap-border-light); overflow: hidden; max-width: 80px; }
  .mod-conf-fill { height: 100%; border-radius: 3px; }
  .mod-conf-fill.high { background: var(--ap-emerald); }
  .mod-conf-fill.medium { background: var(--ap-amber); }
  .mod-conf-fill.low { background: var(--ap-red); }
  .mod-actions { display: flex; gap: 0.375rem; }
  .mod-btn { min-height: 44px; padding: 0.375rem 0.75rem; border-radius: var(--ap-radius-sm); font-size: 0.75rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .mod-btn-approve { background: var(--ap-emerald); color: #fff; }
  .mod-btn-approve:hover { background: #059669; }
  .mod-btn-reject { background: var(--ap-red); color: #fff; }
  .mod-btn-reject:hover { background: #dc2626; }
  .mod-btn-view { background: transparent; color: var(--ap-primary); border: 1px solid var(--ap-border); }
  .mod-btn-view:hover { background: var(--ap-amber-soft); }
  .mod-empty { text-align: center; padding: 4rem 1.5rem; color: var(--ap-text-muted); }
  .mod-empty svg { width: 3rem; height: 3rem; margin: 0 auto 1rem; opacity: 0.4; }
  .mod-pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
  .mod-page-btn { min-height: 44px; padding: 0.375rem 0.75rem; border-radius: var(--ap-radius-sm); font-size: 0.8125rem; font-weight: 600; cursor: pointer; border: 1px solid var(--ap-border); background: var(--ap-bg-elevated); color: var(--ap-text); transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; }
  .mod-page-btn.active { background: var(--ap-primary); color: #fff; border-color: var(--ap-primary); }
  .mod-page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .mod-bulk { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--ap-bg-elevated); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-md); }
  .mod-bulk label { font-size: 0.8125rem; font-weight: 600; color: var(--ap-text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  .mod-detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: flex-start; padding: 2rem; overflow-y: auto; }
  .mod-detail-overlay.active { display: flex; }
  .mod-detail-card { background: var(--ap-bg-elevated); border-radius: var(--ap-radius-2xl); max-width: 700px; width: 100%; padding: 2rem; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .mod-detail-card h2 { font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; color: var(--ap-text); }
  .mod-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .mod-detail-field .label { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ap-text-muted); }
  .mod-detail-field .value { font-size: 0.875rem; color: var(--ap-text); margin-top: 0.125rem; }
  .mod-detail-images { display: flex; gap: 0.5rem; overflow-x: auto; margin-bottom: 1rem; }
  .mod-detail-images img { width: 120px; height: 120px; border-radius: var(--ap-radius-sm); object-fit: cover; flex-shrink: 0; }
  .mod-ai-box { background: var(--ap-bg); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-md); padding: 1rem; margin-bottom: 1rem; }
  .mod-ai-box h4 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--ap-text-muted); margin-bottom: 0.5rem; }
  .mod-ai-box p { font-size: 0.8125rem; color: var(--ap-text); line-height: 1.5; }
  .mod-detail-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .mod-note-input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--ap-border); border-radius: var(--ap-radius-sm); font-size: 0.8125rem; margin-bottom: 0.75rem; background: var(--ap-bg); color: var(--ap-text); min-height: 44px; }
  @media (max-width: 640px) {
    .mod-stats-row { grid-template-columns: repeat(2, 1fr); }
    .mod-table th:nth-child(n+5), .mod-table td:nth-child(n+5) { display: none; }
    .mod-detail-grid { grid-template-columns: 1fr; }
    .mod-accuracy-row { grid-template-columns: 1fr; }
  }
</style>

<div class="ap-page">
  <div class="ap-header">
    <div class="ap-header-left">
      <span class="ap-overline">Moderation</span>
      <h1>Product Moderation</h1>
      <p class="ap-subtitle">AI-powered product review and approval queue</p>
    </div>
  </div>

  <div class="mod-stats-row" id="modStats"></div>
  <div class="mod-accuracy-row" id="modAccuracy"></div>

  <div class="ap-tabs" id="modFilters">
    <button class="ap-tab active" data-status="PENDING_REVIEW">Pending Review</button>
    <button class="ap-tab" data-status="APPROVED">Approved</button>
    <button class="ap-tab" data-status="REJECTED">Rejected</button>
    <button class="ap-tab" data-status="SUSPENDED">Suspended</button>
  </div>

  <div class="mod-bulk" id="modBulk" style="display:none;">
    <label><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"> Select All</label>
    <button class="mod-btn mod-btn-approve" onclick="bulkAction('approve')">Approve Selected</button>
    <button class="mod-btn mod-btn-reject" onclick="bulkAction('reject')">Reject Selected</button>
    <span id="selectedCount" style="font-size:0.8125rem;color:var(--ap-text-muted);"></span>
  </div>

  <div class="ap-card" style="margin-bottom:1.5rem;">
    <div id="modTable"></div>
  </div>
  <div class="mod-pagination" id="modPagination"></div>
</div>

<div class="mod-detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="mod-detail-card" id="detailCard"></div>
</div>

<script>
let currentStatus = 'PENDING_REVIEW';
let currentPage = 1;

async function loadStats() {
  const r = await fetch('/api/admin/moderation/stats');
  const d = await r.json();
  const acc = d.accuracy || {};
  document.getElementById('modStats').innerHTML = `
    <div class="ap-stat ap-stat-amber"><div class="ap-stat-icon amber"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="ap-stat-label">Pending</div><div class="ap-stat-value">${d.pending}</div></div>
    <div class="ap-stat ap-stat-emerald"><div class="ap-stat-icon emerald"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="ap-stat-label">Approved</div><div class="ap-stat-value">${d.approved}</div></div>
    <div class="ap-stat ap-stat-rose"><div class="ap-stat-icon rose"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="ap-stat-label">Rejected</div><div class="ap-stat-value">${d.rejected}</div></div>
    <div class="ap-stat ap-stat-blue"><div class="ap-stat-icon blue"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg></div><div class="ap-stat-label">Flagged</div><div class="ap-stat-value">${d.flagged}</div></div>
    <div class="ap-stat ap-stat-blue"><div class="ap-stat-icon purple"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg></div><div class="ap-stat-label">AI Accuracy</div><div class="ap-stat-value">${acc.accuracy_rate || 0}%</div></div>
    <div class="ap-stat ap-stat-amber"><div class="ap-stat-icon amber"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></div><div class="ap-stat-label">Corrections</div><div class="ap-stat-value">${acc.corrections || 0}</div></div>
  `;

  const thresholds = acc.thresholds || {};
  const dist = acc.confidence_distribution || {};
  document.getElementById('modAccuracy').innerHTML = `
    <div class="mod-accuracy-card">
      <h3>AI Confidence Distribution</h3>
      <div class="mod-accuracy-bar"><span class="bar-label">0-25%</span><div class="bar-track"><div class="bar-fill red" style="width:${dist['0-25'] || 0}%"></div></div><span class="bar-val">${dist['0-25'] || 0}</span></div>
      <div class="mod-accuracy-bar"><span class="bar-label">25-50%</span><div class="bar-track"><div class="bar-fill yellow" style="width:${dist['25-50'] || 0}%"></div></div><span class="bar-val">${dist['25-50'] || 0}</span></div>
      <div class="mod-accuracy-bar"><span class="bar-label">50-75%</span><div class="bar-track"><div class="bar-fill yellow" style="width:${dist['50-75'] || 0}%"></div></div><span class="bar-val">${dist['50-75'] || 0}</span></div>
      <div class="mod-accuracy-bar"><span class="bar-label">75-100%</span><div class="bar-track"><div class="bar-fill green" style="width:${dist['75-100'] || 0}%"></div></div><span class="bar-val">${dist['75-100'] || 0}</span></div>
    </div>
    <div class="mod-accuracy-card">
      <h3>Dynamic Thresholds</h3>
      <div style="font-size:0.8125rem;color:var(--ap-text);margin-bottom:0.75rem;">
        AI auto-approves products scoring above <strong>${thresholds.approve || 75}%</strong> and auto-rejects below <strong>${thresholds.escalate || 50}%</strong>. Products between these thresholds are escalated for human review.
      </div>
      <div class="mod-accuracy-bar"><span class="bar-label">FP Rate</span><div class="bar-track"><div class="bar-fill red" style="width:${acc.false_positive_rate || 0}%"></div></div><span class="bar-val">${acc.false_positive_rate || 0}%</span></div>
      <div class="mod-accuracy-bar"><span class="bar-label">FN Rate</span><div class="bar-track"><div class="bar-fill yellow" style="width:${acc.false_negative_rate || 0}%"></div></div><span class="bar-val">${acc.false_negative_rate || 0}%</span></div>
      <div style="font-size:0.6875rem;color:var(--ap-text-muted);margin-top:0.75rem;">Thresholds auto-adjust every 10 admin corrections to minimize errors.</div>
    </div>
  `;
}

async function loadQueue(page = 1) {
  currentPage = page;
  const r = await fetch(`/api/admin/moderation/queue?status=${currentStatus}&page=${page}&per_page=15`);
  const d = await r.json();
  const isPending = currentStatus === 'PENDING_REVIEW';
  document.getElementById('modBulk').style.display = isPending && d.products.length ? 'flex' : 'none';

  if (!d.products.length) {
    document.getElementById('modTable').innerHTML = `<div class="ap-empty">
      <div class="ap-empty-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <h3>No products in this queue</h3>
    </div>`;
    document.getElementById('modPagination').innerHTML = '';
    return;
  }

  let html = `<table class="mod-table"><thead><tr>
    <th style="width:40px;">${isPending ? '<input type="checkbox" id="checkAll" onchange="toggleSelectAll()">' : ''}</th>
    <th>Product</th><th>Category</th><th>Price</th><th>AI Score</th><th>Status</th><th>Actions</th>
  </tr></thead><tbody>`;
  for (const p of d.products) {
    const conf = p.ai_confidence;
    const confClass = conf >= 75 ? 'high' : conf >= 50 ? 'medium' : 'low';
    const thumb = p.images && p.images[0] ? `<img src="${p.images[0]}" class="mod-thumb" alt="">` : `<div class="mod-thumb"></div>`;
    html += `<tr>
      <td>${isPending ? `<input type="checkbox" class="row-check" value="${p.id}">` : ''}</td>
      <td><div style="display:flex;align-items:center;gap:0.75rem;">${thumb}<div><div style="font-weight:600;">${p.name} ${p.flag_count ? `<span class="ap-badge ap-badge-red" style="font-size:0.625rem;padding:0.125rem 0.375rem;vertical-align:middle;">${p.flag_count} flag${p.flag_count !== 1 ? 's' : ''}</span>` : ''}</div><div style="font-size:0.75rem;color:var(--ap-text-muted);">${p.brand || ''} · ${p.retailer}</div></div></div></td>
      <td style="font-size:0.8125rem;">${p.category || '—'}</td>
      <td style="font-weight:600;">₦${p.price.toLocaleString()}</td>
      <td><div class="mod-confidence"><div class="mod-conf-bar"><div class="mod-conf-fill ${confClass}" style="width:${conf || 0}%"></div></div><span style="font-size:0.75rem;font-weight:600;">${conf != null ? conf + '%' : '—'}</span></div></td>
      <td><span class="mod-badge ${p.status.toLowerCase()}">${p.status.replace('_', ' ')}</span></td>
      <td><div class="mod-actions">
        <button class="mod-btn mod-btn-view" onclick="viewProduct('${p.id}')">View</button>
        ${isPending ? `<button class="mod-btn mod-btn-approve" onclick="quickApprove('${p.id}')">Approve</button><button class="mod-btn mod-btn-reject" onclick="quickReject('${p.id}')">Reject</button>` : ''}
      </div></td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById('modTable').innerHTML = html;

  let pag = '';
  if (d.pages > 1) {
    for (let i = 1; i <= d.pages; i++) {
      pag += `<button class="mod-page-btn ${i === page ? 'active' : ''}" onclick="loadQueue(${i})">${i}</button>`;
    }
  }
  document.getElementById('modPagination').innerHTML = pag;
  updateSelectedCount();
}

async function viewProduct(id) {
  const r = await fetch(`/api/admin/moderation/product/${id}`);
  const d = await r.json();
  const p = d.product;
  const images = (p.images || []).map(url => `<img src="${url}" alt="">`).join('');
  let aiHtml = '';
  if (p.ai_result) {
    const a = p.ai_result;
    aiHtml = `<div class="mod-ai-box"><h4>AI Analysis</h4><p><strong>Confidence:</strong> ${p.ai_confidence}% · <strong>Decision:</strong> ${a.decision}</p><p>${a.reasoning || ''}</p>`;
    if (a.suggestions && a.suggestions.length) {
      aiHtml += `<p style="margin-top:0.5rem;"><strong>Suggestions:</strong> ${a.suggestions.join('; ')}</p>`;
    }
    aiHtml += '</div>';
  }
  let logsHtml = '';
  if (d.logs.length) {
    logsHtml = '<div class="mod-ai-box"><h4>Moderation History</h4>';
    for (const l of d.logs) {
      logsHtml += `<p style="font-size:0.75rem;">${l.action} — ${l.note || ''} (${l.created_at ? new Date(l.created_at).toLocaleDateString() : ''})</p>`;
    }
    logsHtml += '</div>';
  }
  document.getElementById('detailCard').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <h2>${p.name}</h2>
      <button onclick="closeDetail()" class="mod-btn mod-btn-view" style="min-width:44px;min-height:44px;font-size:1.25rem;">&times;</button>
    </div>
    <div class="mod-detail-images">${images || '<div style="padding:2rem;background:var(--ap-border-light);border-radius:var(--ap-radius-sm);color:var(--ap-text-muted);">No images</div>'}</div>
    <div class="mod-detail-grid">
      <div class="mod-detail-field"><div class="label">Brand</div><div class="value">${p.brand || '—'}</div></div>
      <div class="mod-detail-field"><div class="label">Category</div><div class="value">${p.category || '—'}</div></div>
      <div class="mod-detail-field"><div class="label">Price</div><div class="value">₦${p.price.toLocaleString()}</div></div>
      <div class="mod-detail-field"><div class="label">Inventory</div><div class="value">${p.inventory} units</div></div>
      <div class="mod-detail-field"><div class="label">Retailer</div><div class="value">${p.retailer}</div></div>
      <div class="mod-detail-field"><div class="label">Status</div><div class="value"><span class="mod-badge ${p.status.toLowerCase()}">${p.status}</span></div></div>
      ${p.flag_count ? `<div class="mod-detail-field"><div class="label">Customer Flags</div><div class="value" style="color:var(--ap-red);font-weight:700;">${p.flag_count} flag${p.flag_count !== 1 ? 's' : ''}</div></div>` : ''}
    </div>
    ${p.description ? `<div style="margin-bottom:1rem;"><div style="font-size:0.6875rem;font-weight:700;text-transform:uppercase;color:var(--ap-text-muted);margin-bottom:0.25rem;">Description</div><p style="font-size:0.8125rem;color:var(--ap-text);line-height:1.5;">${p.description}</p></div>` : ''}
    ${aiHtml}
    ${logsHtml}
    <input type="text" class="mod-note-input" id="modNote" placeholder="Add a note (optional)">
    <div class="mod-detail-actions">
      <button class="mod-btn mod-btn-approve" onclick="approveProduct('${p.id}')">Approve</button>
      <button class="mod-btn mod-btn-reject" onclick="rejectProduct('${p.id}')">Reject</button>
      <button class="mod-btn mod-btn-view" onclick="closeDetail()">Close</button>
    </div>
  `;
  document.getElementById('detailOverlay').classList.add('active');
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('active');
}

async function approveProduct(id) {
  const note = document.getElementById('modNote')?.value || '';
  await fetch(`/api/admin/moderation/product/${id}/approve?note=${encodeURIComponent(note)}`, { method: 'POST' });
  closeDetail();
  loadStats();
  loadQueue(currentPage);
}

async function rejectProduct(id) {
  const note = document.getElementById('modNote')?.value || '';
  await fetch(`/api/admin/moderation/product/${id}/reject?reason=${encodeURIComponent(note)}`, { method: 'POST' });
  closeDetail();
  loadStats();
  loadQueue(currentPage);
}

async function quickApprove(id) {
  await fetch(`/api/admin/moderation/product/${id}/approve`, { method: 'POST' });
  loadStats();
  loadQueue(currentPage);
}

async function quickReject(id) {
  await fetch(`/api/admin/moderation/product/${id}/reject`, { method: 'POST' });
  loadStats();
  loadQueue(currentPage);
}

function toggleSelectAll() {
  const check = document.getElementById('selectAll') || document.getElementById('checkAll');
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = check.checked);
  updateSelectedCount();
}

function updateSelectedCount() {
  const checked = document.querySelectorAll('.row-check:checked').length;
  const el = document.getElementById('selectedCount');
  if (el) el.textContent = checked ? `${checked} selected` : '';
}

async function bulkAction(action) {
  const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
  if (!ids.length) return;
  await fetch('/api/admin/moderation/bulk-action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ product_ids: ids, action: action }),
  });
  loadStats();
  loadQueue(currentPage);
}

document.querySelectorAll('.ap-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ap-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadQueue(1);
  });
});

loadStats();
loadQueue();
</script>
{% endblock %}
