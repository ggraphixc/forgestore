{% extends "admin/base.html" %}
{% block title %}New Retailer — ForgeStore Admin{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <nav class="flex items-center gap-2 text-sm text-stone-400 mb-6">
        <a href="/admin/retailers" class="hover:text-amber-600 transition-colors">Retailers</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
        <span class="text-stone-600 font-medium">New Retailer</span>
    </nav>

    <h1 class="text-2xl font-heading font-bold text-stone-900 mb-6">New Retailer</h1>

    <div class="bg-white rounded-2xl border border-stone-200 p-6 md:p-8 shadow-sm hover:shadow-md transition-shadow">
        <form id="new-retailer-form" class="space-y-5" onsubmit="event.preventDefault(); submitNewRetailer(this)">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="name">Retailer Name</label>
                <input id="name" name="name" required class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" placeholder="e.g. Artisan Forge">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="slug">Slug</label>
                <input id="slug" name="slug" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" placeholder="artisan-forge">
                <p class="text-xs text-stone-400 mt-1.5">Leave empty to auto-generate from name</p>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="description">Description</label>
                <textarea id="description" name="description" rows="4" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" placeholder="Tell the story of this artisan shop..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="logo_url">Logo</label>
                    <input id="logo_url" name="logo_url" type="file" accept="image/*" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" />
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="banner_url">Cover Image</label>
                    <input id="banner_url" name="banner_url" type="file" accept="image/*" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" />
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="email">Email</label>
                    <input id="email" name="email" type="email" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="phone">Phone</label>
                    <input id="phone" name="phone" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="address">Address</label>
                <textarea id="address" name="address" rows="2" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all"></textarea>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2">Status</label>
                <select name="status" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all cursor-pointer">
                    <option value="ACTIVE">Active</option>
                    <option value="INACTIVE">Inactive</option>
                </select>
            </div>

            <div class="flex items-center gap-3 pt-4 border-t border-stone-100">
                <button type="submit" class="px-6 py-3 bg-gradient-to-r from-stone-800 to-stone-900 text-white text-sm font-bold rounded-xl hover:from-stone-900 hover:to-stone-950 transition-all shadow-md hover:shadow-lg">
                    <span class="inline-flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        Create Retailer
                    </span>
                </button>
                <a href="/admin/retailers" class="px-6 py-3 text-sm font-medium text-stone-500 hover:text-stone-900 hover:bg-stone-50 rounded-xl transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
async function submitNewRetailer(form) {
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-flex items-center gap-2"><svg class="animate-spin w-4 h-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Creating...</span>';

    const formData = new FormData(form);
    const data = {};
    for (const [key, value] of formData.entries()) {
        data[key] = value;
    }
    try {
        const logoFile = formData.get('logo_url');
        if (logoFile && logoFile.size) {
            const uploadForm = new FormData();
            uploadForm.append('files', logoFile);
            const uploadRes = await fetch('/api/admin/upload', {
                method: 'POST',
                body: uploadForm,
            });
            const uploadData = await uploadRes.json();
            if (uploadData.urls && uploadData.urls.length) {
                data.logo_url = uploadData.urls[0];
            }
        }

        const bannerFile = formData.get('banner_url');
        if (bannerFile && bannerFile.size) {
            const uploadForm = new FormData();
            uploadForm.append('files', bannerFile);
            const uploadRes = await fetch('/api/admin/upload', {
                method: 'POST',
                body: uploadForm,
            });
            const uploadData = await uploadRes.json();
            if (uploadData.urls && uploadData.urls.length) {
                data.banner_url = uploadData.urls[0];
            }
        }

        const res = await fetch('/api/admin/retailers', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error('Failed to create');
        showToast('Retailer created successfully', 'success');
        setTimeout(() => { window.location.href = '/admin/retailers'; }, 1000);
    } catch (err) {
        showToast('Failed to create retailer', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="inline-flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Create Retailer</span>';
    }
}
</script>
{% endblock %}
