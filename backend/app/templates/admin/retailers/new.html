{% extends "admin/base.html" %}
{% block title %}New Retailer — ForgeStore Admin{% endblock %}
{% block content %}
<style>
  :root {
    --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-200:#fde68a;--amber-300:#fcd34d;
    --amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;--amber-700:#b45309;
    --amber-800:#92400e;
    --stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;
    --stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;
    --stone-800:#292524;--stone-900:#1c1917;
    --red-50:#fef2f2;--red-200:#fecaca;--red-500:#ef4444;--red-700:#b91c1c;
    --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:16px;--radius-full:9999px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.06);
    --transition-fast:150ms ease;--transition-base:200ms ease;
  }
  .admin-page{max-width:640px;margin:0 auto;padding:0}
  .admin-page-header{margin-bottom:2rem}
  .admin-page-eyebrow{display:block;font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--amber-600);margin-bottom:.5rem}
  .admin-page-title{font-size:1.75rem;font-weight:900;color:var(--stone-900);line-height:1.15}
  .admin-page-title .accent{background:linear-gradient(135deg,var(--amber-600),var(--amber-500));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .admin-page-subtitle{font-size:.875rem;color:var(--stone-500);margin-top:.5rem}
  .admin-breadcrumb{display:flex;align-items:center;gap:8px;font-size:.875rem;color:var(--stone-400);margin-bottom:1.5rem}
  .admin-breadcrumb a{color:var(--stone-400);text-decoration:none;transition:color var(--transition-fast)}
  .admin-breadcrumb a:hover{color:var(--amber-600)}
  .admin-breadcrumb svg{width:16px;height:16px;flex-shrink:0}
  .admin-breadcrumb-current{color:var(--stone-600);font-weight:500}
  .admin-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:1.5rem 2rem;box-shadow:var(--shadow-sm);transition:box-shadow var(--transition-base)}
  .admin-card:hover{box-shadow:var(--shadow-md)}
  .admin-card-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--stone-100)}
  .admin-card-header h2{font-size:.875rem;font-weight:700;color:var(--stone-900);text-transform:uppercase;letter-spacing:.05em}
  .admin-stack{display:flex;flex-direction:column;gap:1.25rem}
  .admin-form-group{display:flex;flex-direction:column}
  .admin-form-label{display:block;font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--stone-500);margin-bottom:.5rem}
  .admin-form-input,.admin-form-select,.admin-form-textarea{width:100%;padding:.75rem 1rem;background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-md);font-size:.875rem;color:var(--stone-900);transition:all var(--transition-fast);min-height:44px;box-sizing:border-box}
  .admin-form-input:focus,.admin-form-select:focus,.admin-form-textarea:focus{outline:none;border-color:var(--amber-500);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
  .admin-form-input::placeholder{color:var(--stone-400)}
  .admin-form-textarea{resize:none;min-height:90px}
  .admin-form-select{cursor:pointer;appearance:auto}
  .admin-form-help{font-size:.75rem;color:var(--stone-400);margin-top:.375rem}
  .admin-form-grid{display:grid;grid-template-columns:1fr;gap:1rem}
  .admin-form-actions{display:flex;align-items:center;gap:.75rem;padding-top:1rem;border-top:1px solid var(--stone-100)}
  .admin-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.5rem;border:none;border-radius:var(--radius-md);font-size:.875rem;font-weight:700;cursor:pointer;transition:all var(--transition-fast);min-height:44px;text-decoration:none}
  .admin-btn-primary{background:linear-gradient(135deg,var(--stone-800),var(--stone-900));color:#fff}
  .admin-btn-primary:hover{background:linear-gradient(135deg,var(--stone-900),#1a1512);box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .admin-btn-ghost{padding:.75rem 1.5rem;background:none;color:var(--stone-500);font-weight:500;border-radius:var(--radius-md);transition:all var(--transition-fast);min-height:44px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:.875rem}
  .admin-btn-ghost:hover{color:var(--stone-900);background:var(--stone-50)}
  .admin-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--radius-full);font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;border:1px solid;white-space:nowrap}
  .admin-table{width:100%;border-collapse:collapse;font-size:.875rem}
  .admin-table th{text-align:left;padding:.75rem 1.25rem;font-size:.625rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--stone-400);background:var(--stone-50);border-bottom:1px solid var(--stone-100)}
  .admin-table td{padding:.75rem 1.25rem;border-bottom:1px solid var(--stone-50)}
  .admin-table tbody tr{transition:background var(--transition-fast)}
  .admin-table tbody tr:hover{background:rgba(255,251,235,.2)}
  .admin-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:50;padding:1rem}
  .admin-modal-overlay.open{display:flex}
  .admin-modal{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--stone-200);width:100%;max-width:512px;box-shadow:0 24px 48px rgba(0,0,0,.12)}
  .admin-modal-header{padding:1rem 1.5rem;border-bottom:1px solid var(--stone-100)}
  .admin-modal-header h2{font-size:1.125rem;font-weight:700;color:var(--stone-900)}
  .admin-modal-body{padding:1.5rem}
  .admin-modal-footer{display:flex;justify-content:flex-end;gap:.75rem;padding:1rem 1.5rem;border-top:1px solid var(--stone-100)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .admin-spin{animation:spin 1s linear infinite}
  @media(min-width:768px){.admin-form-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){.admin-card{padding:1rem}.admin-page-title{font-size:1.25rem}}
</style>

<div class="admin-page">
    <nav class="admin-breadcrumb">
        <a href="/admin/retailers">Retailers</a>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
        <span class="admin-breadcrumb-current">New Retailer</span>
    </nav>

    <div class="admin-page-header">
        <span class="admin-page-eyebrow">Retailers</span>
        <h1 class="admin-page-title">New <span class="accent">Retailer</span></h1>
        <p class="admin-page-subtitle">Onboard a new artisan shop to the marketplace</p>
    </div>

    <div class="admin-card">
        <form id="new-retailer-form" class="admin-stack" onsubmit="event.preventDefault(); submitNewRetailer(this)">
            <div class="admin-form-group">
                <label class="admin-form-label" for="name">Retailer Name</label>
                <input id="name" name="name" required class="admin-form-input" placeholder="e.g. Artisan Forge">
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label" for="slug">Slug</label>
                <input id="slug" name="slug" class="admin-form-input" placeholder="artisan-forge">
                <p class="admin-form-help">Leave empty to auto-generate from name</p>
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label" for="description">Description</label>
                <textarea id="description" name="description" rows="4" class="admin-form-textarea" placeholder="Tell the story of this artisan shop..."></textarea>
            </div>

            <div class="admin-form-grid">
                <div class="admin-form-group">
                    <label class="admin-form-label" for="logo_url">Logo</label>
                    <input id="logo_url" name="logo_url" type="file" accept="image/*" class="admin-form-input" />
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label" for="banner_url">Cover Image</label>
                    <input id="banner_url" name="banner_url" type="file" accept="image/*" class="admin-form-input" />
                </div>
            </div>

            <div class="admin-form-grid">
                <div class="admin-form-group">
                    <label class="admin-form-label" for="email">Email</label>
                    <input id="email" name="email" type="email" class="admin-form-input">
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label" for="phone">Phone</label>
                    <input id="phone" name="phone" class="admin-form-input">
                </div>
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label" for="address">Address</label>
                <textarea id="address" name="address" rows="2" class="admin-form-textarea"></textarea>
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label">Status</label>
                <select name="status" class="admin-form-select">
                    <option value="ACTIVE">Active</option>
                    <option value="INACTIVE">Inactive</option>
                </select>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="admin-btn admin-btn-primary">
                    <svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                    Create Retailer
                </button>
                <a href="/admin/retailers" class="admin-btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
async function submitNewRetailer(form) {
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<svg class="admin-spin" style="width:16px;height:16px;" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Creating...';

    const formData = new FormData(form);
    const data = {};
    for (const [key, value] of formData.entries()) { data[key] = value; }
    try {
        const logoFile = formData.get('logo_url');
        if (logoFile && logoFile.size) {
            const uf = new FormData(); uf.append('files', logoFile);
            const ur = await fetch('/api/admin/upload', { method: 'POST', body: uf });
            const ud = await ur.json();
            if (ud.urls && ud.urls.length) data.logo_url = ud.urls[0];
        }
        const bannerFile = formData.get('banner_url');
        if (bannerFile && bannerFile.size) {
            const uf = new FormData(); uf.append('files', bannerFile);
            const ur = await fetch('/api/admin/upload', { method: 'POST', body: uf });
            const ud = await ur.json();
            if (ud.urls && ud.urls.length) data.banner_url = ud.urls[0];
        }
        const res = await fetch('/api/admin/retailers', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error('Failed to create');
        showToast('Retailer created successfully', 'success');
        setTimeout(() => { window.location.href = '/admin/retailers'; }, 1000);
    } catch (err) {
        showToast('Failed to create retailer', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg style="width:16px;height:16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Create Retailer';
    }
}
</script>
{% endblock %}
