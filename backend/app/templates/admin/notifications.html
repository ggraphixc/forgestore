{% extends "admin/base.html" %}

{% block title %}Notifications — ForgeStore Admin{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <span class="text-xs font-bold uppercase tracking-[0.2em] text-amber-600 mb-2 block">System</span>
            <h1 class="text-3xl md:text-4xl font-display font-black text-stone-900">
                Notifications
                <span id="unread-badge" class="ml-2 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold bg-amber-100 text-amber-800 border border-amber-200 hidden"></span>
            </h1>
            <p class="text-sm text-stone-500 mt-2">Stay informed about new orders and system events</p>
        </div>
        <button onclick="markAllRead()" class="text-xs font-medium text-stone-500 hover:text-stone-900 bg-white border border-stone-200 px-4 py-2 rounded-xl hover:border-stone-300 transition-all duration-150">
            Mark All Read
        </button>
    </div>

    <!-- Notifications List -->
    <div id="notifications-container" class="space-y-2">
        <div class="bg-white rounded-2xl border border-stone-200 p-12 text-center shadow-sm">
            <div class="animate-spin w-6 h-6 border-2 border-amber-500 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-sm text-stone-400">Loading notifications...</p>
        </div>
    </div>

    <!-- Load More -->
    <div id="load-more-container" class="text-center mt-6 hidden">
        <button id="load-more-btn" onclick="loadMore()" class="px-6 py-3 text-sm font-medium text-stone-600 bg-white border border-stone-200 rounded-xl hover:border-stone-300 hover:text-stone-900 transition-all duration-150 shadow-sm">
            Load More
        </button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let currentOffset = 0;
const LIMIT = 20;
let isLoading = false;

async function loadNotifications(append = false) {
    if (isLoading) return;
    isLoading = true;

    const container = document.getElementById('notifications-container');
    const loadMoreContainer = document.getElementById('load-more-container');

    try {
        const res = await fetch(`/api/admin/notifications?limit=${LIMIT}&offset=${currentOffset}`);
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();

        if (!data.notifications || data.notifications.length === 0) {
            if (!append) {
                container.innerHTML = `<div class="bg-white rounded-2xl border border-stone-200 p-12 text-center shadow-sm">
                    <div class="w-16 h-16 bg-stone-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg class="w-8 h-8 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                    </div>
                    <p class="text-sm text-stone-500 font-medium">No notifications yet</p>
                    <p class="text-xs text-stone-400 mt-1">Notifications will appear when new orders are placed.</p>
                </div>`;
            }
            loadMoreContainer.classList.add('hidden');
            isLoading = false;
            return;
        }

        let html = '';
        for (const n of data.notifications) {
            const date = n.created_at ? new Date(n.created_at).toLocaleString() : '';
            const typeIcons = {
                'new_order': 'bg-emerald-100 text-emerald-600',
                'new_customer': 'bg-blue-100 text-blue-600',
                'new_review': 'bg-purple-100 text-purple-600',
                'low_stock': 'bg-red-100 text-red-600',
                'info': 'bg-blue-100 text-blue-600',
                'warning': 'bg-amber-100 text-amber-600',
            };
            const iconColor = typeIcons[n.type] || 'bg-stone-100 text-stone-600';
            const row = `<div class="bg-white rounded-xl border ${n.read ? 'border-stone-200' : 'border-amber-200 bg-amber-50/30'} p-4 hover:shadow-sm transition-all duration-150 flex items-start gap-4 ${n.link ? 'cursor-pointer' : ''}" onclick="${n.link ? `window.location.href='${n.link}'` : ''}">
                <div class="w-10 h-10 rounded-xl ${iconColor} flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        ${n.type === 'new_order' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>' : n.type === 'new_customer' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>' : n.type === 'new_review' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>' : n.type === 'low_stock' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>' : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>'}
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <p class="text-sm font-semibold text-stone-900">${n.title}</p>
                        ${!n.read ? '<span class="w-2 h-2 rounded-full bg-amber-500 shrink-0"></span>' : ''}
                    </div>
                    <p class="text-xs text-stone-500 mt-0.5">${n.message || ''}</p>
                    <p class="text-[10px] text-stone-400 mt-1.5">${date}</p>
                </div>
                ${!n.read ? `<button onclick="event.stopPropagation(); markRead('${n.id}')" class="shrink-0 p-1.5 text-stone-400 hover:text-stone-600 hover:bg-stone-100 rounded-lg transition-all" title="Mark as read">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"/></svg>
                </button>` : ''}
            </div>`;
            html += row;
        }

        if (append) {
            container.insertAdjacentHTML('beforeend', html);
        } else {
            container.innerHTML = html;
        }

        currentOffset += data.notifications.length;
        if (data.has_more) {
            loadMoreContainer.classList.remove('hidden');
        } else {
            loadMoreContainer.classList.add('hidden');
        }
    } catch (err) {
        if (!append) {
            container.innerHTML = `<div class="bg-white rounded-2xl border border-stone-200 p-12 text-center shadow-sm">
                <p class="text-sm text-red-500">Failed to load notifications.</p>
            </div>`;
        }
    }
    isLoading = false;
}

function loadMore() {
    loadNotifications(true);
}

async function markRead(id) {
    try {
        await fetch(`/api/admin/notifications/${id}/read`, { method: 'PUT' });
        // Reload the first page
        currentOffset = 0;
        loadNotifications(false);
        updateUnreadCount();
    } catch (e) {
        console.error('Failed to mark as read:', e);
    }
}

async function markAllRead() {
    // Use the new bulk read-all endpoint
    try {
        const res = await fetch('/api/admin/notifications/read-all', { method: 'PUT' });
        if (res.ok) {
            currentOffset = 0;
            loadNotifications(false);
            updateUnreadCount();
        }
    } catch (e) {
        console.error('Failed to mark all as read:', e);
    }
}

async function updateUnreadCount() {
    try {
        const res = await fetch('/api/admin/notifications/unread-count');
        const data = await res.json();
        const badge = document.getElementById('unread-badge');
        if (data.count > 0) {
            badge.textContent = data.count;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', () => {
    loadNotifications(false);
    updateUnreadCount();
});
</script>
{% endblock %}
