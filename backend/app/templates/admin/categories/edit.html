{% extends "admin/base.html" %}
{% block title %}Edit {{ category.name }} — ForgeStore Admin{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <nav class="flex items-center gap-2 text-sm text-stone-400 mb-6">
        <a href="/admin/categories" class="hover:text-amber-600 transition-colors">Categories</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7"/></svg>
        <span class="text-stone-600 font-medium">{{ category.name }}</span>
    </nav>

    <h1 class="text-2xl font-heading font-bold text-stone-900 mb-6">Edit Category</h1>

    <div class="bg-white rounded-2xl border border-stone-200 p-6 md:p-8 shadow-sm hover:shadow-md transition-shadow">
        <form id="edit-category-form" class="space-y-5" onsubmit="event.preventDefault(); submitEditCategory(this)">
            <input type="hidden" name="id" value="{{ category.id }}">

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="name">Category Name</label>
                <input id="name" name="name" value="{{ category.name }}" required class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="slug">Slug</label>
                <input id="slug" name="slug" value="{{ category.slug }}" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all">
                <p class="text-xs text-stone-400 mt-1.5">Leave empty to auto-generate</p>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="description">Description</label>
                <textarea id="description" name="description" rows="3" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all">{{ category.description or '' }}</textarea>
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[0.15em] text-stone-500 mb-2" for="image">Category Image</label>
                {% if category.image %}
                <div class="mb-3">
                    <img src="{{ category.image }}" alt="{{ category.name }}" class="w-32 h-20 object-cover rounded-lg border border-stone-200">
                </div>
                {% endif %}
                <input id="image" name="image" type="file" accept="image/*" class="w-full px-4 py-3 bg-white border border-stone-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all" />
                <input type="hidden" name="existing_image" value="{{ category.image or '' }}">
            </div>

            <div class="flex items-center gap-3 pt-4 border-t border-stone-100">
                <button type="submit" class="px-6 py-3 bg-gradient-to-r from-stone-800 to-stone-900 text-white text-sm font-bold rounded-xl hover:from-stone-900 hover:to-stone-950 transition-all shadow-md hover:shadow-lg">
                    <span class="inline-flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                        Save Changes
                    </span>
                </button>
                <a href="/admin/categories" class="px-6 py-3 text-sm font-medium text-stone-500 hover:text-stone-900 hover:bg-stone-50 rounded-xl transition-all">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
async function submitEditCategory(form) {
    const btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-flex items-center gap-2"><svg class="animate-spin w-4 h-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg> Saving...</span>';

    const formData = new FormData(form);
    const data = {};
    for (const [key, value] of formData.entries()) {
        if (key === 'image' || key === 'existing_image') continue;
        data[key] = value;
    }

    const imageFile = formData.get('image');
    if (imageFile && imageFile.size) {
        const uploadForm = new FormData();
        uploadForm.append('files', imageFile);
        const uploadRes = await fetch('/api/admin/upload', {
            method: 'POST',
            body: uploadForm,
        });
        const uploadData = await uploadRes.json();
        if (uploadData.urls && uploadData.urls.length) {
            data.image = uploadData.urls[0];
        }
    } else if (formData.get('existing_image')) {
        data.image = formData.get('existing_image');
    }
    try {
        const res = await fetch(`/api/admin/categories/${form.id.value}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        if (!res.ok) throw new Error('Failed to update');
        showToast('Category updated successfully', 'success');
        setTimeout(() => { window.location.href = '/admin/categories'; }, 1000);
    } catch (err) {
        showToast('Failed to update category', 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<span class="inline-flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Save Changes</span>';
    }
}
</script>
{% endblock %}
