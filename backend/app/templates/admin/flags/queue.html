{% extends "admin/base.html" %}
{% block title %}Flag Queue — {{ settings.site_name|default('ForgeStore') }}{% endblock %}
{% block content %}
<style>
  @import url('/static/css/admin_portal.css');

  .fl-card { background: var(--ap-bg-elevated); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-xl); padding: 1.25rem; margin-bottom: 0.75rem; transition: all var(--ap-transition); }
  .fl-card:hover { border-color: var(--ap-primary); box-shadow: var(--ap-shadow-md); }
  .fl-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; margin-bottom: 0.75rem; }
  .fl-card-product { display: flex; align-items: center; gap: 0.75rem; }
  .fl-thumb { width: 56px; height: 56px; border-radius: var(--ap-radius-sm); object-fit: cover; background: var(--ap-border-light); flex-shrink: 0; }
  .fl-card-name { font-weight: 700; font-size: 0.9375rem; color: var(--ap-text); }
  .fl-card-meta { font-size: 0.75rem; color: var(--ap-text-muted); margin-top: 0.125rem; }
  .fl-badge { display: inline-block; font-size: 0.6875rem; font-weight: 700; padding: 0.2rem 0.625rem; border-radius: 9999px; }
  .fl-badge.high { background: var(--ap-red-soft); color: #991b1b; }
  .fl-badge.medium { background: var(--ap-amber-soft); color: #92400e; }
  .fl-badge.low { background: var(--ap-blue-soft); color: #1e40af; }
  .fl-badge.pending { background: var(--ap-amber-soft); color: #92400e; }
  .fl-badge.resolved { background: var(--ap-emerald-soft); color: #065f46; }
  .fl-badge.dismissed { background: var(--ap-border-light); color: var(--ap-text-secondary); }
  .fl-badge.suspended { background: var(--ap-red-soft); color: #991b1b; }
  .fl-ai-box { background: var(--ap-bg); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-md); padding: 0.75rem; margin-bottom: 0.75rem; }
  .fl-ai-box .ai-label { font-size: 0.6875rem; font-weight: 700; text-transform: uppercase; color: var(--ap-text-muted); margin-bottom: 0.375rem; }
  .fl-ai-box .ai-text { font-size: 0.8125rem; color: var(--ap-text); line-height: 1.5; }
  .fl-flag-info { display: flex; gap: 1.5rem; font-size: 0.8125rem; color: var(--ap-text); margin-bottom: 0.75rem; flex-wrap: wrap; }
  .fl-flag-info span { display: flex; align-items: center; gap: 0.375rem; }
  .fl-flag-info .fl-label { color: var(--ap-text-muted); font-weight: 600; }
  .fl-actions { display: flex; gap: 0.5rem; align-items: center; }
  .fl-btn { min-height: 44px; padding: 0.375rem 0.875rem; border-radius: var(--ap-radius-md); font-size: 0.8125rem; font-weight: 700; cursor: pointer; border: none; transition: all var(--ap-transition); display: inline-flex; align-items: center; justify-content: center; }
  .fl-btn-resolve { background: var(--ap-emerald); color: #fff; }
  .fl-btn-resolve:hover { background: #059669; }
  .fl-btn-dismiss { background: transparent; color: var(--ap-text-muted); border: 1px solid var(--ap-border); min-height: 44px; }
  .fl-btn-dismiss:hover { background: var(--ap-bg); }
  .fl-btn-view { background: transparent; color: var(--ap-primary); border: 1px solid var(--ap-border); min-height: 44px; }
  .fl-btn-view:hover { background: var(--ap-amber-soft); }
  .fl-note { flex: 1; min-width: 200px; padding: 0.375rem 0.75rem; border: 1px solid var(--ap-border); border-radius: var(--ap-radius-sm); font-size: 0.8125rem; background: var(--ap-bg); color: var(--ap-text); min-height: 44px; }
  .fl-empty { text-align: center; padding: 4rem 1.5rem; color: var(--ap-text-muted); }
  .fl-empty svg { width: 3rem; height: 3rem; margin: 0 auto 1rem; opacity: 0.4; }
  .fl-pagination { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; }
  .fl-page-btn { min-height: 44px; padding: 0.375rem 0.75rem; border-radius: var(--ap-radius-sm); font-size: 0.8125rem; font-weight: 600; cursor: pointer; border: 1px solid var(--ap-border); background: var(--ap-bg-elevated); color: var(--ap-text); display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .fl-page-btn.active { background: var(--ap-primary); color: #fff; border-color: var(--ap-primary); }
  .fl-toast { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 9999; padding: 0.75rem 1.25rem; border-radius: var(--ap-radius-lg); font-size: 0.875rem; font-weight: 600; color: #fff; box-shadow: var(--ap-shadow-xl); transition: opacity 0.3s; }
  .fl-toast.success { background: var(--ap-emerald); }
  .fl-toast.error { background: var(--ap-red); }
  .fl-bulk { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; padding: 0.75rem 1rem; background: var(--ap-bg-elevated); border: 1px solid var(--ap-border); border-radius: var(--ap-radius-md); }
  .fl-bulk label { font-size: 0.8125rem; font-weight: 600; color: var(--ap-text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
  @media (max-width: 640px) {
    .fl-card-header { flex-direction: column; }
    .fl-actions { flex-wrap: wrap; }
  }
</style>

<div class="ap-page">
  <div class="ap-header">
    <div class="ap-header-left">
      <span class="ap-overline">Flags</span>
      <h1>Flag Queue</h1>
      <p class="ap-subtitle">AI-triaged customer product reports — review and take action</p>
    </div>
  </div>

  <div class="ap-stats" id="flStats"></div>

  <div class="ap-tabs" id="flFilters">
    <button class="ap-tab active" data-status="PENDING">Pending</button>
    <button class="ap-tab" data-status="RESOLVED">Resolved</button>
    <button class="ap-tab" data-status="DISMISSED">Dismissed</button>
  </div>

  <div class="fl-bulk" id="flBulk" style="display:none;">
    <label><input type="checkbox" id="flSelectAll" onchange="flToggleSelect()"> Select All</label>
    <button class="fl-btn fl-btn-resolve" onclick="flBulkAction('resolve')">Resolve Selected</button>
    <button class="fl-btn fl-btn-dismiss" onclick="flBulkAction('dismiss')">Dismiss Selected</button>
    <span id="flSelectedCount" style="font-size:0.8125rem;color:var(--ap-text-muted);"></span>
  </div>

  <div id="flList"></div>
  <div class="fl-pagination" id="flPagination"></div>
</div>

<script>
let flStatus = 'PENDING';
let flPage = 1;

async function flLoadStats() {
  const r = await fetch('/api/admin/flags/stats');
  const d = await r.json();
  document.getElementById('flStats').innerHTML = `
    <div class="ap-stat ap-stat-amber"><div class="ap-stat-icon amber"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="ap-stat-label">Pending</div><div class="ap-stat-value">${d.pending}</div></div>
    <div class="ap-stat ap-stat-emerald"><div class="ap-stat-icon emerald"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div><div class="ap-stat-label">Resolved</div><div class="ap-stat-value">${d.resolved}</div></div>
    <div class="ap-stat ap-stat-blue"><div class="ap-stat-icon purple"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg></div><div class="ap-stat-label">Dismissed</div><div class="ap-stat-value">${d.dismissed}</div></div>
    <div class="ap-stat ap-stat-rose"><div class="ap-stat-icon rose"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg></div><div class="ap-stat-label">3+ Flags (Auto)</div><div class="ap-stat-value">${d.high_flag_products}</div></div>
  `;
}

async function flLoadQueue(page = 1) {
  flPage = page;
  const r = await fetch(`/api/admin/flags?status=${flStatus}&page=${page}&per_page=15`);
  const d = await r.json();
  const isPending = flStatus === 'PENDING';
  document.getElementById('flBulk').style.display = isPending && d.flags.length ? 'flex' : 'none';

  if (!d.flags.length) {
    document.getElementById('flList').innerHTML = `<div class="ap-empty">
      <div class="ap-empty-icon"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"/></svg></div>
      <h3>No flags in this queue</h3>
    </div>`;
    document.getElementById('flPagination').innerHTML = '';
    return;
  }

  let html = '';
  for (const f of d.flags) {
    const thumb = f.product_image ? `<img src="${f.product_image}" class="fl-thumb" alt="">` : `<div class="fl-thumb"></div>`;
    const severity = f.flag_count >= 5 ? 'high' : f.flag_count >= 3 ? 'medium' : 'low';
    const severityLabel = f.flag_count >= 5 ? 'HIGH' : f.flag_count >= 3 ? 'MEDIUM' : 'LOW';

    let aiText = '';
    if (f.description.includes('AI Triage:')) {
      const parts = f.description.split('---');
      aiText = parts[1] ? parts[1].trim() : '';
    }

    html += `<div class="fl-card" id="flag-${f.id}">
      <div class="fl-card-header">
        <div class="fl-card-product">
          ${thumb}
          <div>
            <div class="fl-card-name">${f.product_name}</div>
            <div class="fl-card-meta">${f.retailer} · ₦${f.product_price.toLocaleString()} · ${f.flag_count} flag${f.flag_count !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <span class="fl-badge ${severity}">${severityLabel}</span>
          <span class="fl-badge ${f.product_status.toLowerCase()}">${f.product_status}</span>
          <span class="fl-badge ${f.status.toLowerCase()}">${f.status}</span>
        </div>
      </div>

      <div class="fl-flag-info">
        <span><span class="fl-label">Reason:</span> ${f.reason}</span>
        <span><span class="fl-label">Reporter:</span> ${f.reporter_name}</span>
        <span><span class="fl-label">Date:</span> ${f.created_at ? new Date(f.created_at).toLocaleDateString() : '—'}</span>
      </div>

      ${f.description ? `<div style="font-size:0.8125rem;color:var(--ap-text);margin-bottom:0.75rem;">${f.description.split('---')[0].trim()}</div>` : ''}

      ${aiText ? `<div class="fl-ai-box">
        <div class="ai-label">AI Triage Analysis</div>
        <div class="ai-text">${aiText}</div>
      </div>` : ''}

      ${isPending ? `<div class="fl-actions">
        <input type="text" class="fl-note" id="note-${f.id}" placeholder="Add a note (optional)">
        <input type="checkbox" class="row-check" value="${f.id}" onchange="flUpdateSelected()">
        <button class="fl-btn fl-btn-resolve" onclick="flReview('${f.id}', 'resolve')">Resolve</button>
        <button class="fl-btn fl-btn-dismiss" onclick="flReview('${f.id}', 'dismiss')">Dismiss</button>
      </div>` : `<div class="fl-actions">
        <span style="font-size:0.75rem;color:var(--ap-text-muted);">${f.admin_note || ''}</span>
      </div>`}
    </div>`;
  }
  document.getElementById('flList').innerHTML = html;

  let pag = '';
  if (d.pages > 1) {
    for (let i = 1; i <= d.pages; i++) {
      pag += `<button class="fl-page-btn ${i === page ? 'active' : ''}" onclick="flLoadQueue(${i})">${i}</button>`;
    }
  }
  document.getElementById('flPagination').innerHTML = pag;
  flUpdateSelected();
}

async function flReview(id, action) {
  const note = document.getElementById('note-' + id)?.value || '';
  const r = await fetch(`/api/admin/flags/${id}/review?action=${action}&note=${encodeURIComponent(note)}`, { method: 'POST' });
  const d = await r.json();
  if (d.success) {
    flToast(`Flag ${action}d`, false);
    flLoadStats();
    flLoadQueue(flPage);
  } else {
    flToast(d.detail || 'Error', true);
  }
}

function flToggleSelect() {
  const check = document.getElementById('flSelectAll');
  document.querySelectorAll('.row-check').forEach(cb => cb.checked = check.checked);
  flUpdateSelected();
}

function flUpdateSelected() {
  const checked = document.querySelectorAll('.row-check:checked').length;
  const el = document.getElementById('flSelectedCount');
  if (el) el.textContent = checked ? `${checked} selected` : '';
}

async function flBulkAction(action) {
  const ids = Array.from(document.querySelectorAll('.row-check:checked')).map(cb => cb.value);
  if (!ids.length) return;
  await fetch('/api/admin/flags/bulk-action', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ flag_ids: ids, action: action }),
  });
  flToast(`${ids.length} flags ${action}d`, false);
  flLoadStats();
  flLoadQueue(flPage);
}

function flToast(msg, isError) {
  const t = document.createElement('div');
  t.className = `fl-toast ${isError ? 'error' : 'success'}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

document.querySelectorAll('.ap-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ap-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    flStatus = btn.dataset.status;
    flLoadQueue(1);
  });
});

flLoadStats();
flLoadQueue();
</script>
{% endblock %}
