<!-- ===== Admin AI Assistant Floating Widget ===== -->
<style>
@import url('/static/css/admin_portal.css');

@keyframes adminChatSlideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes adminChatSlideDown {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(16px) scale(0.97); }
}
@keyframes adminDotBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

.admin-ai-btn {
    position: fixed; bottom: 5.5rem; right: 1.5rem;
    width: 3.5rem; height: 3.5rem; min-width: 44px; min-height: 44px;
    border-radius: var(--ap-radius-pill); border: none; cursor: grab;
    background: var(--ap-gradient-dark); color: var(--ap-primary);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--ap-shadow-lg);
    transition: box-shadow var(--ap-transition); z-index: 9998;
    touch-action: none; user-select: none;
}
@media (max-width: 768px) {
    .admin-ai-btn { bottom: 6.5rem; right: 1rem; width: 3rem; height: 3rem; }
}
.admin-ai-btn.dragging { cursor: grabbing; transform: scale(1.1); box-shadow: var(--ap-shadow-xl); transition: none; }
.admin-ai-btn:hover { box-shadow: var(--ap-shadow-xl); }
.admin-ai-btn:active { transform: scale(0.95); }
.admin-ai-btn svg { width: 1.375rem; height: 1.375rem; pointer-events: none; }

.admin-ai-panel {
    position: fixed; bottom: 9.5rem; right: 1.5rem;
    width: min(calc(100vw - 3rem), 440px); max-height: min(78vh, 640px);
    background: var(--ap-bg-glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: var(--ap-radius-2xl); overflow: hidden;
    box-shadow: var(--ap-shadow-xl);
    border: 1px solid var(--ap-border-glass); display: none; flex-direction: column;
    z-index: 9999;
    font-family: var(--ap-font);
}
@media (max-width: 768px) {
    .admin-ai-panel { bottom: 10.5rem; right: 0.75rem; width: min(calc(100vw - 1.5rem), 400px); max-height: 60vh; }
}
.admin-ai-panel.open { display: flex; animation: adminChatSlideUp 0.25s ease-out; }
.admin-ai-panel.closing { animation: adminChatSlideDown 0.2s ease-in forwards; }
.dark .admin-ai-panel {
    background: var(--ap-bg-glass); border-color: var(--ap-border-glass);
}

.admin-ai-header {
    padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between;
    background: var(--ap-gradient-dark); color: var(--ap-text-inverse); flex-shrink: 0;
}
.admin-ai-header-left { display: flex; align-items: center; gap: 0.625rem; }
.admin-ai-header-icon {
    width: 36px; height: 36px; border-radius: var(--ap-radius-md);
    background: rgba(245, 158, 11, 0.15); display: flex; align-items: center; justify-content: center;
}
.admin-ai-header-icon svg { width: 18px; height: 18px; color: var(--ap-primary); }
.admin-ai-header-title { font-weight: 700; font-size: 0.9375rem; }
.admin-ai-header-sub { font-size: 0.6875rem; color: var(--ap-text-muted); }
.admin-ai-close {
    width: 44px; height: 44px; border-radius: var(--ap-radius-md); border: none;
    background: rgba(255,255,255,0.08); color: var(--ap-text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--ap-transition);
}
.admin-ai-close:hover { background: rgba(255,255,255,0.15); color: var(--ap-text-inverse); }

.admin-ai-messages {
    flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.75rem;
    min-height: 280px; max-height: 50vh;
}
.admin-ai-messages::-webkit-scrollbar { width: 5px; }
.admin-ai-messages::-webkit-scrollbar-track { background: transparent; }
.admin-ai-messages::-webkit-scrollbar-thumb { background: var(--ap-border); border-radius: var(--ap-radius-pill); }

.admin-ai-msg {
    max-width: 85%; padding: 0.75rem 1rem; border-radius: var(--ap-radius-lg);
    font-size: 0.8125rem; line-height: 1.6; word-break: break-word;
}
.admin-ai-msg--user {
    align-self: flex-end; background: var(--ap-gradient-primary); color: #1c1917;
    border-bottom-right-radius: var(--ap-radius-xs);
    box-shadow: var(--ap-shadow-sm);
}
.admin-ai-msg--bot {
    align-self: flex-start; background: var(--ap-bg-elevated); color: var(--ap-text);
    border-bottom-left-radius: var(--ap-radius-xs);
    border: 1px solid var(--ap-border-light);
}
.dark .admin-ai-msg--bot { background: var(--ap-bg-elevated); color: var(--ap-text); border-color: var(--ap-border); }

.admin-ai-loading { display: flex; gap: 4px; padding: 0.75rem 1rem; }
.admin-ai-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--ap-text-muted);
    animation: adminDotBounce 1.2s ease-in-out infinite;
}
.admin-ai-dot:nth-child(2) { animation-delay: 0.15s; }
.admin-ai-dot:nth-child(3) { animation-delay: 0.3s; }

.admin-ai-actions {
    padding: 0.625rem 1rem; display: flex; flex-wrap: wrap; gap: 0.375rem;
    border-top: 1px solid var(--ap-border-light); flex-shrink: 0;
}
.dark .admin-ai-actions { border-color: var(--ap-border); }
.admin-ai-action {
    padding: 0.375rem 0.75rem; min-height: 32px;
    border-radius: var(--ap-radius-pill); border: 1px solid var(--ap-border);
    background: var(--ap-bg-elevated); color: var(--ap-text-secondary);
    font-size: 0.6875rem; font-family: var(--ap-font); cursor: pointer;
    transition: all var(--ap-transition); white-space: nowrap;
}
.admin-ai-action:hover {
    background: var(--ap-amber-soft); border-color: var(--ap-primary);
    color: #92400e;
}
.dark .admin-ai-action { background: var(--ap-bg-elevated); border-color: var(--ap-border); color: var(--ap-text-secondary); }
.dark .admin-ai-action:hover { background: rgba(245,158,11,0.15); border-color: var(--ap-primary); color: var(--ap-primary); }

.admin-ai-input-wrap {
    padding: 0.75rem 1rem; border-top: 1px solid var(--ap-border-light);
    display: flex; gap: 0.5rem; align-items: flex-end; flex-shrink: 0;
}
.dark .admin-ai-input-wrap { border-color: var(--ap-border); }
.admin-ai-input {
    flex: 1; padding: 0.625rem 0.875rem; min-height: 44px; max-height: 96px;
    border-radius: var(--ap-radius-md); border: 1.5px solid var(--ap-border);
    background: var(--ap-bg-elevated); color: var(--ap-text);
    font-size: 0.8125rem; font-family: var(--ap-font); resize: none;
    outline: none; transition: border-color var(--ap-transition), box-shadow var(--ap-transition);
}
.admin-ai-input:focus {
    border-color: var(--ap-accent);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
}
.admin-ai-input::placeholder { color: var(--ap-text-muted); }
.dark .admin-ai-input { background: var(--ap-bg-elevated); border-color: var(--ap-border); color: var(--ap-text); }
.admin-ai-send {
    width: 44px; height: 44px; border-radius: var(--ap-radius-md); border: none; flex-shrink: 0;
    background: var(--ap-gradient-primary); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--ap-transition), box-shadow var(--ap-transition);
    box-shadow: var(--ap-shadow-primary);
}
.admin-ai-send:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px -3px rgba(245, 158, 11, 0.4);
}
.admin-ai-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.admin-ai-send svg { width: 16px; height: 16px; }

.admin-ai-input-area { border-top: 1px solid var(--ap-border-light); flex-shrink: 0; }
.dark .admin-ai-input-area { border-color: var(--ap-border); }

.admin-ai-image-preview {
    display: none; padding: 8px 12px 0; gap: 8px; flex-wrap: wrap;
}
.admin-ai-image-preview.has-image { display: flex; }

.admin-ai-attach {
    width: 44px; height: 44px; border-radius: var(--ap-radius-md); border: none;
    background: var(--ap-bg); color: var(--ap-text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all var(--ap-transition);
}
.admin-ai-attach:hover { background: var(--ap-amber-soft); color: #92400e; }
.dark .admin-ai-attach { background: var(--ap-bg-elevated); color: var(--ap-text-secondary); }
.dark .admin-ai-attach:hover { background: rgba(245,158,11,0.15); color: var(--ap-primary); }

.admin-ai-img-thumb {
    position: relative; display: inline-block; border-radius: var(--ap-radius-md);
    overflow: hidden; border: 1px solid var(--ap-border);
}
.dark .admin-ai-img-thumb { border-color: var(--ap-border); }
.admin-ai-img-thumb img { display: block; max-height: 60px; max-width: 120px; }
.admin-ai-img-remove {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
    border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 11px; line-height: 1;
}
.admin-ai-file-tag {
    display: flex; align-items: center; gap: 6px; padding: 4px 8px;
    border-radius: var(--ap-radius-sm); border: 1px solid var(--ap-border);
    background: var(--ap-bg-elevated);
}
.dark .admin-ai-file-tag { border-color: var(--ap-border); background: var(--ap-bg-elevated); }
.admin-ai-file-tag span { font-size: 11px; color: var(--ap-text-secondary); }
.dark .admin-ai-file-tag span { color: var(--ap-text-secondary); }
</style>

<div id="admin-ai-widget">
    <button id="admin-ai-toggle" class="admin-ai-btn" onclick="AdminAI.toggle()" aria-label="AI Assistant">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>
    </button>

    <div id="admin-ai-panel" class="admin-ai-panel">
        <div class="admin-ai-header">
            <div class="admin-ai-header-left">
                <div class="admin-ai-header-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z"/></svg>
                </div>
                <div>
                    <div class="admin-ai-header-title">{{ settings.site_name|default('ForgeStore') }} AI</div>
                    <div class="admin-ai-header-sub">Business intelligence assistant</div>
                </div>
            </div>
            <button class="admin-ai-close" onclick="AdminAI.toggle()" aria-label="Close">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div id="admin-ai-messages" class="admin-ai-messages">
            <div class="admin-ai-msg admin-ai-msg--bot">
                Hello! I'm your AI admin assistant. I can help you analyze sales, generate reports, check for issues, and manage store settings. What would you like to know?
            </div>
        </div>

        <div id="admin-ai-actions" class="admin-ai-actions">
            <button class="admin-ai-action" onclick="AdminAI.send('Analyze my sales for the last 30 days')">Sales Analysis</button>
            <button class="admin-ai-action" onclick="AdminAI.send('Generate a summary report of key metrics')">Summary Report</button>
            <button class="admin-ai-action" onclick="AdminAI.send('What issues need my attention right now?')">Check Issues</button>
            <button class="admin-ai-action" onclick="AdminAI.send('How is customer satisfaction trending?')">Satisfaction</button>
        </div>

        <div class="admin-ai-input-area">
        <div id="admin-ai-image-preview" class="admin-ai-image-preview"></div>
        <div class="admin-ai-input-wrap">
            <input type="file" id="admin-ai-file" accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx" style="display:none;" onchange="AdminAI.onFileSelect(event)">
            <button type="button" id="admin-ai-attach" onclick="document.getElementById('admin-ai-file').click()" aria-label="Attach image or file" class="admin-ai-attach">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </button>
            <textarea id="admin-ai-input" class="admin-ai-input" rows="1" placeholder="Ask about your business..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();AdminAI.submit()}" oninput="AdminAI.autoResize(this)"></textarea>
            <button id="admin-ai-send" class="admin-ai-send" onclick="AdminAI.submit()" aria-label="Send">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
(function() {
    const AI = {
        sessionId: 'admin-' + Date.now(),
        isOpen: false,
        pendingImage: null,

        onFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            const preview = document.getElementById('admin-ai-image-preview');
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    this.pendingImage = { type: 'image', data: ev.target.result, name: file.name };
                    preview.innerHTML = '<div class="admin-ai-img-thumb"><img src="' + ev.target.result + '"><button onclick="AdminAI.removeImage()" class="admin-ai-img-remove">&times;</button></div>';
                    preview.classList.add('has-image');
                };
                reader.readAsDataURL(file);
            } else {
                this.pendingImage = { type: 'file', data: null, name: file.name, mime: file.type };
                preview.innerHTML = '<div class="admin-ai-file-tag"><svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><span>' + file.name + '</span><button onclick="AdminAI.removeImage()" class="admin-ai-img-remove" style="position:static;width:16px;height:16px;font-size:10px;">&times;</button></div>';
                preview.classList.add('has-image');
            }
            e.target.value = '';
        },

        removeImage() {
            this.pendingImage = null;
            const preview = document.getElementById('admin-ai-image-preview');
            preview.innerHTML = '';
            preview.classList.remove('has-image');
        },

        toggle() {
            const panel = document.getElementById('admin-ai-panel');
            if (this.isOpen) {
                panel.classList.add('closing');
                setTimeout(() => { panel.classList.remove('open', 'closing'); }, 200);
            } else {
                panel.classList.remove('closing');
                panel.classList.add('open');
                document.getElementById('admin-ai-input').focus();
            }
            this.isOpen = !this.isOpen;
        },

        async send(text) {
            const input = document.getElementById('admin-ai-input');
            input.value = text;
            this.submit();
        },

        async submit() {
            const input = document.getElementById('admin-ai-input');
            const text = input.value.trim();
            const image = this.pendingImage;
            if (!text && !image) return;

            this.addMessage(text || (image ? '📎 ' + image.name : ''), 'user');
            input.value = '';
            input.style.height = 'auto';
            this.removeImage();
            this.hideActions();
            this.setLoading(true);

            const body = { session_id: this.sessionId, message: text || 'Analyze this file' };

            if (image) {
                if (image.type === 'image' && image.data) {
                    body.image_url = image.data;
                } else if (image.type === 'file') {
                    body.message = (text || 'Analyze this file') + ' [Attached: ' + image.name + ']';
                }
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 120000);
                const res = await fetch('/api/ai/assistant/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                    signal: controller.signal,
                });
                clearTimeout(timeoutId);
                if (!res.ok) {
                    const errText = await res.text().catch(() => 'Server error');
                    this.addMessage('Server error (' + res.status + '). Please try again.', 'bot');
                    this.setLoading(false);
                    return;
                }
                const data = await res.json();
                this.addMessage(data.response || data.detail || 'Sorry, I could not process that.', 'bot');
            } catch (e) {
                console.error('Admin AI chat error:', e);
                const msg = e.name === 'AbortError'
                    ? 'AI assistant timed out. The provider may be slow — try again.'
                    : 'Network error — ' + (e.message || 'Please try again.');
                this.addMessage(msg, 'bot');
            }
            this.setLoading(false);
        },

        addMessage(text, role) {
            const container = document.getElementById('admin-ai-messages');
            const div = document.createElement('div');
            div.className = 'admin-ai-msg admin-ai-msg--' + role;
            div.innerHTML = this.formatResponse(text);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        },

        formatResponse(text) {
            return text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        },

        setLoading(on) {
            const btn = document.getElementById('admin-ai-send');
            const input = document.getElementById('admin-ai-input');
            btn.disabled = on;
            input.disabled = on;
            if (on) {
                const container = document.getElementById('admin-ai-messages');
                const dots = document.createElement('div');
                dots.className = 'admin-ai-loading';
                dots.id = 'admin-ai-loading';
                dots.innerHTML = '<span class="admin-ai-dot"></span><span class="admin-ai-dot"></span><span class="admin-ai-dot"></span>';
                container.appendChild(dots);
                container.scrollTop = container.scrollHeight;
            } else {
                const dots = document.getElementById('admin-ai-loading');
                if (dots) dots.remove();
            }
        },

        hideActions() {
            const a = document.getElementById('admin-ai-actions');
            if (a) a.style.display = 'none';
        },

        autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 96) + 'px';
        }
    };

    window.AdminAI = AI;

    // Drag-to-move for admin AI button
    (function() {
        const btn = document.getElementById('admin-ai-toggle');
        if (!btn) return;

        const STORAGE_KEY = 'admin_ai_widget_pos';
        let isDragging = false;
        let hasMoved = false;
        let startX, startY, startRight, startBottom;

        // Restore saved position
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (saved && typeof saved.right === 'number' && typeof saved.bottom === 'number') {
                btn.style.right = saved.right + 'px';
                btn.style.bottom = saved.bottom + 'px';
                btn.style.left = 'auto';
            }
        } catch {}

        function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

        function onStart(e) {
            isDragging = false;
            hasMoved = false;
            const touch = e.touches ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            const rect = btn.getBoundingClientRect();
            startRight = window.innerWidth - rect.right;
            startBottom = window.innerHeight - rect.bottom;
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
        }

        function onMove(e) {
            const touch = e.touches ? e.touches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
            if (!isDragging) return;
            e.preventDefault();
            hasMoved = true;
            btn.classList.add('dragging');
            const newRight = clamp(startRight - dx, 8, window.innerWidth - 64);
            const newBottom = clamp(startBottom - dy, 8, window.innerHeight - 64);
            btn.style.right = newRight + 'px';
            btn.style.bottom = newBottom + 'px';
            btn.style.left = 'auto';
        }

        function onEnd() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onEnd);
            document.removeEventListener('touchmove', onMove);
            document.removeEventListener('touchend', onEnd);
            btn.classList.remove('dragging');
            if (hasMoved) {
                const rect = btn.getBoundingClientRect();
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    right: window.innerWidth - rect.right,
                    bottom: window.innerHeight - rect.bottom
                }));
            }
        }

        btn.addEventListener('mousedown', onStart);
        btn.addEventListener('touchstart', onStart, { passive: true });

        // Prevent toggle on drag
        const origToggle = AI.toggle.bind(AI);
        AI.toggle = function() {
            if (hasMoved) { hasMoved = false; return; }
            origToggle();
        };
    })();
})();
</script>
