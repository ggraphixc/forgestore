{% extends "admin/base.html" %}

{% block title %}Edit Admin — {{ settings.site_name|default("ForgeStore") }}{% endblock %}

{% block content %}
<style>
@import url('/static/css/admin_portal.css');
</style>

<div class="ap-page" style="max-width:640px;">
    <div class="ap-header">
        <div class="ap-header-left" style="display:flex;flex-direction:row;align-items:center;gap:1rem;">
            <a href="/admin/admin-users" class="ap-btn ap-btn-ghost ap-btn-icon" style="margin-left:-0.5rem;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <div>
                <span class="ap-overline">Admin Users</span>
                <h1>Edit Admin</h1>
                <p class="ap-subtitle">{{ target_admin.email }}</p>
            </div>
        </div>
    </div>

    <div class="ap-card">
        <div class="ap-card-body">
            <form method="POST" style="display:flex;flex-direction:column;gap:1.25rem;">
                <div class="ap-grid-2">
                    <div>
                        <label for="name" style="display:block;font-size:0.8125rem;font-weight:600;color:var(--ap-text-secondary);margin-bottom:0.375rem;">Full Name</label>
                        <input id="name" name="name" class="ap-input" value="{{ target_admin.name or '' }}">
                    </div>
                    <div>
                        <label style="display:block;font-size:0.8125rem;font-weight:600;color:var(--ap-text-secondary);margin-bottom:0.375rem;">Email</label>
                        <input class="ap-input" value="{{ target_admin.email }}" readonly style="background:var(--ap-bg);color:var(--ap-text-muted);cursor:not-allowed;">
                    </div>
                </div>

                <div>
                    <label for="password" style="display:block;font-size:0.8125rem;font-weight:600;color:var(--ap-text-secondary);margin-bottom:0.375rem;">New Password <span style="font-weight:400;color:var(--ap-text-muted);">(leave blank to keep current)</span></label>
                    <input id="password" name="password" type="password" class="ap-input" placeholder="Leave blank to keep current" minlength="6">
                </div>

                <div class="ap-grid-2">
                    <div>
                        <label for="role" style="display:block;font-size:0.8125rem;font-weight:600;color:var(--ap-text-secondary);margin-bottom:0.375rem;">Role</label>
                        <select id="role" name="role" class="ap-input ap-select" onchange="toggleVendorField()">
                            <option value="DIR_ADMIN" {% if target_admin.role.value == 'DIR_ADMIN' %}selected{% endif %}>DIR_ADMIN</option>
                            <option value="MANAGEMENT" {% if target_admin.role.value == 'MANAGEMENT' %}selected{% endif %}>MANAGEMENT</option>
                            <option value="TECH_ADMIN" {% if target_admin.role.value == 'TECH_ADMIN' %}selected{% endif %}>TECH_ADMIN</option>
                            <option value="RETAILER" {% if target_admin.role.value == 'RETAILER' %}selected{% endif %}>RETAILER</option>
                            <option value="LOGISTICS" {% if target_admin.role.value == 'LOGISTICS' %}selected{% endif %}>LOGISTICS</option>
                        </select>
                    </div>

                    <div id="vendor-field" class="{% if target_admin.role.value != 'RETAILER' %}admin-hidden{% endif %}">
                        <label for="vendor_id" style="display:block;font-size:0.8125rem;font-weight:600;color:var(--ap-text-secondary);margin-bottom:0.375rem;">Linked Retailer</label>
                        <select id="vendor_id" name="vendor_id" class="ap-input ap-select">
                            <option value="">&#x2014; None &#x2014;</option>
                            {% for r in retailers %}
                            <option value="{{ r.id }}" {% if target_admin.vendor_id == r.id %}selected{% endif %}>{{ r.name }}</option>
                            {% endfor %}
                        </select>
                        <p style="font-size:0.75rem;color:var(--ap-text-muted);margin-top:0.375rem;">RETAILER admins can only manage products for this shop.</p>
                    </div>
                </div>

                <div style="display:flex;align-items:center;gap:0.75rem;padding-top:0.5rem;">
                    <button type="submit" class="ap-btn ap-btn-primary">Save Changes</button>
                    <a href="/admin/admin-users" class="ap-btn ap-btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function toggleVendorField() {
    const role = document.getElementById('role').value;
    const field = document.getElementById('vendor-field');
    field.classList.toggle('admin-hidden', role !== 'RETAILER');
}
</script>

<style>
.admin-hidden { display: none !important; }
</style>
{% endblock %}
