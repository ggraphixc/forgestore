{% extends "admin/base.html" %}

{% block title %}Edit Admin — ForgeStore{% endblock %}

{% block content %}
<style>
  :root {
    --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-200:#fde68a;--amber-300:#fcd34d;
    --amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;--amber-700:#b45309;
    --amber-800:#92400e;
    --stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;
    --stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;
    --stone-800:#292524;--stone-900:#1c1917;
    --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:16px;--radius-full:9999px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.06);
    --transition-fast:150ms ease;--transition-base:200ms ease;
  }
  .admin-page{max-width:640px;margin:0 auto;padding:0}
  .admin-page-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem}
  .admin-back-link{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:var(--radius-md);color:var(--stone-400);text-decoration:none;transition:all var(--transition-fast);margin-left:-.5rem}
  .admin-back-link:hover{color:var(--stone-900);background:var(--stone-50)}
  .admin-page-eyebrow{font-size:.6875rem;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--amber-600);margin-bottom:.25rem}
  .admin-page-title{font-size:1.875rem;font-weight:900;color:var(--stone-900)}
  .admin-page-title .accent{background:linear-gradient(135deg,var(--amber-600),var(--amber-500));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .admin-page-subtitle{font-size:.875rem;color:var(--stone-500);margin-top:.25rem}
  .admin-card{background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-lg);padding:1.5rem 2rem;box-shadow:var(--shadow-sm)}
  .admin-stack{display:flex;flex-direction:column;gap:1.25rem}
  .admin-form-grid{display:grid;grid-template-columns:1fr;gap:1.25rem}
  .admin-form-group{display:flex;flex-direction:column}
  .admin-form-label{display:block;font-size:.875rem;font-weight:500;color:var(--stone-700);margin-bottom:.375rem}
  .admin-form-label-hint{font-weight:400;color:var(--stone-400)}
  .admin-form-input,.admin-form-select{width:100%;padding:.75rem 1rem;background:#fff;border:1px solid var(--stone-200);border-radius:var(--radius-md);font-size:.875rem;color:var(--stone-900);transition:all var(--transition-fast);min-height:44px;box-sizing:border-box}
  .admin-form-input:focus,.admin-form-select:focus{outline:none;border-color:var(--amber-500);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
  .admin-form-input::placeholder{color:var(--stone-400)}
  .admin-form-input-readonly{background:var(--stone-50);color:var(--stone-400);cursor:not-allowed;border-color:var(--stone-200)}
  .admin-form-select{cursor:pointer;appearance:auto}
  .admin-form-help{font-size:.75rem;color:var(--stone-400);margin-top:.375rem}
  .admin-form-actions{display:flex;align-items:center;gap:.75rem;padding-top:1rem}
  .admin-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.5rem;border:none;border-radius:var(--radius-md);font-size:.875rem;font-weight:700;cursor:pointer;transition:all var(--transition-fast);min-height:44px;text-decoration:none}
  .admin-btn-primary{background:linear-gradient(135deg,var(--stone-800),var(--stone-900));color:#fff}
  .admin-btn-primary:hover{background:linear-gradient(135deg,var(--stone-900),#1a1512);box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .admin-btn-ghost{padding:.75rem 1.5rem;background:none;color:var(--stone-500);font-weight:500;border-radius:var(--radius-md);transition:all var(--transition-fast);min-height:44px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-size:.875rem}
  .admin-btn-ghost:hover{color:var(--stone-900);background:var(--stone-50)}
  .admin-hidden{display:none !important}
  @media(min-width:768px){.admin-form-grid{grid-template-columns:1fr 1fr}}
  @media(max-width:640px){.admin-card{padding:1rem}.admin-page-title{font-size:1.5rem}}
</style>

<div class="admin-page">
    <div class="admin-page-header">
        <a href="/admin/admin-users" class="admin-back-link">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <div>
            <p class="admin-page-eyebrow">Admin Users</p>
            <h1 class="admin-page-title">Edit <span class="accent">Admin</span></h1>
            <p class="admin-page-subtitle">{{ target_admin.email }}</p>
        </div>
    </div>

    <div class="admin-card">
        <form method="POST" class="admin-stack">
            <div class="admin-form-grid">
                <div class="admin-form-group">
                    <label class="admin-form-label" for="name">Full Name</label>
                    <input id="name" name="name" class="admin-form-input" value="{{ target_admin.name or '' }}">
                </div>
                <div class="admin-form-group">
                    <label class="admin-form-label">Email</label>
                    <input class="admin-form-input admin-form-input-readonly" value="{{ target_admin.email }}" readonly>
                </div>
            </div>

            <div class="admin-form-group">
                <label class="admin-form-label" for="password">New Password <span class="admin-form-label-hint">(leave blank to keep current)</span></label>
                <input id="password" name="password" type="password" class="admin-form-input" placeholder="Leave blank to keep current" minlength="6">
            </div>

            <div class="admin-form-grid">
                <div class="admin-form-group">
                    <label class="admin-form-label" for="role">Role</label>
                    <select id="role" name="role" class="admin-form-select" onchange="toggleVendorField()">
                        <option value="DIR_ADMIN" {% if target_admin.role.value == 'DIR_ADMIN' %}selected{% endif %}>DIR_ADMIN</option>
                        <option value="MANAGEMENT" {% if target_admin.role.value == 'MANAGEMENT' %}selected{% endif %}>MANAGEMENT</option>
                        <option value="TECH_ADMIN" {% if target_admin.role.value == 'TECH_ADMIN' %}selected{% endif %}>TECH_ADMIN</option>
                        <option value="RETAILER" {% if target_admin.role.value == 'RETAILER' %}selected{% endif %}>RETAILER</option>
                        <option value="LOGISTICS" {% if target_admin.role.value == 'LOGISTICS' %}selected{% endif %}>LOGISTICS</option>
                    </select>
                </div>

                <div id="vendor-field" class="{% if target_admin.role.value != 'RETAILER' %}admin-hidden{% endif %}">
                    <label class="admin-form-label" for="vendor_id">Linked Retailer</label>
                    <select id="vendor_id" name="vendor_id" class="admin-form-select">
                        <option value="">&#x2014; None &#x2014;</option>
                        {% for r in retailers %}
                        <option value="{{ r.id }}" {% if target_admin.vendor_id == r.id %}selected{% endif %}>{{ r.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="admin-form-help">RETAILER admins can only manage products for this shop.</p>
                </div>
            </div>

            <div class="admin-form-actions">
                <button type="submit" class="admin-btn admin-btn-primary">Save Changes</button>
                <a href="/admin/admin-users" class="admin-btn-ghost">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
function toggleVendorField() {
    const role = document.getElementById('role').value;
    const field = document.getElementById('vendor-field');
    field.classList.toggle('admin-hidden', role !== 'RETAILER');
}
</script>
{% endblock %}
