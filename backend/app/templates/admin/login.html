{% extends "admin/base.html" %}

{% block title %}Login — ForgeStore{% endblock %}

{% block body %}
<style>
  :root {
    --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-200:#fde68a;--amber-300:#fcd34d;
    --amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;--amber-700:#b45309;
    --amber-800:#92400e;
    --stone-50:#fafaf9;--stone-100:#f5f5f4;--stone-200:#e7e5e4;--stone-300:#d6d3d1;
    --stone-400:#a8a29e;--stone-500:#78716c;--stone-600:#57534e;--stone-700:#44403c;
    --stone-800:#292524;--stone-900:#1c1917;
    --red-50:#fef2f2;--red-200:#fecaca;--red-500:#ef4444;--red-700:#b91c1c;
    --radius-sm:6px;--radius-md:10px;--radius-lg:14px;--radius-xl:16px;--radius-full:9999px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.04);--shadow-md:0 4px 12px rgba(0,0,0,.06);
    --transition-fast:150ms ease;--transition-base:200ms ease;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;
    background:linear-gradient(to bottom right,var(--stone-50),#fff,rgba(255,251,235,.3));
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:1rem;min-height:100vh;
  }
  .admin-login-logo{display:flex;flex-direction:column;align-items:center;margin-bottom:2rem}
  .admin-login-logo-icon{
    width:64px;height:64px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(to bottom right,var(--stone-900),var(--stone-700));
    color:#fff;font-size:1.25rem;font-weight:700;margin-bottom:1rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);border:2px solid rgba(245,158,11,.2);
  }
  .admin-login-logo h1{font-size:1.25rem;font-weight:900;color:var(--stone-900)}
  .admin-login-logo p{font-size:.875rem;color:var(--stone-500);margin-top:.25rem}
  .admin-login-card{
    width:100%;max-width:400px;
    background:rgba(255,255,255,.8);border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.2);
    padding:2rem;box-shadow:0 4px 16px rgba(28,25,23,.05);
  }
  .admin-error-box{
    margin-bottom:1rem;padding:.75rem 1rem;background:var(--red-50);
    border:1px solid var(--red-200);border-radius:var(--radius-md);font-size:.875rem;color:var(--red-700);
  }
  .admin-field-stack{display:flex;flex-direction:column;gap:1.25rem}
  .admin-field-label{
    display:block;font-size:.625rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.2em;color:var(--stone-500);margin-bottom:.5rem;
  }
  .admin-field-input{
    width:100%;padding:.75rem 1rem;background:var(--stone-50);border:1px solid var(--stone-200);
    border-radius:var(--radius-md);font-size:.875rem;color:var(--stone-900);transition:all var(--transition-fast);
  }
  .admin-field-input:focus{outline:none;border-color:var(--amber-500);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
  .admin-field-input::placeholder{color:var(--stone-400)}
  .admin-pw-wrap{position:relative}
  .admin-pw-toggle{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    padding:4px;color:var(--stone-400);cursor:pointer;background:none;border:none;
    transition:color var(--transition-fast);min-height:44px;min-width:44px;
    display:flex;align-items:center;justify-content:center;
  }
  .admin-pw-toggle:hover{color:var(--stone-600)}
  .admin-pw-toggle svg{width:20px;height:20px}
  .admin-pw-toggle .admin-hidden{display:none}
  .admin-btn-submit{
    width:100%;padding:.75rem 1.25rem;background:var(--stone-900);color:#fff;
    font-size:.875rem;font-weight:700;border-radius:var(--radius-md);border:none;cursor:pointer;
    transition:all .2s;min-height:44px;
  }
  .admin-btn-submit:hover{background:var(--stone-800)}
  .admin-btn-submit:disabled{opacity:.5;cursor:not-allowed}
  .admin-btn-submit:active{transform:scale(.98)}
  .admin-spinner{
    display:inline-block;width:16px;height:16px;border:2px solid #fff;
    border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;
    margin-right:8px;vertical-align:middle;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .admin-login-footer{margin-top:2rem;font-size:.75rem;color:var(--stone-400)}
</style>

<div class="admin-login-logo">
    <div class="admin-login-logo-icon">FS</div>
    <h1>ForgeStore</h1>
    <p>Admin Panel — Sign in to continue</p>
</div>

<div class="admin-login-card">
    <form id="login-form">
        {% if error %}
        <div class="admin-error-box">{{ error }}</div>
        {% endif %}

        <div class="admin-field-stack">
            <div>
                <label for="email" class="admin-field-label">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    value="admin@forgestore.com"
                    required
                    class="admin-field-input"
                    placeholder="admin@forgestore.com"
                    autocomplete="email"
                >
            </div>

            <div>
                <label for="password" class="admin-field-label">Password</label>
                <div class="admin-pw-wrap">
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        class="admin-field-input"
                        placeholder="Enter your password"
                        autocomplete="current-password"
                        style="padding-right:44px;"
                    >
                    <button type="button" onclick="togglePasswordVisibility('password', this)"
                        class="admin-pw-toggle" aria-label="Toggle password visibility" tabindex="-1">
                        <svg class="eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <svg class="eye-closed admin-hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="admin-btn-submit">
                Sign In to Dashboard
            </button>
        </div>
    </form>
</div>

<p class="admin-login-footer">&copy; 2025 ForgeStore. All rights reserved.</p>

<script>
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input || !btn) return;
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.querySelector('.eye-open')?.classList.toggle('admin-hidden');
    btn.querySelector('.eye-closed')?.classList.toggle('admin-hidden');
    btn.style.transform = 'scale(0.9)';
    setTimeout(() => btn.style.transform = '', 150);
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="admin-spinner"></span> Signing in...';

    const formData = new FormData(e.target);

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: formData.get('email'),
                password: formData.get('password'),
            }),
        });

        if (res.ok) {
            const data = await res.json();
            const role = data.user?.role;
            if (role === 'RETAILER') {
                window.location.href = '/vendor/dashboard';
            } else if (role === 'LOGISTICS') {
                window.location.href = '/logistics/dashboard';
            } else {
                window.location.href = '/admin/dashboard';
            }
        } else {
            const data = await res.json();
            showToast(data.detail || 'Invalid email or password', 'error');
        }
    } catch (err) {
        showToast('Connection error. Please try again.', 'error');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In to Dashboard';
    }
});
</script>
{% endblock %}
