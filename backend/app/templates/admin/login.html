{% extends "admin/base.html" %}

{% block title %}Login — ForgeStore{% endblock %}

{% block body %}
<div class="min-h-screen bg-gradient-to-br from-stone-50 via-white to-amber-50/30 flex flex-col items-center justify-center px-4">
    <!-- Logo -->
    <div class="mb-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-stone-900 to-stone-700 rounded-2xl mb-4 shadow-warm ring-2 ring-amber-500/20">
            <span class="text-white text-2xl font-display font-bold">FS</span>
        </div>
        <h1 class="text-xl sm:text-2xl font-display font-black text-stone-900">ForgeStore</h1>
        <p class="text-sm text-stone-500 mt-1">Admin Panel — Sign in to continue</p>
    </div>

    <!-- Form -->
    <div class="w-full max-w-sm">
        <form id="login-form" class="bg-white/80 dark:bg-stone-800/80 backdrop-blur-md rounded-2xl border border-white/20 dark:border-stone-700/50 p-8 shadow-lg shadow-stone-900/5">
            {% if error %}
            <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
                {{ error }}
            </div>
            {% endif %}

            <div class="space-y-5">
                <div>
                    <label for="email" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-stone-500 mb-2">Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        value="admin@forgestore.com"
                        required
                        class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm text-stone-900 placeholder:text-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all"
                        placeholder="admin@forgestore.com"
                        autocomplete="email"
                    >
                </div>

                <div>
                    <label for="password" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-stone-500 mb-2">Password</label>
                    <div class="relative">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            required
                            class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl text-sm text-stone-900 placeholder:text-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all pr-11"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                        >
                        <button type="button" onclick="togglePasswordVisibility('password', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 p-1 text-stone-400 hover:text-stone-600 transition-colors"
                            aria-label="Toggle password visibility" tabindex="-1">
                            <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                            <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button
                    type="submit"
                    class="w-full px-5 py-3 sm:py-3.5 bg-stone-900 text-white text-sm font-bold rounded-xl hover:bg-stone-800 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer active:scale-[0.98] shadow-lg shadow-stone-900/10 min-h-[44px]"
                >
                    Sign In to Dashboard
                </button>
            </div>
        </form>
    </div>

    <p class="mt-8 text-xs text-stone-400">
        &copy; 2025 ForgeStore. All rights reserved.
    </p>
</div>

<script>
// ===== Password visibility toggle =====
function togglePasswordVisibility(inputId, btn) {
    const input = document.getElementById(inputId);
    if (!input || !btn) return;
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    btn.querySelector('.eye-open')?.classList.toggle('hidden');
    btn.querySelector('.eye-closed')?.classList.toggle('hidden');
    btn.style.transform = 'scale(0.9)';
    setTimeout(() => btn.style.transform = '', 150);
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full mr-2"></span> Signing in...';

    const formData = new FormData(e.target);

    try {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: formData.get('email'),
                password: formData.get('password'),
            }),
        });

        if (res.ok) {
            window.location.href = '/admin/dashboard';
        } else {
            const data = await res.json();
            alert(data.detail || 'Invalid email or password');
        }
    } catch (err) {
        alert('Connection error. Please try again.');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In to Dashboard';
    }
});
</script>
{% endblock %}
