[mypy]
python_version = 3.11
ignore_missing_imports = true
warn_unused_ignores = true
strict_optional = true
no_implicit_optional = true

# sqlalchemy2-stubs provides PEP 561 typing for classic SQLAlchemy Column API
# Plugin intentionally omitted - sqlalchemy2-stubs handles typing via stubs

# models.py uses __allow_unmapped__ which lets SQLAlchemy ignore non-Mapped annotations.
# Mypy still type-checks assignment compatibility, but relationship() return type inference
# with __allow_unmapped__ is not supported, producing false-positive [assignment] errors.
[mypy-app.models]
disable_error_code = assignment
